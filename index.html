<style>

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #ffffff; --bg2: #f5f5f3; --bg3: #eeede9;
    --text: #1a1a1a; --text2: #666; --text3: #aaa;
    --border: rgba(0,0,0,0.1); --border2: rgba(0,0,0,0.18);
    --radius: 8px; --accent: #1a1a1a;
    --blue: #378ADD; --blue-bg: #E6F1FB; --blue-text: #185FA5;
    --green: #1D9E75; --green-bg: #E1F5EE; --green-text: #0F6E56;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1c1c1c; --bg2: #242424; --bg3: #2c2c2a;
      --text: #e8e8e6; --text2: #999; --text3: #555;
      --border: rgba(255,255,255,0.1); --border2: rgba(255,255,255,0.18);
      --accent: #e8e8e6;
    }
  }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg3); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 24px 16px; }
  .app { width: 100%; max-width: 860px; background: var(--bg); border-radius: 12px; border: 0.5px solid var(--border2); overflow: hidden; display: flex; flex-direction: column; height: 92vh; box-shadow: 0 2px 16px rgba(0,0,0,0.07); }
  /* Setup */
  .setup { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 14px; padding: 48px 32px; }
  .setup h1 { font-size: 22px; font-weight: 500; }
  .setup p { font-size: 13px; color: var(--text2); text-align: center; max-width: 420px; line-height: 1.6; }
  .setup input { width: 100%; max-width: 460px; font-size: 13px; padding: 9px 13px; border: 0.5px solid var(--border2); border-radius: var(--radius); background: var(--bg); color: var(--text); outline: none; }
  .setup input:focus { border-color: var(--blue); }
  .setup button { font-size: 13px; padding: 9px 24px; border: none; border-radius: var(--radius); cursor: pointer; background: var(--accent); color: var(--bg); font-weight: 500; }
  .setup .err { font-size: 12px; color: #e24b4a; }
  code { font-family: monospace; font-size: 12px; background: var(--bg2); padding: 2px 5px; border-radius: 4px; }
  /* Toolbar */
  .toolbar { display: flex; align-items: center; gap: 8px; padding: 8px 14px; border-bottom: 0.5px solid var(--border); background: var(--bg2); flex-wrap: wrap; flex-shrink: 0; }
  .hint-bar { font-size: 11px; color: var(--text3); flex: 1; min-width: 100px; }
  .kbd { display: inline-block; font-family: monospace; font-size: 10px; background: var(--bg); border: 0.5px solid var(--border2); border-radius: 3px; padding: 0 3px; color: var(--text2); }
  .toolbar button { font-size: 11px; padding: 4px 10px; border: 0.5px solid var(--border2); border-radius: var(--radius); cursor: pointer; background: var(--bg); color: var(--text); white-space: nowrap; }
  .toolbar button:hover { background: var(--bg2); }
  .user-pill { font-size: 11px; color: var(--text2); background: var(--bg); border: 0.5px solid var(--border); border-radius: 10px; padding: 2px 9px; white-space: nowrap; max-width: 200px; overflow: hidden; text-overflow: ellipsis; }
  .sync-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--text3); flex-shrink: 0; transition: background 0.3s; }
  .sync-dot.syncing { background: #f0a500; }
  .sync-dot.ok { background: #3aaa6e; }
  .sync-dot.err { background: #e24b4a; }
  /* Tabs */
  .tabs { display: flex; border-bottom: 0.5px solid var(--border); flex-shrink: 0; }
  .tab { flex: 1; padding: 9px; font-size: 12px; font-weight: 500; text-align: center; cursor: pointer; color: var(--text2); background: none; border: none; border-bottom: 2px solid transparent; }
  .tab.active { color: var(--text); border-bottom-color: var(--accent); }
  .tab:hover:not(.active) { background: var(--bg2); color: var(--text); }
  /* Tree */
  .tree { flex: 1; overflow-y: auto; padding: 4px 0 60px; }
  .tree.drag-selecting { user-select: none; }
  .node-row { display: flex; align-items: flex-start; border-radius: 4px; min-height: 28px; }
  .node-row .toggle, .node-row .drag-handle, .node-row .sel-btn, .node-row .node-check, .node-row .section-dot { flex-shrink: 0;  align-self: flex-start; margin-top: 6px; }
  .node-row:hover { background: var(--bg2); }
  .node-row.focused { background: var(--bg2); }
  .node-row.assigned-to-me { border-left: 2px solid var(--blue); }
  .node-row.assigned-by-me { border-left: 2px solid var(--green); }
  .toggle { width: 20px; height: 20px; display: flex; align-items: center; justify-content: center; font-size: 9px; color: var(--text3); flex-shrink: 0; cursor: pointer; user-select: none; align-self: flex-start; margin-top: 3px; position: relative; }
  .zoom-dot { font-size: 9px; color: var(--text3); position: absolute; left: -10px; top: 4px; cursor: zoom-in; opacity: 0; transition: opacity 0.15s, color 0.15s; }
  .node-row:hover .zoom-dot { opacity: 1; }
  .zoom-dot:hover { color: var(--accent); }
  .toggle:hover { color: var(--text); }
  .toggle.leaf { cursor: default; font-size: 9px; line-height: 1; width: 20px; }
  .node-check { width: 14px; height: 14px; cursor: pointer; accent-color: var(--accent); flex-shrink: 0; margin-right: 5px;  align-self: flex-start; margin-top: 5px; }
  .section-dot { width: 14px; height: 14px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-right: 5px; }
  .section-dot.zoomable { cursor: zoom-in; }

  .section-dot.zoomable:hover::before { background: var(--accent) !important; transform: scale(1.5); transition: all 0.15s; }
  .toggle.leaf.zoomable { cursor: zoom-in; transition: color 0.15s; }
  .toggle.leaf.zoomable:hover { color: var(--accent); transform: scale(1.4); }
  .section-dot::before { content:''; display:block; width:6px; height:6px; border-radius:50%; background: var(--border2); }
  .node-input { flex: 1; white-space: pre-wrap; word-break: break-word; resize: none; overflow: hidden; font-size: 13px; color: var(--text); background: transparent; border: none; outline: none; font-family: inherit; padding: 3px 2px; line-height: 1.5; min-width: 0; }
  .node-input.done { text-decoration: line-through; color: var(--text3); }
  .node-input.is-section { font-weight: 500; }
  .node-input[readonly] { color: var(--text2); cursor: default; }
  .breadcrumb { font-size: 10px; color: var(--text3); margin-right: 5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 200px; flex-shrink: 1; }
  .breadcrumb.project-link { cursor: pointer; }
  .breadcrumb.project-link:hover { color: var(--accent); text-decoration: underline; }
  .today-badge { font-size: 10px; padding: 1px 7px; border-radius: 8px; margin-right: 4px; white-space: nowrap; flex-shrink: 0; background: var(--bg2); color: var(--text2);  align-self: flex-start; margin-top: 4px; }
  .today-badge.is-today { background: var(--accent); color: var(--bg); }
  .assignee-badge { font-size: 10px; padding: 1px 7px; border-radius: 8px; margin-right: 4px; white-space: nowrap; flex-shrink: 0; background: var(--blue-bg); color: var(--blue-text);  align-self: flex-start; margin-top: 5px; }
  .zoom-btn { color: var(--text3); }
  .act-btn { background: none; border: none; cursor: pointer; font-size: 11px; color: var(--text3); padding: 2px 5px; border-radius: 3px; opacity: 0; flex-shrink: 0; white-space: nowrap;  align-self: flex-start; margin-top: 4px; }
  .node-row:hover .act-btn, .node-row.focused .act-btn { opacity: 1; }
  .act-btn:hover { color: var(--text); background: var(--bg3); }
  .section-label { font-size: 10px; color: var(--text3); padding: 10px 14px 2px; text-transform: uppercase; letter-spacing: 0.06em; }
  .empty { padding: 32px 16px; text-align: center; color: var(--text3); font-size: 13px; line-height: 1.9; }
  .add-root-btn { font-size: 12px; padding: 7px 16px; border: 0.5px solid var(--border2); border-radius: var(--radius); cursor: pointer; background: var(--accent); color: var(--bg); margin-top: 4px; }
  /* Modal */
  .modal-bg { position: fixed; inset: 0; background: rgba(0,0,0,0.3); display: flex; align-items: center; justify-content: center; z-index: 100; }
  .modal { background: var(--bg); border-radius: 12px; border: 0.5px solid var(--border2); padding: 22px; width: 340px; box-shadow: 0 8px 32px rgba(0,0,0,0.15); }
  .modal h3 { font-size: 14px; font-weight: 500; margin-bottom: 12px; }
  .modal p { font-size: 12px; color: var(--text2); line-height: 1.5; margin-bottom: 8px; }
  .modal label { font-size: 11px; color: var(--text2); display: block; margin: 10px 0 4px; }
  .modal input, .modal textarea { width: 100%; font-size: 13px; padding: 7px 10px; border: 0.5px solid var(--border2); border-radius: var(--radius); background: var(--bg); color: var(--text); font-family: inherit; outline: none; }
  .modal input:focus, .modal textarea:focus { border-color: var(--blue); }
  .modal textarea { resize: vertical; min-height: 64px; }
  .modal-btns { display: flex; gap: 8px; justify-content: flex-end; margin-top: 16px; }
  .modal-btns button { padding: 7px 18px; font-size: 13px; border-radius: var(--radius); cursor: pointer; border: 0.5px solid var(--border2); background: var(--bg); color: var(--text); }
  .modal-btns button.primary { background: var(--accent); color: var(--bg); border-color: var(--accent); }

  .sel-btn { cursor: pointer; color: var(--text3); font-size: 12px; padding: 0 3px; flex-shrink: 0; opacity: 0; user-select: none; align-self: flex-start; margin-top: 3px; }
  .node-row:hover .sel-btn { opacity: 1; }
  .node-row.selected .sel-btn { opacity: 1; color: var(--accent); content: '●'; }
  .drag-handle { cursor: grab; color: var(--text3); font-size: 14px; padding: 0 4px 0 2px; flex-shrink: 0; opacity: 0; user-select: none; align-self: flex-start; margin-top: 2px; }
  .node-row:hover .drag-handle { opacity: 1; }
  .drag-handle:active { cursor: grabbing; }
  .node-row.dragging { opacity: 0.3; background: var(--bg2); }
  .node-row.drop-above { border-top: 2px solid var(--accent); }
  .node-row.drop-below { border-bottom: 2px solid var(--accent); }
  .node-row.drop-child { outline: 1.5px dashed var(--accent); outline-offset: -2px; border-radius: 4px; }
  .node-row.selected { background: color-mix(in srgb, var(--accent) 8%, transparent); }
  .node-row.context-only { opacity: 0.45; }
  .node-row.context-only .drag-handle,
  .node-row.context-only .sel-btn,
  .node-row.context-only .act-btn { display: none !important; }
  .context-label { font-size: 10px; color: var(--text3); padding: 2px 8px; font-style: italic; }
  .node-row.selected .drag-handle { opacity: 1; }

</style>

<div class="app" id="app">
  <div class="toolbar">
    <button id="backBtn" onclick="navBack()" style="display:none;margin-right:4px;" title="Go back (Alt+←)">← Back</button>
    <span class="hint-bar">
      <span class="kbd">Enter</span> new &nbsp;
      <span class="kbd">Tab</span> indent &nbsp;
      <span class="kbd">⇧Tab</span> outdent &nbsp;
      <span class="kbd">⌘⇧S</span> toggle section &nbsp;
      <span class="kbd">⌘⇧X</span> → today &nbsp;
      <span class="kbd">⌘⇧C</span> collapse &nbsp;
      <span class="kbd">Alt←</span> back
    </span>
    <span class="sync-dot" id="syncDot"></span>
    <span class="user-pill" id="userPill" style="cursor:pointer;" onclick="switchUser()" title="Click to switch user">loading…</span>
    <span id="selectPill" style="display:none;font-size:11px;padding:2px 8px;border-radius:8px;background:var(--accent);color:var(--bg);cursor:pointer;" onclick="clearSelection()" title="Clear selection"></span>
    <button id="collapseBtn">Collapse all</button>
    <button id="hideDoneBtn" onclick="toggleHideDone()" title="Toggle visibility of completed tasks">Hide done</button>
    <button onclick="claimOwnership()" id="claimBtn" title="Claim ownership of all unowned nodes" style="display:none">⚑ Claim</button>
  </div>
  <div class="tabs">
    <button class="tab active" data-tab="today">Today</button>
    <button class="tab" data-tab="all">All tasks</button>
    <button class="tab" data-tab="tree">Projects</button>
    <button class="tab" data-tab="assigned">Assigned to me</button>
  </div>
  <div id="zoomCrumb" style="display:none;padding:6px 14px;font-size:11px;color:var(--text2);background:var(--bg2);border-bottom:0.5px solid var(--border);flex-shrink:0;"></div>
  <div id="treeEl" class="tree"><div class="empty">Loading…</div></div>
</div>
<script>
// ── Config ───────────────────────────────────────────────────────────────────
var COLLAPSED_KEY = 'momentum_collapsed';
var TODAY = (() => { var d = new Date(); return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0'); })();
var TODAYLABEL = new Date().toLocaleDateString(undefined, { weekday:'long', day:'numeric', month:'long' });

var currentUser = '';
var nodes = [];
var collapsed = JSON.parse(localStorage.getItem(COLLAPSED_KEY) || '{}');
var activeTab = 'today';
var focusId = null;
var syncTimer = null;
var pendingSave = new Set();

// ── Utilities ────────────────────────────────────────────────────────────────
function newId() { return '_' + Math.random().toString(36).substr(2, 7); }
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function localDateTime() {
  var d = new Date();
  return d.getFullYear() + '-' +
    String(d.getMonth()+1).padStart(2,'0') + '-' +
    String(d.getDate()).padStart(2,'0') + ' ' +
    String(d.getHours()).padStart(2,'0') + ':' +
    String(d.getMinutes()).padStart(2,'0') + ':' +
    String(d.getSeconds()).padStart(2,'0');
}
function saveCollapsed() { localStorage.setItem(COLLAPSED_KEY, JSON.stringify(collapsed)); }

// ── Serial Operation Queue ─────────────────────────────────────────────────────
// ALL server ops (saves + deletes) go through this queue in order, never concurrent
var opQueue = Promise.resolve();
var opQueueDepth = 0; // count of pending queue operations
var syncTimer = null;
var suppressBlur = false;
var recentlySaved = new Set();

function enqueue(fn) {
  opQueueDepth++;
  opQueue = opQueue.then(fn).catch(function(e) {
    console.error('Queue op failed:', e);
  }).finally(function() {
    opQueueDepth--;
  });
  return opQueue;
}

function scheduleSave(node) {
  if (!node.name || !node.name.trim()) return;
  pendingSave.add(node.id);
  clearTimeout(syncTimer);
  syncTimer = setTimeout(flushSave, 800);
}

function setSyncDot(state) {
  var dot = document.getElementById('syncDot');
  if (!dot) return;
  dot.className = 'sync-dot' + (state === 'syncing' ? ' syncing' : state === 'err' ? ' err' : '');
}

function flushSave() {
  if (!pendingSave.size) return;
  var ids = [...pendingSave];
  pendingSave.clear();
  var toSave = nodes.filter(function(n) {
    return ids.indexOf(n.id) > -1 && n.name && n.name.trim();
  }).map(function(n) { return Object.assign({}, n); }); // snapshot now
  var gen = opGeneration;
  toSave.forEach(function(snap) {
    enqueue(function() {
      if (opGeneration !== gen) return Promise.resolve();
      setSyncDot('syncing');
      return gsr('saveNodeServer', snap)
        .then(function() { setSyncDot('ok'); })
        .catch(function(e) {
          setSyncDot('err');
          console.error('Save failed:', snap.id, e);
          pendingSave.add(snap.id); // retry
        });
    });
  });
}

function deleteRemote(id, snapIds) {
  // snapIds: array of ids to delete, captured at deletion time
  var ids = snapIds || (id ? [id] : []);
  if (!ids.length) return;
  var gen = opGeneration;
  // Single queue entry for all ids - one server call
  enqueue(function() {
    if (opGeneration !== gen) return Promise.resolve();
    setSyncDot('syncing');
    return gsr('deleteNodesServer', ids)
      .then(function() { setSyncDot('ok'); })
      .catch(function(e) {
        setSyncDot('err');
        console.error('Bulk delete failed:', e);
        // Fallback: try individual deletes
        return ids.reduce(function(p, did) {
          return p.then(function() {
            if (opGeneration !== gen) return;
            return gsr('deleteNodeServer', did).catch(function(){});
          });
        }, Promise.resolve());
      });
  });
}

async function fetchAll() {
  var clientEmail = localStorage.getItem('momentum_user_email') || currentUser || '';
  var data = await gsr('getInitialData', clientEmail || null);
  if (!data) return;
  if (data.user) {
    currentUser = data.user;
    localStorage.setItem('momentum_user_email', data.user);
  }
  var pill = document.getElementById('userPill');
  if (pill) pill.textContent = currentUser || 'unknown';
  // Don't overwrite active input - save it first
  var activeInp = document.activeElement;
  var activeId = null;
  var activeVal = null;
  if (activeInp && activeInp.classList.contains('node-input') && activeInp.value.trim()) {
    activeId = activeInp.dataset.id;
    activeVal = activeInp.value.trim();
  }
  nodes = normalizeNodes(data.nodes || []);
  // Also load team members
  gsr('getTeamMembers').then(function(members) { teamMembers = members || []; }).catch(function(){});
  // Restore unsaved content into the refreshed node
  if (activeId && activeVal) {
    var n = nodes.find(function(x) { return x.id === activeId; });
    if (n) n.name = activeVal;
    // Save it to sheet since we have it
    gsr('saveNodeServer', Object.assign({}, n)).catch(function(){});
  }
  var hasUnowned = nodes.some(function(n) { return !n.owner || !n.owner.trim(); });
  var claimBtn = document.getElementById('claimBtn');
  if (claimBtn) claimBtn.style.display = (hasUnowned && currentUser) ? 'inline-block' : 'none';
  render();
}

function gsr(fnName, arg) {
  return new Promise(function(resolve, reject) {
    var runner = google.script.run
      .withSuccessHandler(resolve)
      .withFailureHandler(function(e) {
        if (e && e.name === 'AuthRequiredError' && e.authUrl) {
          document.getElementById('treeEl').innerHTML = '<div class="empty" style="padding:32px;">' +
            '<p style="margin-bottom:16px;">Please authorise this app with your Google account.</p>' +
            '<a href="' + e.authUrl + '" target="_top" style="display:inline-block;padding:10px 20px;background:var(--accent);color:var(--bg);border-radius:8px;text-decoration:none;">Authorise</a>' +
            '</div>';
        }
        reject(e);
      });
    try {
      if (arg !== undefined) runner[fnName](arg);
      else runner[fnName]();
    } catch(e) { reject(e); }
  });
}





function getDescendantIds(id) {
  return nodes.filter(n => n.parentId === id).flatMap(c => [c.id, ...getDescendantIds(c.id)]);
}

// ── Node helpers ──────────────────────────────────────────────────────────────
function normalizeNodes(raw) {
  return raw
    .filter(n => n.name && String(n.name).trim() !== '')
    .map(n => {
      if (n.date) {
        var s = String(n.date).trim();
        if (/^\d{4}-\d{2}-\d{2}/.test(s)) { n.date = s; }
        else { n.date = null; }
      }
      // Normalize parentId - undefined/empty string should be null (root level)
      if (!n.parentId) n.parentId = null;
      // Normalize completedDate
      if (!n.completedDate) n.completedDate = null;
      n.readOnlyContext = n.readOnlyContext === true || n.readOnlyContext === 'true';
      return n;
    });
}

function children(pid) { return nodes.filter(n => (n.parentId === pid) || (!pid && !n.parentId)); }
function descendants(id) { return children(id).flatMap(c => [c.id, ...descendants(c.id)]); }
function ancestors(id) {
  var a = []; var n = nodes.find(x => x.id === id);
  while (n && n.parentId) { n = nodes.find(x => x.id === n.parentId); if (n) a.unshift(n); }
  return a;
}
function breadcrumb(id) { return ancestors(id).map(n => n.name || '…').join(' › '); }
function flattenVisible(pid, depth) {
  return children(pid).flatMap(n => {
    // In tree view, hide done nodes if hideDone (except done today)
    if (activeTab === 'tree' && hideDone && n.done) {
      // Hide if completed before today (use completedDate if available, fall back to date)
      var completedOn = n.completedDate || (n.date ? n.date.slice(0,10) : null);
      if (completedOn !== TODAY) return [];
    }
    var rows = [{ node: n, depth }];
    if (!collapsed[n.id]) rows.push(...flattenVisible(n.id, depth + 1));
    return rows;
  });
}
function visibleList() {
  if (activeTab === 'tree') {
    if (zoomedId) return flattenVisible(zoomedId, 0);
    return flattenVisible(null, 0);
  }
  var tasks;
  var doneFilter = function(n) {
    if (!hideDone) return true;
    if (!n.done) return true;
    // Show done tasks completed today
    var completedOn = n.completedDate || (n.date ? n.date.slice(0,10) : null);
    return completedOn === TODAY;
  };
  if (activeTab === 'today') tasks = nodes.filter(n => !n.isSection && n.date && n.date.slice(0,10) === TODAY && (n.name && n.name.trim() || n.id === focusId) && doneFilter(n));
  else if (activeTab === 'all') tasks = nodes.filter(n => !n.isSection && (n.name && n.name.trim() || n.id === focusId) && doneFilter(n));
  else tasks = nodes.filter(n => !n.isSection && n.assignedTo === currentUser && (n.name && n.name.trim() || n.id === focusId) && doneFilter(n));
  tasks.sort((a, b) => (b.date || '').localeCompare(a.date || ''));
  return tasks.map(n => ({ node: n, depth: 0, flat: true }));
}
function isOwner(n) { return !n.owner || n.owner === '' || n.owner === currentUser; }
function canEdit(n) { return !n.readOnlyContext && (isOwner(n) || n.assignedTo === currentUser); }

// ── Render ────────────────────────────────────────────────────────────────────
function render() {
  var el = document.getElementById('treeEl');
  if (!el) return;
  suppressBlur = true; // prevent blur events from re-renders firing saves
  var list = visibleList();

  if (!list.length) {
    if (activeTab === 'tree') el.innerHTML = '<div class="empty">Nothing here yet.<br><button class="add-root-btn" onclick="addRoot()">+ Add first item</button></div>';
    else if (activeTab === 'today') el.innerHTML = `<div class="section-label">${TODAYLABEL}</div><div class="empty">No tasks for today.<br><button class="add-root-btn" onclick="addTodayTask()">+ Add task</button></div>`;
    else if (activeTab === 'assigned') el.innerHTML = '<div class="empty">No tasks assigned to you.</div>';
    else el.innerHTML = '<div class="empty">No tasks yet.</div>';
    return;
  }

  if (activeTab === 'all' || activeTab === 'assigned') {
    var byDate = {};
    list.forEach(({ node: n }) => {
      var k = n.date ? n.date.slice(0, 10) : 'undated';
      (byDate[k] = byDate[k] || []).push(n);
    });
    var keys = Object.keys(byDate).sort((a, b) => b.localeCompare(a));
    el.innerHTML = keys.map(k => {
      var lbl = k === TODAY ? TODAYLABEL : k === 'undated' ? 'Undated'
        : new Date(k + 'T00:00:00').toLocaleDateString(undefined, { weekday:'short', day:'numeric', month:'short' });
      return `<div class="section-label">${lbl}</div>` + byDate[k].map(n => rowHTML(n, 0, true)).join('');
    }).join('');
  } else {
    var html = activeTab === 'today' ? `<div class="section-label">${TODAYLABEL}</div>` : '';
    html += list.map(({ node: n, depth, flat }) => rowHTML(n, depth, flat)).join('');
    if (activeTab === 'today') html += `<div style="padding:10px 14px;"><button class="add-root-btn" onclick="addTodayTask()" style="font-size:12px;padding:6px 14px;">+ New task</button></div>`;
    el.innerHTML = html;
  }

  attachEvents();
  attachDragEvents();
  updateZoomCrumb();
  // Restore selection styles after DOM rebuild
  if (selectedIds.size > 0) updateSelectionStyles();
  // Restore focus to previously focused input if it was active
  if (focusId) {
    var inp = document.getElementById('inp_' + focusId);
    if (inp) {
      inp.focus();
      var len = inp.value.length;
      try { inp.setSelectionRange(len, len); } catch(e) {}
    }
  }
  setTimeout(() => { suppressBlur = false; }, 200); // re-enable blur after render settles
  if (focusId) {
    var inp = document.getElementById('inp_' + focusId);
    if (inp) { inp.focus(); var l = inp.value.length; inp.setSelectionRange(l, l); }
    focusId = null;
  }
}

function rowHTML(n, depth, flat = false) {
  var ch = children(n.id);
  var indentPx = 8 + depth * 22;
  var leafSpan = flat ? '<span class="toggle leaf">◦</span>' : '<span class="toggle leaf zoomable" data-zoom="' + n.id + '" title="Zoom in">◦</span>';
  var toggleEl = flat ? '<span class="toggle leaf">◦</span>'
    : ch.length ? `<span class="toggle" data-toggle="${n.id}">${collapsed[n.id] ? '▶' : '▼'}</span>` + (!n.isSection && !flat ? '<span class="zoom-dot zoomable" data-zoom="' + n.id + '" title="Zoom in">◦</span>' : '')
    : leafSpan;
  var markerEl = n.isSection
    ? `<span class="section-dot${!flat ? ' zoomable' : ''}"${!flat ? ' data-zoom="' + n.id + '" title="Zoom in"' : ''}></span>`
    : `<input type="checkbox" class="node-check" data-check="${n.id}" ${n.done ? 'checked' : ''} ${!canEdit(n) ? 'disabled' : ''} />`;
  var cls = ['node-input', !n.isSection && n.done ? 'done' : '', n.isSection ? 'is-section' : '', !canEdit(n) ? '' : ''].filter(Boolean).join(' ');
  var inputEl = `<textarea class="${cls}" id="inp_${n.id}" data-id="${n.id}" data-flat="${flat}" ${!canEdit(n) ? 'readonly' : ''} placeholder="${n.isSection ? 'Section / group name...' : 'Task...' }" rows="1">${esc(n.name)}</textarea>`;

  var meta = '';
  if (flat) {
    var bc = breadcrumb(n.id);
    if (bc) meta += '<span class="breadcrumb project-link" data-goto="' + n.id + '" title="Go to in Projects">' + esc(bc) + '</span>';
    var nd = n.date ? n.date.slice(0,10) : null;
    meta += `<span class="today-badge${nd === TODAY ? ' is-today' : ''}">${nd === TODAY ? 'today' : nd ? nd.slice(5) : '—'}</span>`;
    if (n.assignedTo && n.assignedTo !== currentUser) meta += `<span class="assignee-badge">${esc(getMemberName(n.assignedTo))}</span>`;
    else if (n.assignedTo === currentUser && n.assignedBy) meta += `<span class="assignee-badge">from ${esc(getMemberName(n.assignedBy))}</span>`;
  } else if (!n.isSection) {
    var nd2 = n.date ? n.date.slice(0,10) : null;
    meta = `<span class="today-badge${nd2 === TODAY ? ' is-today' : ''}">${nd2 === TODAY ? 'today' : nd2 ? nd2.slice(5) : '—'}</span>`;
    if (n.assignedTo) meta += `<span class="assignee-badge">${n.assignedTo === currentUser ? 'mine' : esc(getMemberName(n.assignedTo))}</span>`;
  }

  var acts = '';
  if (canEdit(n)) {
    acts += `<button class="act-btn" data-toggletype="${n.id}">${n.isSection ? '→ task' : '→ section'}</button>`;
    if (!n.isSection) acts += `<button class="act-btn" data-promote="${n.id}">↑ today</button>`;
    if (isOwner(n)) {
      acts += `<button class="act-btn" data-share="${n.id}">share</button>`;
      if (!n.isSection) acts += `<button class="act-btn" data-assign="${n.id}">assign</button>`;
      acts += `<button class="act-btn" data-del="${n.id}">✕</button>`;
    }
  }

  var rowClass = ['node-row',
    n.readOnlyContext ? 'context-only' : '',
    n.assignedTo === currentUser && n.assignedBy ? 'assigned-to-me' : '',
    n.assignedBy === currentUser && n.assignedTo !== currentUser ? 'assigned-by-me' : ''
  ].filter(Boolean).join(' ');
  var selState = selectedIds.has(n.id) ? '●' : '○';
  var dragHandle = flat ? '' : '<span class="drag-handle" data-drag="' + n.id + '" title="Drag">⠿</span><span class="sel-btn" data-sel="' + n.id + '" title="Select">' + selState + '</span>';
  return `<div class="${rowClass}" data-id="${n.id}" data-depth="${depth}" style="padding-left:${indentPx}px;">${dragHandle}${toggleEl}${markerEl}${inputEl}${meta}${acts}</div>`;
}

function attachEvents() {
  var el = document.getElementById('treeEl');
  el.querySelectorAll('[data-toggle]').forEach(b => b.onclick = e => {
    e.stopPropagation(); pushUndo(); collapsed[b.dataset.toggle] = !collapsed[b.dataset.toggle]; saveCollapsed(); render();
  });
  el.querySelectorAll('[data-check]').forEach(cb => {
    cb.onmousedown = function(e) {
      // Save current focused input before checkbox steals focus
      var active = document.activeElement;
      if (active && active.classList.contains('node-input')) {
        var n = nodes.find(x => x.id === active.dataset.id);
        if (n && active.value.trim()) {
          n.name = active.value.trim();
          gsr('saveNodeServer', Object.assign({}, n)).catch(function(){});
        }
      }
    };
    cb.onchange = () => {
      var n = nodes.find(x => x.id === cb.dataset.check);
      if (n) {
        pushUndo();
        n.done = cb.checked;
        if (n.done) {
          n.completedDate = TODAY; // stamp completion date
        } else {
          n.completedDate = null;
        }
        scheduleSave(n);
        // Update row style in-place without full render (avoids scroll jump)
        var row = cb.closest('.node-row');
        if (row) {
          var inp = row.querySelector('.node-input');
          if (inp) {
            inp.classList.toggle('done', n.done);
          }
        }
      }
    };
  });
  el.querySelectorAll('[data-toggletype]').forEach(b => b.onclick = e => {
    e.stopPropagation();
    var n = nodes.find(x => x.id === b.dataset.toggletype);
    if (n) {
      pushUndo();
      var inp = document.getElementById('inp_' + n.id);
      if (inp) n.name = inp.value;
      n.isSection = !n.isSection;
      if (!n.isSection && !n.date) n.date = localDateTime();
      focusId = n.id;
      gsr('saveNodeServer', Object.assign({}, n)).catch(function(e) { console.error('save error', e); });
      render();
    }
  });
  el.querySelectorAll('[data-zoom]').forEach(b => b.onclick = e => {
    e.stopPropagation(); zoomInto(b.dataset.zoom);
  });
  el.querySelectorAll('[data-goto]').forEach(b => b.onclick = e => {
    e.stopPropagation();
    var nodeId = b.dataset.goto;
    // Switch to Projects tab, zoom to node's parent section
    pushNav();
    activeTab = 'tree';
    document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
    var treeTab = document.querySelector('.tab[data-tab="tree"]');
    if (treeTab) treeTab.classList.add('active');
    // Find the top-level ancestor to zoom into
    var n = nodes.find(x => x.id === nodeId);
    // Zoom to the node's parent so it's visible in context
    zoomedId = null;
    // Make sure the node is visible (uncollapse ancestors)
    var cur = n;
    while (cur && cur.parentId) {
      collapsed[cur.parentId] = false;
      cur = nodes.find(x => x.id === cur.parentId);
    }
    saveCollapsed();
    focusId = nodeId;
    render();
    // Scroll to the node
    setTimeout(function() {
      var row = document.querySelector('[data-id="' + nodeId + '"]');
      if (row) row.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }, 100);
  });
  el.querySelectorAll('[data-promote]').forEach(b => b.onclick = e => {
    e.stopPropagation(); var n = nodes.find(x => x.id === b.dataset.promote);
    if (n) { pushUndo(); n.date = localDateTime(); scheduleSave(n); render(); }
  });
  el.querySelectorAll('[data-del]').forEach(b => b.onclick = e => {
    e.stopPropagation();
    var id = b.dataset.del;
    var n = nodes.find(x => x.id === id);
    if (!n) return;
    var childCount = descendants(id).length;
    var msg = childCount > 0
      ? 'Delete "' + (n.name || 'this item') + '" and its ' + childCount + ' child' + (childCount === 1 ? '' : 'ren') + '?'
      : 'Delete "' + (n.name || 'this item') + '"?';
    showDeleteConfirm(msg, function() {
      saveActiveInput();
      pushUndo();
      var snapIds = [id, ...descendants(id)]; // snapshot before modifying
      nodes = nodes.filter(x => snapIds.indexOf(x.id) === -1);
      deleteRemote(null, snapIds);
      render();
    });
  });
  el.querySelectorAll('[data-share]').forEach(b => b.onclick = e => { e.stopPropagation(); showShare(b.dataset.share); });
  el.querySelectorAll('[data-assign]').forEach(b => b.onclick = e => { e.stopPropagation(); showAssign(b.dataset.assign); });
  el.querySelectorAll('.node-input').forEach(inp => {
    // Auto-resize textarea height to fit content
    inp.style.height = 'auto';
    inp.style.height = inp.scrollHeight + 'px';
    inp.addEventListener('input', function() {
      inp.style.height = 'auto';
      inp.style.height = inp.scrollHeight + 'px';
    });
  });
  el.querySelectorAll('.node-input:not([readonly])').forEach(inp => {
    inp.onblur = () => {
      if (suppressBlur) { return; }
      var n = nodes.find(x => x.id === inp.dataset.id);
      if (!n) return;
      // Always update name from input value on blur
      if (inp.value.trim()) n.name = inp.value.trim();
      if (!n.name || !n.name.trim()) {
        // Only delete if this is a brand new node (not yet saved to sheet)
        // A node with an order value has been saved before
        if (!n.order) {
          nodes = nodes.filter(x => x.id !== n.id);
          render();
        }
        return;
      }
      if (recentlySaved.has(n.id)) { console.log('onblur skipped (Enter):', n.id); return; }
      // Only save if name actually changed from what's in the sheet
      // Use a small delay so any in-flight Enter save can complete first
      var nameToSave = inp.value;
      var nodeId = n.id;
      setTimeout(() => {
        if (recentlySaved.has(nodeId)) { console.log('onblur delayed-skipped:', nodeId); return; }
        var nn = nodes.find(x => x.id === nodeId);
        if (nn && nameToSave.trim()) {
          nn.name = nameToSave;
              gsr('saveNodeServer', Object.assign({}, nn)).catch(e => console.error('blur save failed:', e));
        }
      }, 200);
    };
    inp.onfocus = () => { focusId = inp.dataset.id; inp.closest('.node-row').classList.add('focused'); };
    inp.onkeydown = e => handleKey(e, inp);
  });
}



function handleKey(e, inp) {
  var id = inp.dataset.id;
  var cur = nodes.find(x => x.id === id);
  if (!cur) return;

  var list = visibleList();
  var vi = list.findIndex(x => x.node.id === id);

  // ── Escape ──────────────────────────────────────────────────
  if (e.key === 'Escape') { inp.blur(); return; }

  // ── Enter ────────────────────────────────────────────────────
  // Expanded node with children → new first child (directly below)
  // Collapsed node or leaf → new sibling (after the block)
  // Ctrl+Enter in flat view: open section picker for current node
  if (e.key === 'Enter' && !e.shiftKey && !e.repeat && (e.ctrlKey || e.metaKey) && inp.dataset.flat === 'true') {
    e.preventDefault();
    cur.name = inp.value;
    if (cur.name.trim()) {
      gsr('saveNodeServer', Object.assign({}, cur)).catch(function(){});
    }
    showCombinedPicker(cur);
    return;
  }

  // Alt+Enter in flat view: move current node to General section
  if (e.key === 'Enter' && !e.shiftKey && e.altKey && inp.dataset.flat === 'true') {
    e.preventDefault();
    cur.name = inp.value;
    if (cur.name.trim()) gsr('saveNodeServer', Object.assign({}, cur)).catch(function(){});
    // Find or use first section named "General" (case-insensitive)
    var generalSection = nodes.find(function(n) {
      return n.isSection && n.name && n.name.toLowerCase().trim() === 'general';
    });
    if (generalSection) {
      moveTo(cur, generalSection.id);
    } else {
      alert('No section named "General" found. Please create one in Projects first.');
    }
    return;
  }

  // Flat view Enter: create new sibling under same parent, dated today
  if (e.key === 'Enter' && !e.shiftKey && !(e.ctrlKey || e.metaKey) && !e.altKey && (inp.dataset.flat === 'true' || inp.dataset.flat === true)) {
    e.preventDefault();
    pushUndo();
    cur.name = inp.value;
    if (cur.name.trim()) {
      gsr('saveNodeServer', Object.assign({}, cur)).catch(function(){});
    }
    var si = nodes.findIndex(x => x.id === id);
    // Insert after cur's descendants
    var ownDesc = descendants(id);
    var insertAt = si + 1;
    for (var di = si + 1; di < nodes.length; di++) {
      if (ownDesc.indexOf(nodes[di].id) > -1) insertAt = di + 1;
      else break;
    }
    var nn = {
      id: newId(), name: '',
      parentId: lastPickedSection || cur.parentId || null,
      isSection: false, done: false,
      date: localDateTime(),
      owner: currentUser,
      assignedTo: lastPickedAssignee || null,
      assignedBy: lastPickedAssignee ? (currentUser || '') : null,
      order: orderBetween(insertAt - 1, insertAt)
    };
    nodes.splice(insertAt, 0, nn);
    focusId = nn.id;
    render();
    return;
  }

  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    pushUndo();
    cur.name = inp.value;
    if (cur.name.trim()) {
      gsr('saveNodeServer', Object.assign({}, cur)).catch(function(){});
    }
    var hasChildren = nodes.some(x => x.parentId === cur.id);
    var isExpanded = hasChildren && !collapsed[cur.id];
    var si = nodes.findIndex(x => x.id === id);
    var insertAt;
    if (isExpanded) {
      // First child: find first existing child in nodes array and insert before it
      var firstChildIdx = -1;
      for (var di = 0; di < nodes.length; di++) {
        if (nodes[di].parentId === cur.id) { firstChildIdx = di; break; }
      }
      insertAt = firstChildIdx > -1 ? firstChildIdx : si + 1;
    } else {
      // Sibling - after all descendants
      var ownDesc = descendants(id);
      insertAt = si + 1;
      for (var di = si + 1; di < nodes.length; di++) {
        if (ownDesc.indexOf(nodes[di].id) > -1) insertAt = di + 1;
        else break;
      }
    }
    var nn = {
      id: newId(), name: '',
      parentId: isExpanded ? cur.id : (cur.parentId || null),
      isSection: false, done: false,
      date: localDateTime(), owner: currentUser,
      order: orderBetween(insertAt - 1, insertAt)
    };
    nodes.splice(insertAt, 0, nn);
    focusId = nn.id;
    render();
    return;
  }

  // ── Shift+Enter: new sibling above current node ───────────────
  if (e.key === 'Enter' && e.shiftKey) {
    e.preventDefault();
    pushUndo();
    cur.name = inp.value;
    if (cur.name.trim()) {
      gsr('saveNodeServer', Object.assign({}, cur)).catch(function(){});
    }
    var si = nodes.findIndex(x => x.id === id);
    var nn = {
      id: newId(), name: '',
      parentId: cur.parentId || null,
      isSection: false, done: false,
      date: localDateTime(), owner: currentUser,
      order: orderBetween(si - 1, si)
    };
    nodes.splice(si, 0, nn);
    focusId = nn.id;
    render();
    return;
  }

  // ── Backspace on empty: delete node ─────────────────────────
  if (e.key === 'Backspace' && inp.value === '') {
    e.preventDefault();
    pushUndo();
    var prevNode = vi > 0 ? list[vi - 1].node : null;
    var snapIds = [id, ...descendants(id)];
    nodes = nodes.filter(x => snapIds.indexOf(x.id) === -1);
    deleteRemote(null, snapIds);
    if (prevNode) focusId = prevNode.id;
    render();
    return;
  }

  // ── Arrow keys: navigate ─────────────────────────────────────
  if (e.key === 'ArrowUp') {
    e.preventDefault();
    cur.name = inp.value;
    if (cur.name.trim()) gsr('saveNodeServer', Object.assign({}, cur)).catch(function(){});
    if (vi > 0) { focusId = list[vi - 1].node.id; render(); }
    return;
  }
  if (e.key === 'ArrowDown') {
    e.preventDefault();
    cur.name = inp.value;
    if (cur.name.trim()) gsr('saveNodeServer', Object.assign({}, cur)).catch(function(){});
    if (vi < list.length - 1) { focusId = list[vi + 1].node.id; render(); }
    return;
  }

  // ── Tab: indent (make child of node above at same level) ─────
  if (e.key === 'Tab' && !e.shiftKey) {
    e.preventDefault();
    pushUndo();
    cur.name = inp.value;
    // Find previous node in visible list at same depth
    var curDepth = vi >= 0 ? list[vi].depth : 0;
    var target = null;
    for (var i = vi - 1; i >= 0; i--) {
      if (list[i].depth === curDepth) { target = list[i].node; break; }
      if (list[i].depth < curDepth) break;
    }
    if (!target) return;
    cur.parentId = target.id;
    collapsed[target.id] = false; saveCollapsed();
    // Move node after ALL of target's descendants (true last child position)
    var curIdx = nodes.findIndex(x => x.id === id);
    nodes.splice(curIdx, 1);
    var targetIdx = nodes.findIndex(x => x.id === target.id);
    var targetDesc = descendants(target.id); // all descendant IDs of target
    var insertAfter = targetIdx;
    // Scan ALL remaining nodes to find the last descendant (don't stop early)
    for (var di = targetIdx + 1; di < nodes.length; di++) {
      if (targetDesc.indexOf(nodes[di].id) > -1) insertAfter = di;
    }
    nodes.splice(insertAfter + 1, 0, cur);
    var newIdx = nodes.findIndex(x => x.id === id);
    cur.order = orderBetween(newIdx - 1, newIdx + 1);
    focusId = id; scheduleSave(cur); render();
    return;
  }

  // ── Shift+Tab: outdent ───────────────────────────────────────
  if (e.key === 'Tab' && e.shiftKey) {
    e.preventDefault();
    pushUndo();
    cur.name = inp.value;
    if (!cur.parentId) return;
    var parent = nodes.find(x => x.id === cur.parentId);
    if (!parent) return;
    cur.parentId = parent.parentId || null;
    // Move node after parent's last descendant in array
    var curIdx = nodes.findIndex(x => x.id === id);
    nodes.splice(curIdx, 1);
    var parentIdx = nodes.findIndex(x => x.id === parent.id);
    var parentDesc = descendants(parent.id);
    var insertAfter = parentIdx;
    for (var di = parentIdx + 1; di < nodes.length; di++) {
      if (parentDesc.indexOf(nodes[di].id) > -1) insertAfter = di;
      else break;
    }
    nodes.splice(insertAfter + 1, 0, cur);
    var newIdx2 = nodes.findIndex(x => x.id === id);
    cur.order = orderBetween(newIdx2 - 1, newIdx2 + 1);
    focusId = id; scheduleSave(cur); render();
    return;
  }

  // ── Ctrl+Shift+S: toggle section ────────────────────────────
  if ((e.metaKey || e.ctrlKey) && e.shiftKey && e.key === 'S') {
    e.preventDefault();
    pushUndo();
    cur.name = inp.value;
    cur.isSection = !cur.isSection;
    if (!cur.isSection && !cur.date) cur.date = localDateTime();
    focusId = id;
    gsr('saveNodeServer', Object.assign({}, cur)).catch(function(){});
    render();
    return;
  }
}


function addRoot() {
  var n = { id: newId(), name: '', parentId: null, isSection: true, done: false, owner: currentUser };
  nodes.push(n); focusId = n.id; scheduleSave(n); render();
}

function addTodayTask() {
  var n = {
    id: newId(), name: '', parentId: lastPickedSection || null,
    isSection: false, done: false,
    date: localDateTime(), owner: currentUser,
    order: Date.now()
  };
  nodes.push(n);
  focusId = n.id;
  render();
}

function modal(html, onOk) {
  var bg = document.createElement('div'); bg.className = 'modal-bg';
  bg.innerHTML = `<div class="modal">${html}<div class="modal-btns"><button class="cancel-btn">Cancel</button><button class="ok-btn primary">Save</button></div></div>`;
  document.body.appendChild(bg);
  bg.querySelector('.cancel-btn').onclick = () => bg.remove();
  bg.querySelector('.ok-btn').onclick = () => { onOk(bg); bg.remove(); };
  bg.querySelector('input, textarea')?.focus();
}

function showShare(id) {
  var n = nodes.find(x => x.id === id); if (!n) return;
  modal(`<h3>Share "${esc(n.name)}"</h3>
    <p>Sharing gives access to all children too. Comma-separated emails.</p>
    <label>Share with</label>
    <textarea id="mEmails">${esc(n.sharedWith || '')}</textarea>`, bg => {
    n.sharedWith = bg.querySelector('#mEmails').value.trim(); scheduleSave(n); render();
  });
}

function showAssign(id) {
  var n = nodes.find(x => x.id === id); if (!n) return;
  modal(`<h3>Assign "${esc(n.name)}"</h3>
    <label>Assign to (email)</label>
    <input id="mEmail" value="${esc(n.assignedTo || '')}" placeholder="teammate@example.com" />`, bg => {
    var email = bg.querySelector('#mEmail').value.trim();
    n.assignedTo = email; n.assignedBy = email ? currentUser : '';
    if (email) n.sharedWith = [...new Set((n.sharedWith || '').split(',').map(s => s.trim()).filter(Boolean).concat(email))].join(',');
    scheduleSave(n); render();
  });
}

function collapseAll() {
  var anyOpen = nodes.some(n => children(n.id).length && !collapsed[n.id]);
  nodes.forEach(n => { if (children(n.id).length) collapsed[n.id] = anyOpen; });
  saveCollapsed(); render();
}


// ── Drag and Drop (mouse-based, works in Apps Script iframe) ─────────────────
var dragId = null;
var dragOverId = null;
var dropMode = null;
var selectedIds = new Set();
var isDragging = false;
var dragGhost = null;
var opGeneration = 0; // incremented on undo to cancel in-flight ops
var zoomedId = null; // node currently zoomed into
var lastPickedSection = null;
var teamMembers = []; // cached from sheet: [{email, name}] // last used section ID from picker
var lastPickedAssignee = null; // last used assignee email from picker
var sectionFavourites = JSON.parse(localStorage.getItem('momentum_sec_favs') || '{}');

function initDragAndDrop() {
  var el = document.getElementById('treeEl');
  if (!el || el._dragInited) return;
  el._dragInited = true;

  // ── Mouse drag selection ─────────────────────────────────────────────────
  var dragSelectStart = null;
  var dragSelecting = false;

  el.addEventListener('mousedown', function(e) {
    if (e.button !== 0) return;
    // Skip buttons and interactive controls but allow node-input area
    if (e.target.closest('input[type=checkbox], button, .toggle, .drag-handle, .sel-btn, a')) return;
    var row = e.target.closest('.node-row');
    if (!row) return;
    dragSelectStart = row.dataset.id;
    dragSelecting = false;
  });

  el.addEventListener('mousemove', function(e) {
    if (!dragSelectStart) return;
    var row = e.target.closest('.node-row');
    if (!row) return;
    var endId = row.dataset.id;
    if (endId === dragSelectStart && !dragSelecting) return;
    if (!dragSelecting) {
      // Just started dragging - blur any focused input to prevent cursor issues
      if (document.activeElement && document.activeElement.classList.contains('node-input')) {
        document.activeElement.blur();
      }
    }
    dragSelecting = true;
    e.preventDefault();
    // Select all rows between start and current
    var rows = [...el.querySelectorAll('.node-row')];
    var startIdx = rows.findIndex(function(r) { return r.dataset.id === dragSelectStart; });
    var endIdx = rows.findIndex(function(r) { return r.dataset.id === endId; });
    if (startIdx === -1 || endIdx === -1) return;
    var min = Math.min(startIdx, endIdx);
    var max = Math.max(startIdx, endIdx);
    selectedIds.clear();
    for (var i = min; i <= max; i++) {
      if (rows[i].dataset.id) selectedIds.add(rows[i].dataset.id);
    }
    updateSelectionStyles();
  });

  document.addEventListener('mouseup', function() {
    dragSelectStart = null;
    dragSelecting = false;
  });

  // Click to select
  el.addEventListener('click', function(e) {
    // Only the ○ sel-btn toggles selection — clicking row clears selection
    var selBtn = e.target.closest('.sel-btn');
    if (selBtn) return; // handled by inline onclick
    // Clicking anywhere else on the row clears selection
    var row = e.target.closest('.node-row');
    if (row && !e.target.closest('input, button, .toggle, .drag-handle')) {
      if (selectedIds.size > 0) {
        selectedIds.clear();
        updateSelectionStyles();
      }
    }
  });
}

function attachDragEvents() {
  initDragAndDrop();
  var el = document.getElementById('treeEl');
  if (!el) return;
  el.querySelectorAll('.drag-handle').forEach(function(handle) {
    handle.onmousedown = function(e) { startDrag(e, handle.dataset.drag); };
  });
  el.querySelectorAll('.sel-btn').forEach(function(btn) {
    btn.onclick = function(e) { e.stopPropagation(); toggleSelect(btn.dataset.sel); };
  });
}

function zoomInto(id) {
  pushNav();
  zoomedId = id;
  updateZoomCrumb();
  render();
}

function zoomOut(toId) {
  pushNav();
  zoomedId = toId || null;
  updateZoomCrumb();
  render();
}

function updateZoomCrumb() {
  var crumb = document.getElementById('zoomCrumb');
  if (!crumb) return;
  if (!zoomedId || activeTab !== 'tree') {
    crumb.style.display = 'none';
    return;
  }
  // Build breadcrumb path
  var path = ancestors(zoomedId).concat([nodes.find(function(n){ return n.id === zoomedId; })]).filter(Boolean);
    var html = '<span style="cursor:pointer;color:var(--text3);" data-zoomout="root">⌂ All</span>';
  path.forEach(function(n, i) {
    html += ' <span style="color:var(--text3);">›</span> ';
    if (i < path.length - 1) {
      html += '<span style="cursor:pointer;" data-zoomout="' + n.id + '">' + esc(n.name) + '</span>';
    } else {
      html += '<strong>' + esc(n.name) + '</strong>';
    }
  });
  crumb.innerHTML = html;
  crumb.style.display = 'block';
  // Wire up breadcrumb clicks
  crumb.querySelectorAll('[data-zoomout]').forEach(function(el) {
    el.onclick = function() {
      var val = el.dataset.zoomout;
      zoomOut(val === 'root' ? null : val);
    };
  });
}

function showDeleteConfirm(message, onConfirm) {
  var overlay = document.createElement('div');
  overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.25);display:flex;align-items:center;justify-content:center;z-index:1000;';
  overlay.innerHTML = '<div style="background:var(--bg);border-radius:12px;border:0.5px solid var(--border2);padding:24px;width:320px;box-shadow:0 4px 24px rgba(0,0,0,0.15);">' +
    '<p style="font-size:13px;line-height:1.5;margin-bottom:20px;color:var(--text);">' + message + '</p>' +
    '<div style="display:flex;gap:8px;justify-content:flex-end;">' +
    '<button id="delCancel" style="padding:7px 16px;font-size:13px;border-radius:8px;cursor:pointer;border:0.5px solid var(--border2);background:var(--bg);color:var(--text);">Cancel</button>' +
    '<button id="delConfirm" style="padding:7px 16px;font-size:13px;border-radius:8px;cursor:pointer;border:none;background:#e24b4a;color:#fff;font-weight:500;">Delete</button>' +
    '</div></div>';
  document.body.appendChild(overlay);
  overlay.querySelector('#delCancel').onclick = function() { overlay.remove(); };
  overlay.querySelector('#delConfirm').onclick = function() { overlay.remove(); onConfirm(); };
  // Close on backdrop click
  overlay.onclick = function(e) { if (e.target === overlay) overlay.remove(); };
  // Close on Escape
  var escHandler = function(e) { if (e.key === 'Escape') { overlay.remove(); document.removeEventListener('keydown', escHandler); } };
  document.addEventListener('keydown', escHandler);
  overlay.querySelector('#delConfirm').focus();
}

function getMemberName(email) {
  if (!email) return '';
  var member = teamMembers.find(function(m) { return m.email.toLowerCase() === email.toLowerCase(); });
  return member && member.name ? member.name : email.split('@')[0];
}

function orderBetween(beforeIdx, afterIdx) {
  // Returns an order value that sorts between nodes at beforeIdx and afterIdx in the nodes array
  var before = beforeIdx >= 0 ? (nodes[beforeIdx] ? Number(nodes[beforeIdx].order) || 0 : 0) : 0;
  var after = afterIdx < nodes.length ? (nodes[afterIdx] ? Number(nodes[afterIdx].order) || 0 : 0) : 0;
  if (after === 0 || after <= before) {
    return before + 1000; // append after
  }
  return Math.floor((before + after) / 2) || (before + 1000);
}

function pushNav() {
  if (navIgnoreNext) { navIgnoreNext = false; return; }
  navHistory.push({ tab: activeTab, zoomedId: zoomedId });
  if (navHistory.length > 50) navHistory.shift();
  var btn = document.getElementById('backBtn');
  if (btn) btn.style.display = navHistory.length > 0 ? 'inline-block' : 'none';
}

function navBack() {
  if (!navHistory.length) return;
  var prev = navHistory.pop();
  navIgnoreNext = true;
  // Restore tab
  if (prev.tab !== activeTab) {
    activeTab = prev.tab;
    document.querySelectorAll('.tab').forEach(function(t) {
      t.classList.toggle('active', t.dataset.tab === activeTab);
    });
  }
  // Restore zoom
  zoomedId = prev.zoomedId || null;
  updateZoomCrumb();
  render();
  var btn = document.getElementById('backBtn');
  if (btn) btn.style.display = navHistory.length > 0 ? 'inline-block' : 'none';
}

function recordFavourite(type, id) {
  var favs = type === 'section' ? sectionFavourites : assigneeFavourites;
  favs[id] = (favs[id] || 0) + 1;
  localStorage.setItem(type === 'section' ? 'momentum_sec_favs' : 'momentum_asg_favs', JSON.stringify(favs));
}

function getSortedSections(parentId, depth) {
  var result = [];
  var children = nodes.filter(function(n) {
    return n.parentId === (parentId || null) && n.isSection && n.name && n.name.trim();
  });
  // Sort: favourites first, then alphabetical
  children.sort(function(a, b) {
    var fa = sectionFavourites[a.id] || 0;
    var fb = sectionFavourites[b.id] || 0;
    if (fa !== fb) return fb - fa;
    return a.name.localeCompare(b.name);
  });
  children.forEach(function(n) {
    result.push({ node: n, depth: depth });
  });
  return result;
}

function getSortedAssignees() {
  // Merge team members from sheet with any found in nodes
  var userSet = {};
  // From sheet (authoritative)
  teamMembers.forEach(function(m) {
    userSet[m.email.toLowerCase()] = { email: m.email, name: m.name || m.email.split('@')[0] };
  });
  // From nodes (fallback for legacy data)
  nodes.forEach(function(n) {
    if (n.owner && n.owner.trim()) { var k = n.owner.trim().toLowerCase(); if (!userSet[k]) userSet[k] = { email: n.owner.trim(), name: n.owner.trim().split('@')[0] }; }
    if (n.assignedTo && n.assignedTo.trim()) { var k = n.assignedTo.trim().toLowerCase(); if (!userSet[k]) userSet[k] = { email: n.assignedTo.trim(), name: n.assignedTo.trim().split('@')[0] }; }
  });
  var users = Object.values(userSet);
  users.sort(function(a, b) {
    var fa = assigneeFavourites[a.email.toLowerCase()] || 0;
    var fb = assigneeFavourites[b.email.toLowerCase()] || 0;
    if (fa !== fb) return fb - fa;
    return a.name.localeCompare(b.name);
  });
  return users;
}

function showCombinedPicker(sourceNode) {
  if (document.getElementById('combinedPickerOverlay')) return;

  // State
  var pickerExpanded = {};
  // Expand current branch
  var p = sourceNode.parentId;
  while (p) {
    pickerExpanded[p] = true;
    var pn = nodes.find(function(n) { return n.id === p; });
    p = pn ? pn.parentId : null;
  }

  var selectedSection = lastPickedSection || sourceNode.parentId || null;
  var selectedAssignee = lastPickedAssignee || sourceNode.assignedTo || null;
  var focusCol = 'section'; // 'section' or 'assignee'
  var hiSection = selectedSection;
  var hiAssignee = selectedAssignee;

  var overlay = document.createElement('div');
  overlay.id = 'combinedPickerOverlay';
  overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.3);display:flex;align-items:center;justify-content:center;z-index:1000;';

  overlay.innerHTML =
    '<div style="background:var(--bg);border-radius:12px;border:0.5px solid var(--border2);width:600px;max-height:70vh;display:flex;flex-direction:column;box-shadow:0 4px 24px rgba(0,0,0,0.15);">' +
      '<div style="display:flex;border-bottom:0.5px solid var(--border);padding:10px 16px;font-size:12px;color:var(--text2);">↑↓ navigate &nbsp;·&nbsp; → expand &nbsp;·&nbsp; ← collapse &nbsp;·&nbsp; Tab switch column &nbsp;·&nbsp; Enter confirm &nbsp;·&nbsp; Esc cancel</div>' +
      '<div style="display:flex;flex:1;min-height:0;">' +
        '<div style="flex:1;border-right:0.5px solid var(--border);display:flex;flex-direction:column;">' +
          '<div id="secColHeader" style="padding:8px 12px;font-size:11px;font-weight:600;color:var(--text2);">SECTION</div>' +
          '<div id="secList" style="overflow-y:auto;flex:1;padding-bottom:8px;"></div>' +
        '</div>' +
        '<div style="flex:1;display:flex;flex-direction:column;">' +
          '<div id="asgColHeader" style="padding:8px 12px;font-size:11px;font-weight:600;color:var(--text2);">ASSIGN TO</div>' +
          '<div id="asgList" style="overflow-y:auto;flex:1;padding-bottom:8px;"></div>' +
        '</div>' +
      '</div>' +
      '<div style="padding:10px 16px;border-top:0.5px solid var(--border);font-size:12px;color:var(--text2);display:flex;justify-content:space-between;">' +
        '<span id="pickerStatus"></span>' +
        '<span>Enter to confirm</span>' +
      '</div>' +
    '</div>';

  document.body.appendChild(overlay);

  function getVisibleSections() {
    var result = [];
    function walk(parentId, depth) {
      var ch = nodes.filter(function(n) {
        return n.parentId === (parentId || null) && n.isSection && n.name && n.name.trim();
      });
      ch.sort(function(a, b) {
        var fa = sectionFavourites[a.id] || 0, fb = sectionFavourites[b.id] || 0;
        if (fa !== fb) return fb - fa;
        return a.name.localeCompare(b.name);
      });
      ch.forEach(function(n) {
        result.push({ node: n, depth: depth });
        if (pickerExpanded[n.id]) walk(n.id, depth + 1);
      });
    }
    walk(null, 0);
    return result;
  }

  function renderSections() {
    var visible = getVisibleSections();
    var list = document.getElementById('secList');
    if (!list) return;
    var hdr = document.getElementById('secColHeader');
    if (hdr) hdr.style.background = focusCol === 'section' ? 'var(--accent)' : '';
    if (hdr) hdr.style.color = focusCol === 'section' ? 'var(--bg)' : 'var(--text2)';

    list.innerHTML = visible.map(function(item) {
      var n = item.node;
      var hasChildren = nodes.some(function(c) { return c.parentId === n.id && c.isSection; });
      var isExp = pickerExpanded[n.id];
      var isHi = n.id === hiSection && focusCol === 'section';
      var isSel = n.id === selectedSection;
      var arrow = hasChildren ? (isExp ? '▼ ' : '▶ ') : '· ';
      var fav = sectionFavourites[n.id] > 0 ? '★ ' : '';
      var bg = isHi ? 'var(--accent)' : isSel ? 'var(--bg3)' : '';
      var col = isHi ? 'var(--bg)' : '';
      return '<div class="spick" data-id="' + n.id + '" style="padding:5px 12px 5px ' + (8 + item.depth * 16) + 'px;cursor:pointer;font-size:12px;background:' + bg + ';color:' + col + ';">' +
        '<span style="font-size:8px;opacity:0.5;">' + arrow + '</span>' +
        '<span style="font-size:9px;color:' + (isHi ? 'var(--bg)' : 'var(--accent)') + ';">' + fav + '</span>' +
        esc(n.name) + '</div>';
    }).join('');

    var hi = list.querySelector('[data-id="' + hiSection + '"]');
    if (hi) hi.scrollIntoView({ block: 'nearest' });
  }

  function renderAssignees() {
    var users = getSortedAssignees();
    var list = document.getElementById('asgList');
    if (!list) return;
    var hdr = document.getElementById('asgColHeader');
    if (hdr) hdr.style.background = focusCol === 'assignee' ? 'var(--accent)' : '';
    if (hdr) hdr.style.color = focusCol === 'assignee' ? 'var(--bg)' : 'var(--text2)';

    // Add "No assignee" option
    var noAssign = hiAssignee === null && focusCol === 'assignee';
    list.innerHTML = '<div class="apick" data-email="" style="padding:5px 12px;cursor:pointer;font-size:12px;background:' + (noAssign ? 'var(--accent)' : '') + ';color:' + (noAssign ? 'var(--bg)' : 'var(--text3)') + ';">· None</div>' +
      users.map(function(u) {
        var email = u.email || u;
        var name = u.name || (typeof u === 'string' ? u.split('@')[0] : email.split('@')[0]);
        var isHi = email.toLowerCase() === (hiAssignee || '').toLowerCase() && focusCol === 'assignee';
        var isSel = email.toLowerCase() === (selectedAssignee || '').toLowerCase();
        var isMe = email.toLowerCase() === (currentUser || '').toLowerCase();
        var fav = (assigneeFavourites[email.toLowerCase()] || 0) > 0 ? '★ ' : '';
        var bg = isHi ? 'var(--accent)' : isSel ? 'var(--bg3)' : '';
        var col = isHi ? 'var(--bg)' : '';
        return '<div class="apick" data-email="' + esc(email) + '" style="padding:5px 12px;cursor:pointer;font-size:12px;background:' + bg + ';color:' + col + ';">' +
          '<span style="font-size:9px;color:' + (isHi ? 'var(--bg)' : 'var(--accent)') + ';">' + fav + '</span>' +
          esc(name) + (isMe ? ' <span style="font-size:9px;opacity:0.6">(me)</span>' : '') +
          '<span style="font-size:9px;color:' + (isHi ? 'rgba(255,255,255,0.6)' : 'var(--text3)') + ';margin-left:4px;">' + esc(email) + '</span></div>';
      }).join('') +
      '<div class="apick-new" style="padding:5px 12px;cursor:pointer;font-size:12px;color:var(--accent);border-top:0.5px solid var(--border);margin-top:4px;">+ Add new member</div>';

    var hiEl = hiAssignee ? list.querySelector('[data-email="' + hiAssignee + '"]') : list.querySelector('[data-email=""]');
    if (hiEl) hiEl.scrollIntoView({ block: 'nearest' });
  }

  function updateStatus() {
    var s = document.getElementById('pickerStatus');
    if (!s) return;
    var secName = selectedSection ? (nodes.find(function(n){return n.id===selectedSection;})||{}).name || '' : '(none)';
    var asgName = selectedAssignee ? selectedAssignee.split('@')[0] : '(none)';
    s.textContent = 'Section: ' + secName + '  ·  Assign: ' + asgName;
  }

  function render() { renderSections(); renderAssignees(); updateStatus(); }
  render();

  function cleanup() {
    overlay.remove();
    document.removeEventListener('keydown', escH);
  }

  function confirm() {
    cleanup();
    // Record favourites
    if (selectedSection) recordFavourite('section', selectedSection);
    if (selectedAssignee) recordFavourite('assignee', selectedAssignee.toLowerCase());
    lastPickedSection = selectedSection;
    lastPickedAssignee = selectedAssignee;
    // Apply to node
    applyPicker(sourceNode, selectedSection, selectedAssignee);
  }

  var escH = function(e) {
    var visibleSecs = getVisibleSections();
    var secIds = visibleSecs.map(function(x) { return x.node.id; });
    var asgUsers = [''].concat(getSortedAssignees().map(function(u) { return u; }));

    if (focusCol === 'section') {
      var idx = secIds.indexOf(hiSection);
      if (e.key === 'ArrowDown') { e.preventDefault(); if (idx < secIds.length-1) hiSection = secIds[idx+1]; render(); }
      else if (e.key === 'ArrowUp') { e.preventDefault(); if (idx > 0) hiSection = secIds[idx-1]; render(); }
      else if (e.key === 'ArrowRight') {
        e.preventDefault();
        var hasChildren = nodes.some(function(c){ return c.parentId===hiSection && c.isSection; });
        if (hasChildren) { pickerExpanded[hiSection]=true; render(); }
        else { selectedSection = hiSection; focusCol='assignee'; render(); }
      }
      else if (e.key === 'ArrowLeft') {
        e.preventDefault();
        if (pickerExpanded[hiSection]) { delete pickerExpanded[hiSection]; render(); }
        else { var cur = nodes.find(function(n){return n.id===hiSection;}); if (cur&&cur.parentId) hiSection=cur.parentId; render(); }
      }
      else if (e.key === 'Enter') { e.preventDefault(); selectedSection=hiSection; focusCol='assignee'; render(); }
      else if (e.key === 'Tab') { e.preventDefault(); selectedSection=hiSection; focusCol='assignee'; render(); }
      else if (e.key === 'Escape') { cleanup(); }
    } else {
      var aIdx = asgUsers.indexOf(hiAssignee || '');
      if (e.key === 'ArrowDown') { e.preventDefault(); if (aIdx < asgUsers.length-1) { hiAssignee = asgUsers[aIdx+1] || null; } render(); }
      else if (e.key === 'ArrowUp') { e.preventDefault(); if (aIdx > 0) { hiAssignee = asgUsers[aIdx-1] || null; } render(); }
      else if (e.key === 'Enter') { e.preventDefault(); selectedAssignee = hiAssignee || null; confirm(); }
      else if (e.key === 'Tab') { e.preventDefault(); focusCol='section'; render(); }
      else if (e.key === 'Escape') { cleanup(); }
    }
  };

  // Click handlers
  overlay.querySelector('#secList').addEventListener('click', function(e) {
    var item = e.target.closest('.spick');
    if (!item) return;
    var id = item.dataset.id;
    var hasChildren = nodes.some(function(c){ return c.parentId===id && c.isSection; });
    if (id === hiSection) {
      if (hasChildren) { pickerExpanded[id]=!pickerExpanded[id]; }
      else { selectedSection=id; focusCol='assignee'; }
    } else {
      hiSection = id;
      if (hasChildren) pickerExpanded[id]=!pickerExpanded[id];
    }
    render();
  });

  overlay.querySelector('#asgList').addEventListener('click', function(e) {
    // Handle "Add new member" button
    if (e.target.closest('.apick-new')) {
      showAddMemberForm(overlay, function(email, name) {
        teamMembers.push({ email: email, name: name });
        hiAssignee = email;
        selectedAssignee = email;
        renderAssignees();
      });
      return;
    }
    var item = e.target.closest('.apick');
    if (!item) return;
    hiAssignee = item.dataset.email || null;
    selectedAssignee = hiAssignee;
    confirm();
  });

  overlay.addEventListener('click', function(e) { if (e.target===overlay) cleanup(); });
  setTimeout(function() { document.addEventListener('keydown', escH); }, 100);
}
