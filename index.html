    '<input id="newMemberEmail" type="email" placeholder="Email" style="width:100%;padding:7px 10px;border:0.5px solid var(--border2);border-radius:6px;background:var(--bg);color:var(--text);font-size:12px;margin-bottom:12px;box-sizing:border-box;">' +
    '<div style="display:flex;gap:8px;justify-content:flex-end;">' +
    '<button class="cancel-member-btn" style="padding:6px 14px;font-size:12px;border:0.5px solid var(--border2);border-radius:6px;background:var(--bg);cursor:pointer;">Cancel</button>' +
    '<button id="saveMemberBtn" style="padding:6px 14px;font-size:12px;border:none;border-radius:6px;background:var(--accent);color:var(--bg);cursor:pointer;font-weight:500;">Add</button>' +
    '</div></div>';
  parentOverlay.querySelector('div').style.position = 'relative';
  parentOverlay.querySelector('div').appendChild(form);
  form.querySelector('#newMemberName').focus();
  form.querySelector('.cancel-member-btn').onclick = function() { form.remove(); };
  // Tab toggles between name and email fields
  form.querySelector('#newMemberName').addEventListener('keydown', function(e) {
    if (e.key === 'Tab') { e.preventDefault(); form.querySelector('#newMemberEmail').focus(); }
    if (e.key === 'Enter') { e.preventDefault(); form.querySelector('#saveMemberBtn').click(); }
    if (e.key === 'Escape') { form.remove(); }
  });
  form.querySelector('#newMemberEmail').addEventListener('keydown', function(e) {
    if (e.key === 'Tab') { e.preventDefault(); form.querySelector('#newMemberName').focus(); }
    if (e.key === 'Enter') { e.preventDefault(); form.querySelector('#saveMemberBtn').click(); }
    if (e.key === 'Escape') { form.remove(); }
  });
  form.querySelector('#saveMemberBtn').onclick = function() {
    var name = form.querySelector('#newMemberName').value.trim();
    var email = form.querySelector('#newMemberEmail').value.trim().toLowerCase();
    if (!email || !email.includes('@')) { form.querySelector('#newMemberEmail').style.borderColor = 'var(--accent)'; form.querySelector('#newMemberEmail').focus(); return; }
    form.remove();
    gsr('saveTeamMember', { email: email, name: name }).catch(function(){});
    onSave(email, name || email.split('@')[0]);
  };
}

function applyPicker(node, sectionId, assigneeEmail) {
  pushUndo();
  if (sectionId) node.parentId = sectionId;
  node.assignedTo = assigneeEmail || null;
  node.assignedBy = assigneeEmail ? (currentUser || '') : null;
  node.date = node.date || localDateTime();
  // Reposition in tree
  var curIdx = nodes.findIndex(function(x) { return x.id === node.id; });
  nodes.splice(curIdx, 1);
  var parentIdx = nodes.findIndex(function(x) { return x.id === node.parentId; });
  var parentDesc = parentIdx >= 0 ? descendants(node.parentId) : [];
  var insertAfter = parentIdx;
  for (var di = parentIdx + 1; di < nodes.length; di++) {
    if (parentDesc.indexOf(nodes[di].id) > -1) insertAfter = di;
    else break;
  }
  node.order = orderBetween(insertAfter, insertAfter + 1);
  nodes.splice(insertAfter + 1, 0, node);
  if (sectionId) { collapsed[sectionId] = false; saveCollapsed(); }
  gsr('saveNodeServer', Object.assign({}, node)).catch(function(){});
  focusId = node.id;
  render();
}

function moveTo(node, parentId) {
  applyPicker(node, parentId, node.assignedTo || null);
}

function assignTo(node, email) {
  pushUndo();
  node.assignedTo = email || null;
  node.assignedBy = email ? (currentUser || '') : null;
  gsr('saveNodeServer', Object.assign({}, node)).catch(function(){});
  render();
}

function saveActiveInput() {
  // Save whatever the user is currently typing before any disruptive operation
  var inp = document.activeElement;
  if (inp && inp.classList.contains('node-input') && inp.value.trim()) {
    var n = nodes.find(function(x) { return x.id === inp.dataset.id; });
    if (n) {
      n.name = inp.value.trim();
      gsr('saveNodeServer', Object.assign({}, n)).catch(function(){});
    }
  }
}

function clearSelection() {
  selectedIds.clear();
  updateSelectionStyles();
}

function toggleSelect(id) {
  if (selectedIds.has(id)) selectedIds.delete(id);
  else selectedIds.add(id);
  updateSelectionStyles();
}

function updateSelectionStyles() {
  document.querySelectorAll('.node-row').forEach(function(r) {
    var sel = selectedIds.has(r.dataset.id);
    r.classList.toggle('selected', sel);
    var btn = r.querySelector('.sel-btn');
    if (btn) btn.textContent = sel ? '●' : '○';
  });
  var pill = document.getElementById('selectPill');
  if (pill) {
    if (selectedIds.size > 0) {
      pill.textContent = selectedIds.size + ' selected  ×';
      pill.style.display = 'inline-block';
    } else {
      pill.style.display = 'none';
    }
  }
}

function clearDropStyles() {
  document.querySelectorAll('.drop-above, .drop-below, .drop-child').forEach(function(el) {
    el.classList.remove('drop-above', 'drop-below', 'drop-child');
  });
}

function startDrag(e, id) {
  e.preventDefault();
  var el = document.getElementById('treeEl');
  var dragId = id;
  var dragOverId = null;
  var dropMode = null;
  var isDragging = false;
  var dragGhost = null;
  var dragStartX = e.clientX;
  var dragStartY = e.clientY;

  if (!selectedIds.has(dragId)) {
    selectedIds.clear();
    selectedIds.add(dragId);
    updateSelectionStyles();
  }

  function onMouseMove(mv) {
    var dx = mv.clientX - dragStartX;
    var dy = mv.clientY - dragStartY;
    if (!isDragging && (Math.abs(dx) > 4 || Math.abs(dy) > 4)) {
      isDragging = true;
      dragGhost = document.createElement('div');
      dragGhost.style.cssText = 'position:fixed;pointer-events:none;background:var(--bg);border:1px solid var(--accent);border-radius:4px;padding:4px 10px;font-size:12px;color:var(--text);opacity:0.9;z-index:9999;white-space:nowrap;box-shadow:0 2px 8px rgba(0,0,0,0.15);';
      var names = [...selectedIds].map(function(sid) {
        var n = nodes.find(function(x) { return x.id === sid; });
        return n ? n.name : sid;
      }).join(', ');
      dragGhost.textContent = (selectedIds.size > 1 ? selectedIds.size + ' items: ' : '') + names.slice(0, 40) + (names.length > 40 ? '…' : '');
      document.body.appendChild(dragGhost);
      selectedIds.forEach(function(sid) {
        var r = el ? el.querySelector('[data-id="' + sid + '"]') : null;
        if (r) r.classList.add('dragging');
      });
    }
    if (!isDragging) return;
    dragGhost.style.left = (mv.clientX + 12) + 'px';
    dragGhost.style.top = (mv.clientY - 10) + 'px';
    dragGhost.style.display = 'none';
    var target = document.elementFromPoint(mv.clientX, mv.clientY);
    dragGhost.style.display = '';
    var targetRow = target ? target.closest('.node-row') : null;
    clearDropStyles();
    if (targetRow && !selectedIds.has(targetRow.dataset.id)) {
      dragOverId = targetRow.dataset.id;
      var rect = targetRow.getBoundingClientRect();
      var y = mv.clientY - rect.top;
      var h = rect.height;
      dropMode = y < h * 0.28 ? 'above' : y > h * 0.72 ? 'below' : 'child';
      targetRow.classList.add('drop-' + dropMode);
    } else {
      dragOverId = null; dropMode = null;
    }
  }

  function onMouseUp() {
    document.removeEventListener('mousemove', onMouseMove);
    document.removeEventListener('mouseup', onMouseUp);
    if (dragGhost) { dragGhost.remove(); dragGhost = null; }
    if (el) el.querySelectorAll('.dragging').forEach(function(r) { r.classList.remove('dragging'); });
    clearDropStyles();
    if (isDragging && dragId && dragOverId) {
      performDrop([...selectedIds], dragOverId, dropMode);
    }
    isDragging = false;
  }

  document.addEventListener('mousemove', onMouseMove);
  document.addEventListener('mouseup', onMouseUp);
}

function performDrop(srcIds, tgtId, mode) {
  if (!Array.isArray(srcIds)) srcIds = [srcIds];
  pushUndo();

  var descOfSelected = new Set();
  srcIds.forEach(function(id) {
    descendants(id).forEach(function(d) {
      if (srcIds.indexOf(d) > -1) descOfSelected.add(d);
    });
  });

  srcIds = srcIds.filter(function(id) {
    if (id === tgtId) return false;
    if (descendants(id).indexOf(tgtId) > -1) return false;
    if (descOfSelected.has(id)) return false;
    return true;
  });
  if (!srcIds.length) return;

  var tgt = nodes.find(function(n) { return n.id === tgtId; });
  if (!tgt) return;

  var allMoveIds = new Set();
  srcIds.forEach(function(id) {
    allMoveIds.add(id);
    descendants(id).forEach(function(d) { allMoveIds.add(d); });
  });
  var moveNodes = nodes.filter(function(n) { return allMoveIds.has(n.id); });
  nodes = nodes.filter(function(n) { return !allMoveIds.has(n.id); });

  var tgtIdx = nodes.findIndex(function(n) { return n.id === tgtId; });
  var newParentId, insertAt;

  if (mode === 'child') {
    newParentId = tgtId;
    insertAt = tgtIdx + descendants(tgtId).length + 1;
    collapsed[tgtId] = false;
    saveCollapsed();
  } else if (mode === 'above') {
    newParentId = tgt.parentId;
    insertAt = tgtIdx;
  } else {
    newParentId = tgt.parentId;
    insertAt = tgtIdx + descendants(tgtId).length + 1;
  }

  srcIds.forEach(function(id) {
    var n = moveNodes.find(function(x) { return x.id === id; });
    if (n) n.parentId = newParentId;
  });

  nodes.splice.apply(nodes, [insertAt, 0].concat(moveNodes));

  srcIds.forEach(function(id) {
    var n = nodes.find(function(x) { return x.id === id; });
    if (n) {
      var idx = nodes.findIndex(function(x) { return x.id === id; });
      n.order = orderBetween(idx - 1, idx + 1);
      gsr('saveNodeServer', Object.assign({}, n)).catch(function(e) { console.error('drag save error', e); });
    }
  });

  render();
  // Keep selection visible after move — user clears manually via × button
  updateSelectionStyles();
}

// ── Undo ──────────────────────────────────────────────────────────────────────
var undoStack = []; // each entry: {nodes: [...], collapsed: {...}}
var redoStack = [];
var MAX_UNDO = 30;

function pushUndo() {
  undoStack.push({
    nodes: JSON.parse(JSON.stringify(nodes)),
    collapsed: JSON.parse(JSON.stringify(collapsed))
  });
  if (undoStack.length > MAX_UNDO) undoStack.shift();
  redoStack = []; // new action clears redo history
}

function undo() {
  if (!undoStack.length) return;
  opGeneration++;
  pendingSave.clear();
  clearTimeout(syncTimer);
  // Save current state to redo stack before restoring
  redoStack.push({
    nodes: JSON.parse(JSON.stringify(nodes)),
    collapsed: JSON.parse(JSON.stringify(collapsed))
  });
  if (redoStack.length > MAX_UNDO) redoStack.shift();
  var prev = undoStack.pop();

  // Find what changed: nodes that differ between current and previous state
  var prevMap = {};
  prev.nodes.forEach(function(n) { prevMap[n.id] = n; });
  var currMap = {};
  nodes.forEach(function(n) { currMap[n.id] = n; });

  // Nodes to save: in prev but not in current (restored deleted), or changed
  var toSave = prev.nodes.filter(function(n) {
    if (!n.name || !n.name.trim()) return false;
    var curr = currMap[n.id];
    if (!curr) return true; // was deleted, now restored
    // Check if anything meaningful changed
    return curr.name !== n.name || curr.parentId !== n.parentId ||
           curr.isSection !== n.isSection || curr.done !== n.done ||
           curr.date !== n.date || curr.order !== n.order;
  });

  // Nodes to delete: in current but not in prev (were just created)
  var toDelete = nodes.filter(function(n) { return !prevMap[n.id]; });

  nodes = prev.nodes;
  collapsed = prev.collapsed;
  saveCollapsed();

  var gen = opGeneration;
  toSave.forEach(function(n) {
    enqueue(function() {
      if (opGeneration !== gen) return Promise.resolve();
      return gsr('saveNodeServer', Object.assign({}, n)).catch(function(){});
    });
  });
  if (toDelete.length) {
    deleteRemote(null, toDelete.map(function(n) { return n.id; }));
  }

  render();
}

function redo() {
  if (!redoStack.length) return;
  opGeneration++;
  pendingSave.clear();
  clearTimeout(syncTimer);
  undoStack.push({
    nodes: JSON.parse(JSON.stringify(nodes)),
    collapsed: JSON.parse(JSON.stringify(collapsed))
  });
  var next = redoStack.pop();

  var nextMap = {};
  next.nodes.forEach(function(n) { nextMap[n.id] = n; });
  var currMap = {};
  nodes.forEach(function(n) { currMap[n.id] = n; });

  var toSave = next.nodes.filter(function(n) {
    if (!n.name || !n.name.trim()) return false;
    var curr = currMap[n.id];
    if (!curr) return true;
    return curr.name !== n.name || curr.parentId !== n.parentId ||
           curr.isSection !== n.isSection || curr.done !== n.done ||
           curr.date !== n.date || curr.order !== n.order;
  });
  var toDelete = nodes.filter(function(n) { return !nextMap[n.id]; });

  nodes = next.nodes;
  collapsed = next.collapsed;
  saveCollapsed();

  var gen = opGeneration;
  toSave.forEach(function(n) {
    enqueue(function() {
      if (opGeneration !== gen) return Promise.resolve();
      return gsr('saveNodeServer', Object.assign({}, n)).catch(function(){});
    });
  });
  if (toDelete.length) deleteRemote(null, toDelete.map(function(n) { return n.id; }));
  render();
}

document.addEventListener('keydown', function(e) {
  var inInput = document.activeElement && (document.activeElement.tagName === 'INPUT' || document.activeElement.tagName === 'TEXTAREA');
  if ((e.ctrlKey || e.metaKey) && e.key === 'z') {
    e.preventDefault();
    undo();
    return;
  }
  if ((e.ctrlKey || e.metaKey) && (e.key === 'y' || e.key === 'Y')) {
    e.preventDefault();
    redo();
    return;
  }
  // Alt+Left: back navigation
  if (e.altKey && e.key === 'ArrowLeft') {
    e.preventDefault();
    navBack();
    return;
  }

  // Ctrl+Shift+X: promote focused node to today
  if ((e.ctrlKey || e.metaKey) && e.shiftKey && (e.key === 'X' || e.key === 'x')) {
    e.preventDefault();
    var focusedNode = nodes.find(function(n) { return n.id === focusId; });
    if (focusedNode && !focusedNode.isSection) {
      pushUndo();
      // Save current input value first
      var inp = focusId ? document.getElementById('inp_' + focusId) : null;
      if (inp && inp.value.trim()) focusedNode.name = inp.value.trim();
      focusedNode.date = localDateTime();
      gsr('saveNodeServer', Object.assign({}, focusedNode)).catch(function(){});
      render();
    }
    return;
  }

  // Ctrl+Shift+C: collapse/expand focused node or all
  if ((e.ctrlKey || e.metaKey) && e.shiftKey && (e.key === 'C' || e.key === 'c')) {
    e.preventDefault();
    if (focusId) {
      // Toggle collapse of focused node
      if (children(focusId).length > 0) {
        collapsed[focusId] = !collapsed[focusId];
        saveCollapsed();
        render();
      }
    } else {
      collapseAll();
    }
    return;
  }

  // Ctrl+Shift+S: toggle section/task for all selected nodes (works even in textarea)
  if ((e.ctrlKey || e.metaKey) && e.shiftKey && (e.key === 'S' || e.key === 's') && selectedIds.size > 0) {
    e.preventDefault();
    pushUndo();
    selectedIds.forEach(function(id) {
      var n = nodes.find(function(x) { return x.id === id; });
      if (!n) return;
      n.isSection = !n.isSection;
      if (!n.isSection && !n.date) n.date = localDateTime();
      gsr('saveNodeServer', Object.assign({}, n)).catch(function(){});
    });
    render();
    return;
  }
  // Delete/Backspace with selected nodes (not in input)
  if ((e.key === 'Delete' || e.key === 'Backspace') && !inInput && selectedIds.size > 0) {
    e.preventDefault();
    var names = [...selectedIds].map(function(id) {
      var n = nodes.find(x => x.id === id);
      return n ? '"' + (n.name || 'unnamed') + '"' : id;
    }).join(', ');
    var totalChildren = [...selectedIds].reduce(function(acc, id) {
      return acc + descendants(id).length;
    }, 0);
    var msg = 'Delete ' + selectedIds.size + ' item' + (selectedIds.size > 1 ? 's' : '') +
      (totalChildren > 0 ? ' and ' + totalChildren + ' child item' + (totalChildren === 1 ? '' : 's') : '') + '?';
    showDeleteConfirm(msg, function() {
      saveActiveInput();
      pushUndo();
      var toDelete = new Set();
      selectedIds.forEach(function(id) {
        toDelete.add(id);
        descendants(id).forEach(function(d) { toDelete.add(d); });
      });
      var snapToDelete = [...toDelete]; // capture before modifying nodes
      nodes = nodes.filter(function(n) { return !toDelete.has(n.id); });
      deleteRemote(null, snapToDelete);
      selectedIds.clear();
      updateSelectionStyles();
      render();
    });
  }
});

// ── Identity ──────────────────────────────────────────────────────────────────
function showEmailPrompt() {
  var overlay = document.createElement('div');
  overlay.id = 'emailOverlay';
  overlay.style.cssText = 'position:fixed;inset:0;background:var(--bg3);display:flex;align-items:center;justify-content:center;z-index:1000;';
  overlay.innerHTML = '<div style="background:var(--bg);border-radius:12px;border:0.5px solid var(--border2);padding:32px;width:360px;box-shadow:0 4px 24px rgba(0,0,0,0.12);">' +
    '<h2 style="font-size:18px;font-weight:500;margin-bottom:8px;">Welcome to Momentum</h2>' +
    '<p style="font-size:13px;color:var(--text2);margin-bottom:20px;line-height:1.6;">Enter your email to get started. You must be on the approved list.</p>' +
    '<input id="emailInput" type="email" placeholder="you@example.com" style="width:100%;font-size:13px;padding:9px 12px;border:0.5px solid var(--border2);border-radius:8px;background:var(--bg);color:var(--text);margin-bottom:8px;box-sizing:border-box;" />' +
    '<p id="emailError" style="font-size:12px;color:#e24b4a;margin-bottom:8px;display:none;">Not on the approved list. Contact your admin.</p>' +
    '<button onclick="saveEmail()" style="width:100%;padding:10px;font-size:13px;border:none;border-radius:8px;cursor:pointer;background:var(--accent);color:var(--bg);font-weight:500;">Get started</button>' +
    '</div>';
  document.body.appendChild(overlay);
  var input = overlay.querySelector('#emailInput');
  input.focus();
  input.addEventListener('keydown', function(e) { if (e.key === 'Enter') saveEmail(); });
}

function saveEmail() {
  var input = document.getElementById('emailInput');
  var errEl = document.getElementById('emailError');
  if (!input) return;
  var email = input.value.trim().toLowerCase();
  if (!email || !email.includes('@')) { input.style.borderColor = '#e24b4a'; input.focus(); return; }
  gsr('getInitialData', email).then(function(data) {
    if (!data.user) {
      if (errEl) errEl.style.display = 'block';
      input.style.borderColor = '#e24b4a';
      return;
    }
    localStorage.setItem('momentum_user_email', data.user);
    currentUser = data.user;
    var overlay = document.getElementById('emailOverlay');
    if (overlay) overlay.remove();
    var pill = document.getElementById('userPill');
    if (pill) pill.textContent = currentUser;
    nodes = normalizeNodes(data.nodes || []);
  // Also load team members
  gsr('getTeamMembers').then(function(members) { teamMembers = members || []; }).catch(function(){});
    render();
    setInterval(function() { if (pendingSave.size === 0 && !syncTimer && opQueueDepth === 0 && !document.activeElement.classList.contains('node-input')) fetchAll(); }, 30000);
  }).catch(function(e) { console.error('login error', e); });
}

function switchUser() {
  localStorage.removeItem('momentum_user_email');
  currentUser = '';
  nodes = [];
  var appUrl = window.location.href.split('?')[0];
  gsr('revokeAccess').then(function() {
    window.top.location.href = 'https://accounts.google.com/Logout?continue=' +
      encodeURIComponent('https://accounts.google.com/AccountChooser?continue=' + encodeURIComponent(appUrl));
  }).catch(function() {
    window.top.location.href = 'https://accounts.google.com/AccountChooser?continue=' + encodeURIComponent(appUrl);
  });
}

// ── Boot ──────────────────────────────────────────────────────────────────────
function waitForGoogleScript(callback, attempts) {
  attempts = attempts || 0;
  if (typeof google !== 'undefined' && google.script && google.script.run) {
    callback();
  } else if (attempts < 20) {
    setTimeout(function() { waitForGoogleScript(callback, attempts + 1); }, 250);
  } else {
    document.getElementById('treeEl').innerHTML = '<div class="empty">Could not connect to Google Apps Script.<br>Make sure you are signed into Google and try refreshing.</div>';
  }
}

document.addEventListener('DOMContentLoaded', () => {
  document.querySelectorAll('.tab').forEach(t => t.onclick = () => {
    pushNav();
    activeTab = t.dataset.tab;
    if (activeTab !== 'tree') zoomedId = null;
    document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
    t.classList.add('active');
    updateZoomCrumb();
    render();
  });
  document.getElementById('collapseBtn').onclick = collapseAll;
  // Refresh when user returns to this tab
  document.addEventListener('visibilitychange', function() {
    if (!document.hidden && opQueueDepth === 0 && !document.activeElement.classList.contains('node-input')) {
      fetchAll();
    }
  });

  waitForGoogleScript(function() {
    // Get verified identity from server first, then load data
    gsr('whoAmI').then(function(r) {
      if (r && r.email) {
        currentUser = r.email;
        localStorage.setItem('momentum_user_email', r.email);
        var pill = document.getElementById('userPill');
        if (pill) pill.textContent = currentUser;
        fetchAll();
        setInterval(function() { if (pendingSave.size === 0 && !syncTimer && opQueueDepth === 0 && !document.activeElement.classList.contains('node-input')) fetchAll(); }, 30000);
      } else {
        // Server couldn't identify - fall back to stored or prompt
        var storedEmail = localStorage.getItem('momentum_user_email');
        if (storedEmail) {
          currentUser = storedEmail;
          var pill = document.getElementById('userPill');
          if (pill) pill.textContent = currentUser;
          fetchAll();
          setInterval(function() { if (pendingSave.size === 0 && !syncTimer && opQueueDepth === 0 && !document.activeElement.classList.contains('node-input')) fetchAll(); }, 30000);
        } else {
          showEmailPrompt();
        }
      }
    }).catch(function(e) {
      if (e && e.authUrl) {
        document.getElementById('treeEl').innerHTML = '<div class="empty" style="padding:32px;">' +
          '<p style="margin-bottom:16px;">Please authorise this app with your Google account.</p>' +
          '<a href="' + e.authUrl + '" target="_top" style="display:inline-block;padding:10px 20px;background:var(--accent);color:var(--bg);border-radius:8px;text-decoration:none;">Authorise</a>' +
          '</div>';
      } else {
        // whoAmI failed - try fetching anyway (may work with stored email)
        var stored = localStorage.getItem('momentum_user_email');
        if (stored) {
          currentUser = stored;
          var pill = document.getElementById('userPill');
          if (pill) pill.textContent = currentUser;
          fetchAll();
          setInterval(function() { if (!syncTimer && opQueueDepth === 0 && !document.activeElement.classList.contains('node-input')) fetchAll(); }, 30000);
        } else {
          showEmailPrompt();
        }
      }
    });
  });
});
