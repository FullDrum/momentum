var ICON_CATEGORIES = [
  {id: 'all',    label: 'All'},
  {id: 'general',label: 'General'},
  {id: 'work',   label: 'Work'},
  {id: 'tech',   label: 'Tech'},
  {id: 'design', label: 'Design'},
  {id: 'science',label: 'Science'},
  {id: 'data',   label: 'Data'},
  {id: 'ops',    label: 'Ops'},
  {id: 'life',   label: 'Life'},
];

function lucideSVG(paths) {
  return '<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">' + paths + '</svg>';
}

function suggestIcon(name) {
  if (!name) return 'folder';
  var lower = name.toLowerCase();
  var best = 'folder', bestScore = 0;
  Object.keys(LUCIDE_ICONS).forEach(function(key) {
    var tags = LUCIDE_ICONS[key][2];
    var score = 0;
    tags.split(' ').forEach(function(tag) {
      if (lower.includes(tag)) score += tag.length;
    });
    if (score > bestScore) { bestScore = score; best = key; }
  });
  return best;
}

function getSectionIcon(nodeId, name) {
  return sectionIcons[nodeId] || suggestIcon(name);
}

function setSectionIcon(nodeId, iconKey) {
  sectionIcons[nodeId] = iconKey;
  localStorage.setItem('momentum_icons', JSON.stringify(sectionIcons));
}

function renderSectionIcon(nodeId, name) {
  var key = getSectionIcon(nodeId, name);
  var icon = LUCIDE_ICONS[key] || LUCIDE_ICONS['folder'];
  return lucideSVG(icon[0]);
}

function showIconPicker(nodeId, anchorEl) {
  var existing = document.getElementById('iconPickerEl');
  if (existing) { existing.remove(); if (existing.dataset.nodeId === nodeId) return; }

  var currentKey = getSectionIcon(nodeId, (nodes.find(function(n){return n.id===nodeId;})||{}).name||'');
  var activeCategory = 'all';
  var searchVal = '';

  var picker = document.createElement('div');
  picker.id = 'iconPickerEl';
  picker.className = 'icon-picker';
  picker.dataset.nodeId = nodeId;
  document.body.appendChild(picker);

  function getFiltered() {
    return Object.keys(LUCIDE_ICONS).filter(function(key) {
      var icon = LUCIDE_ICONS[key];
      var matchesCat = activeCategory === 'all' || icon[1] === activeCategory;
      var matchesSearch = !searchVal || key.includes(searchVal) || icon[2].includes(searchVal);
      return matchesCat && matchesSearch;
    });
  }

  function renderPicker() {
    var filtered = getFiltered();
    var catsHTML = ICON_CATEGORIES.map(function(c) {
      return '<button class="icon-picker-cat' + (c.id === activeCategory ? ' active' : '') + '" data-cat="' + c.id + '">' + c.label + '</button>';
    }).join('');
    var gridHTML = filtered.length
      ? filtered.map(function(key) {
          var icon = LUCIDE_ICONS[key];
          return '<div class="icon-picker-item' + (key === currentKey ? ' active' : '') + '" data-icon="' + key + '" title="' + key.replace(/-/g,' ') + '">' + lucideSVG(icon[0]) + '</div>';
        }).join('')
      : '<div class="icon-picker-none">No icons found</div>';
    picker.innerHTML =
      '<input class="icon-picker-search" placeholder="Search icons…" value="' + searchVal + '" />' +
      '<div class="icon-picker-cats">' + catsHTML + '</div>' +
      '<div class="icon-picker-grid">' + gridHTML + '</div>';

    // Wire search
    var searchEl = picker.querySelector('.icon-picker-search');
    searchEl.focus();
    searchEl.addEventListener('input', function() {
      searchVal = searchEl.value.trim().toLowerCase();
      renderPicker();
    });
    searchEl.addEventListener('keydown', function(e) {
      if (e.key === 'Escape') { picker.remove(); document.removeEventListener('click', outsideClick); }
    });
    // Wire category buttons
    picker.querySelectorAll('.icon-picker-cat').forEach(function(btn) {
      btn.onclick = function(e) { e.stopPropagation(); activeCategory = btn.dataset.cat; renderPicker(); };
    });
    // Wire icon items
    picker.querySelectorAll('.icon-picker-item').forEach(function(item) {
      item.onclick = function(e) {
        e.stopPropagation();
        setSectionIcon(nodeId, item.dataset.icon);
        picker.remove();
        document.removeEventListener('click', outsideClick);
        // Update icon in DOM
        var iconEl = document.querySelector('.section-icon[data-iconid="' + nodeId + '"]');
        if (iconEl) iconEl.innerHTML = lucideSVG(LUCIDE_ICONS[item.dataset.icon][0]);
      };
    });
  }

  renderPicker();

  // Position
  var rect = anchorEl.getBoundingClientRect();
  var top = rect.bottom + 4;
  var left = rect.left;
  if (left + 320 > window.innerWidth) left = window.innerWidth - 328;
  if (top + 340 > window.innerHeight) top = rect.top - 344;
  picker.style.top = top + 'px';
  picker.style.left = left + 'px';

  function outsideClick(e) {
    if (!picker.contains(e.target)) { picker.remove(); document.removeEventListener('click', outsideClick); }
  }
  setTimeout(function() { document.addEventListener('click', outsideClick); }, 50);
}

function toggleSearch() {
  searchOpen = !searchOpen;
  var bar = document.getElementById('searchBar');
  if (bar) bar.classList.toggle('hidden', !searchOpen);
  if (searchOpen) {
    var inp = document.getElementById('searchInput');
    if (inp) { inp.focus(); inp.select(); }
  } else {
    clearSearch();
  }
}

function openSearch() {
  searchOpen = true;
  var bar = document.getElementById('searchBar');
  if (bar) bar.classList.remove('hidden');
  var inp = document.getElementById('searchInput');
  if (inp) { inp.focus(); inp.select(); }
}

function clearSearch() {
  searchQuery = '';
  searchResultIds = [];
  searchActiveIdx = -1;
  var inp = document.getElementById('searchInput');
  if (inp) inp.value = '';
  updateSearchCount();
  // Remove search highlights from DOM
  document.querySelectorAll('.search-active-row').forEach(function(r) { r.classList.remove('search-active-row'); });
  if (searchOpen) {
    // Keep bar open but clear results — just re-render normally
    render();
  }
}

function runSearch(q) {
  searchQuery = q.trim().toLowerCase();
  searchActiveIdx = -1;
  if (!searchQuery) {
    searchResultIds = [];
    updateSearchCount();
    render();
    return;
  }
  // Match nodes whose name contains the query as a substring (case-insensitive)
  // Also match against breadcrumb path
  searchResultIds = nodes.filter(function(n) {
    if (!n.name) return false;
    var name = n.name.toLowerCase();
    if (name.includes(searchQuery)) return true;
    // Also search breadcrumb path
    var bc = breadcrumb(n.id).toLowerCase();
    return bc.includes(searchQuery);
  }).map(function(n) { return n.id; });

  updateSearchCount();
  renderSearchResults();
  // Auto-highlight first result
  if (searchResultIds.length > 0) {
    searchActiveIdx = 0;
    highlightSearchActive();
  }
}

function updateSearchCount() {
  var countEl = document.getElementById('searchCount');
  if (!countEl) return;
  if (!searchQuery) { countEl.textContent = ''; return; }
  var total = searchResultIds.length;
  if (total === 0) { countEl.textContent = 'No results'; return; }
  var cur = searchActiveIdx >= 0 ? (searchActiveIdx + 1) : '?';
  countEl.textContent = cur + ' / ' + total;
}

function renderSearchResults() {
  var el = document.getElementById('treeEl');
  if (!el) return;
  suppressBlur = true;

  if (!searchResultIds.length) {
    el.innerHTML = '<div class="empty" style="padding:40px 24px;">No results for <strong>' + esc(searchQuery) + '</strong></div>';
    setTimeout(function() { suppressBlur = false; }, 200);
    return;
  }

  var html = '<div class="section-label" style="padding:10px 14px 4px;">' +
    searchResultIds.length + ' result' + (searchResultIds.length === 1 ? '' : 's') + ' for "' + esc(searchQuery) + '"</div>';

  html += searchResultIds.map(function(id) {
    var n = nodes.find(function(x) { return x.id === id; });
    if (!n) return '';
    return searchRowHTML(n);
  }).join('');

  el.innerHTML = html;
  attachSearchEvents();
  setTimeout(function() { suppressBlur = false; }, 200);
}

function highlightSearchActive() {
  // Remove previous active highlight
  document.querySelectorAll('.search-active-row').forEach(function(r) { r.classList.remove('search-active-row'); });
  if (searchActiveIdx < 0 || searchActiveIdx >= searchResultIds.length) { updateSearchCount(); return; }
  var id = searchResultIds[searchActiveIdx];
  var row = document.querySelector('[data-id="' + id + '"]');
  if (row) {
    row.classList.add('search-active-row');
    row.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }
  updateSearchCount();
}

function searchNext() {
  if (!searchResultIds.length) return;
  searchActiveIdx = (searchActiveIdx + 1) % searchResultIds.length;
  highlightSearchActive();
}

function searchPrev() {
  if (!searchResultIds.length) return;
  searchActiveIdx = (searchActiveIdx - 1 + searchResultIds.length) % searchResultIds.length;
  highlightSearchActive();
}

function highlightText(text, query) {
  if (!query) return esc(text);
  var safe = esc(text);
  var safeQ = esc(query);
  // Case-insensitive replace, preserving original case
  var result = '';
  var lower = text.toLowerCase();
  var lq = query.toLowerCase();
  var i = 0;
  while (i < text.length) {
    var idx = lower.indexOf(lq, i);
    if (idx === -1) { result += esc(text.slice(i)); break; }
    result += esc(text.slice(i, idx));
    result += '<mark>' + esc(text.slice(idx, idx + query.length)) + '</mark>';
    i = idx + query.length;
  }
  return result;
}

function searchRowHTML(n) {
  var bc = breadcrumb(n.id);
  var nd = n.date ? n.date.slice(0,10) : null;
  var markerEl = n.isSection
    ? '<span class="section-icon" data-iconid="' + n.id + '">' + renderSectionIcon(n.id, n.name) + '</span>'
    : '<input type="checkbox" class="node-check" data-check="' + n.id + '" ' + (n.done ? 'checked' : '') + ' ' + (!canEdit(n) ? 'disabled' : '') + ' />';
  var nameHtml = highlightText(n.name || '', searchQuery);
  var bcHtml = bc ? highlightText(bc, searchQuery) : '';
  var cls = ['node-input', !n.isSection && n.done ? 'done' : '', n.isSection ? 'is-section' : ''].filter(Boolean).join(' ');

  var rowClass = ['node-row', 'search-result-row',
    n.assignedTo === currentUser && n.assignedBy ? 'assigned-to-me' : '',
    n.assignedBy === currentUser && n.assignedTo !== currentUser ? 'assigned-by-me' : ''
  ].filter(Boolean).join(' ');

  var meta = '';
  if (bc) meta += '<span class="breadcrumb project-link" data-goto="' + n.id + '" title="Go to in Projects">' + bcHtml + '</span>';
  if (n.assignedTo && n.assignedTo !== currentUser) meta += '<span class="assignee-badge">' + esc(getMemberName(n.assignedTo)) + '</span>';
  meta += '<span class="today-badge' + (nd === TODAY ? ' is-today' : '') + '">' + (nd === TODAY ? 'today' : nd ? nd.slice(8) + '/' + nd.slice(5,7) : '—') + '</span>';

  var acts = '';
  if (canEdit(n)) {
    if (!n.isSection) acts += '<button class="act-btn" data-promote="' + n.id + '">↑ today</button>';
    if (isOwner(n)) acts += '<button class="act-btn" data-del="' + n.id + '">✕</button>';
  }

  // Use a div for the name display (not editable textarea in search results — read-only display)
  var nameEl = '<div class="' + cls + '" id="inp_' + n.id + '" data-id="' + n.id + '" data-flat="true" style="pointer-events:none;user-select:text;">' + nameHtml + '</div>';

  return '<div class="' + rowClass + '" data-id="' + n.id + '" style="padding-left:8px;">' +
    markerEl + nameEl + meta + acts + '</div>';
}

function attachSearchEvents() {
  var el = document.getElementById('treeEl');
  if (!el) return;
  el.querySelectorAll('[data-check]').forEach(function(cb) {
    cb.onchange = function() {
      var n = nodes.find(function(x) { return x.id === cb.dataset.check; });
      if (n) {
        pushUndo();
        n.done = cb.checked;
        n.completedDate = n.done ? TODAY : null;
        scheduleSave(n);
        var row = cb.closest('.node-row');
        if (row) {
          var nameEl = row.querySelector('.node-input');
          if (nameEl) nameEl.classList.toggle('done', n.done);
          var dispEl = row.querySelector('.node-display');
          if (dispEl) {
            dispEl.classList.toggle('done', n.done);
            dispEl.innerHTML = renderMarkdown(n.name) || '';
          }
        }
      }
    };
  });
  el.querySelectorAll('[data-goto]').forEach(function(b) {
    b.onclick = function(e) {
      e.stopPropagation();
      var nodeId = b.dataset.goto;
      // Switch to Projects tab and navigate to this node
      pushNav();
      activeTab = 'tree';
      document.querySelectorAll('.tab').forEach(function(x) { x.classList.remove('active'); });
      var treeTab = document.querySelector('.tab[data-tab="tree"]');
      if (treeTab) treeTab.classList.add('active');
      zoomedId = null;
      // Uncollapse ancestors
      var cur = nodes.find(function(x) { return x.id === nodeId; });
      while (cur && cur.parentId) {
        collapsed[cur.parentId] = false;
        cur = nodes.find(function(x) { return x.id === cur.parentId; });
      }
      saveCollapsed();
      // Close search
      searchOpen = false;
      var bar = document.getElementById('searchBar');
      if (bar) bar.classList.add('hidden');
      clearSearch();
      focusId = nodeId;
      render();
      setTimeout(function() {
        var row = document.querySelector('[data-id="' + nodeId + '"]');
        if (row) row.scrollIntoView({ behavior: 'smooth', block: 'center' });
      }, 100);
    };
  });
  el.querySelectorAll('[data-promote]').forEach(function(b) {
    b.onclick = function(e) {
      e.stopPropagation();
      var n = nodes.find(function(x) { return x.id === b.dataset.promote; });
      if (n) { pushUndo(); n.date = localDateTime(); scheduleSave(n); renderSearchResults(); }
    };
  });
  el.querySelectorAll('[data-del]').forEach(function(b) {
    b.onclick = function(e) {
      e.stopPropagation();
      var id = b.dataset.del;
      var n = nodes.find(function(x) { return x.id === id; });
      if (!n) return;
      var childCount = descendants(id).length;
      var msg = childCount > 0
        ? 'Delete "' + (n.name || 'this item') + '" and its ' + childCount + ' child' + (childCount === 1 ? '' : 'ren') + '?'
        : 'Delete "' + (n.name || 'this item') + '"?';
      showDeleteConfirm(msg, function() {
        pushUndo();
        var snapIds = [id].concat(descendants(id));
        nodes = nodes.filter(function(x) { return snapIds.indexOf(x.id) === -1; });
        searchResultIds = searchResultIds.filter(function(x) { return snapIds.indexOf(x) === -1; });
        deleteRemote(null, snapIds);
        renderSearchResults();
      });
    };
  });
  // Click on a search result row navigates to it
  el.querySelectorAll('.search-result-row').forEach(function(row) {
    row.onclick = function(e) {
      if (e.target.closest('input, button, .breadcrumb')) return;
      var id = row.dataset.id;
      var idx = searchResultIds.indexOf(id);
      if (idx > -1) {
        searchActiveIdx = idx;
        highlightSearchActive();
      }
    };
  });
}

function initDragAndDrop() {
  var el = document.getElementById('treeEl');
  if (!el || el._dragInited) return;
  el._dragInited = true;

  // ── Mouse drag selection ─────────────────────────────────────────────────
  var dragSelectStart = null;
  var dragSelecting = false;

  var longPressTimer = null;
  var longPressId = null;

  el.addEventListener('mousedown', function(e) {
    if (e.button !== 0) return;
    if (e.target.closest('input[type=checkbox], button, .toggle, .drag-handle, .sel-btn, a')) return;
    var row = e.target.closest('.node-row');
    if (!row) return;
    dragSelectStart = row.dataset.id;
    dragSelecting = false;

    // Long press: enter selection mode after 500ms if mouse doesn't move
    longPressId = row.dataset.id;
    longPressTimer = setTimeout(function() {
      if (!dragSelecting && longPressId) {
        if (document.activeElement && document.activeElement.classList.contains('node-input')) {
          document.activeElement.blur();
        }
        selectedIds.clear();
        selectedIds.add(longPressId);
        selectionMode = true;
        justLongPressed = true;
        lastSelectedId = longPressId;
        updateSelectionStyles();
        dragSelectStart = null;
      }
    }, 500);
  });

  el.addEventListener('mousemove', function(e) {
    if (!dragSelectStart) return;
    // Cancel long press if mouse moves
    if (longPressTimer) { clearTimeout(longPressTimer); longPressTimer = null; }
    var row = e.target.closest('.node-row');
    if (!row) return;
    var endId = row.dataset.id;
    if (endId === dragSelectStart && !dragSelecting) return;
    if (!dragSelecting) {
      // Just started dragging - blur any focused input to prevent cursor issues
      if (document.activeElement && document.activeElement.classList.contains('node-input')) {
        document.activeElement.blur();
      }
    }
    dragSelecting = true;
    e.preventDefault();
    // Select all rows between start and current
    var rows = [...el.querySelectorAll('.node-row')];
    var startIdx = rows.findIndex(function(r) { return r.dataset.id === dragSelectStart; });
    var endIdx = rows.findIndex(function(r) { return r.dataset.id === endId; });
    if (startIdx === -1 || endIdx === -1) return;
    var min = Math.min(startIdx, endIdx);
    var max = Math.max(startIdx, endIdx);
    selectedIds.clear();
    for (var i = min; i <= max; i++) {
      if (rows[i].dataset.id) selectedIds.add(rows[i].dataset.id);
    }
    updateSelectionStyles();
  });

  document.addEventListener('mouseup', function() {
    if (longPressTimer) { clearTimeout(longPressTimer); longPressTimer = null; }
    longPressId = null;
    dragSelectStart = null;
    dragSelecting = false;
  });

  // Click to select
  var justLongPressed = false;

  el.addEventListener('click', function(e) {
    // If selection mode was just entered by a long press, eat this click
    if (justLongPressed) { justLongPressed = false; return; }

    var selBtn = e.target.closest('.sel-btn');
    if (selBtn) return; // handled by inline onclick

    var row = e.target.closest('.node-row');
    if (!row || e.target.closest('input, button, .toggle, .drag-handle')) return;

    var id = row.dataset.id;
    if (!id) return;

    if (selectionMode) {
      if (e.shiftKey && lastSelectedId) {
        // Shift+click: select range between lastSelectedId and this row
        var rows = [...el.querySelectorAll('.node-row')];
        var anchorIdx = rows.findIndex(function(r) { return r.dataset.id === lastSelectedId; });
        var curIdx = rows.findIndex(function(r) { return r.dataset.id === id; });
        if (anchorIdx !== -1 && curIdx !== -1) {
          var min = Math.min(anchorIdx, curIdx);
          var max = Math.max(anchorIdx, curIdx);
          for (var i = min; i <= max; i++) {
            if (rows[i].dataset.id) selectedIds.add(rows[i].dataset.id);
          }
          updateSelectionStyles();
        }
      } else if (e.ctrlKey || e.metaKey) {
        // Ctrl/Cmd+click: toggle individual node
        if (selectedIds.has(id)) {
          selectedIds.delete(id);
          if (selectedIds.size === 0) { selectionMode = false; lastSelectedId = null; }
        } else {
          selectedIds.add(id);
        }
        lastSelectedId = id;
        updateSelectionStyles();
      } else {
        // Plain click in selection mode: clear and exit
        selectedIds.clear();
        selectionMode = false;
        lastSelectedId = null;
        updateSelectionStyles();
      }
    } else {
      // Not in selection mode: plain click does nothing for selection
      if (selectedIds.size > 0) {
        selectedIds.clear();
        updateSelectionStyles();
      }
    }
  });
}

function updateZoomCrumb() {
  var crumb = document.getElementById('zoomCrumb');
  if (!crumb) return;
  if (!zoomedId || activeTab !== 'tree') {
    crumb.style.display = 'none';
    return;
  }
  // Build breadcrumb path
  var path = ancestors(zoomedId).concat([nodes.find(function(n){ return n.id === zoomedId; })]).filter(Boolean);
    var html = '<span style="cursor:pointer;color:var(--text3);" data-zoomout="root">⌂ All</span>';
  path.forEach(function(n, i) {
    html += ' <span style="color:var(--text3);">›</span> ';
    if (i < path.length - 1) {
      html += '<span style="cursor:pointer;" data-zoomout="' + n.id + '">' + esc(n.name) + '</span>';
    } else {
      html += '<strong>' + esc(n.name) + '</strong>';

  // Wire up breadcrumb clicks
  crumb.querySelectorAll('[data-zoomout]').forEach(function(el) {

}

function orderBetween(beforeIdx, afterIdx) {
  // Returns an order value that sorts between nodes at beforeIdx and afterIdx in the nodes array
  var before = beforeIdx >= 0 ? (nodes[beforeIdx] ? Number(nodes[beforeIdx].order) || 0 : 0) : 0;
  var after = afterIdx < nodes.length ? (nodes[afterIdx] ? Number(nodes[afterIdx].order) || 0 : 0) : 0;
  if (after === 0 || after <= before) {
    return before + 1000; // append after
  }
  return Math.floor((before + after) / 2) || (before + 1000);
}

function recordFavourite(type, id) {
  var favs = type === 'section' ? sectionFavourites : assigneeFavourites;
  favs[id] = (favs[id] || 0) + 1;
  localStorage.setItem(type === 'section' ? 'momentum_sec_favs' : 'momentum_asg_favs', JSON.stringify(favs));
}

function getSortedSections(parentId, depth) {
  var result = [];
  var children = nodes.filter(function(n) {
    return n.parentId === (parentId || null) && n.isSection && n.name && n.name.trim();
  });
  // Sort: favourites first, then alphabetical
  children.sort(function(a, b) {
    var fa = sectionFavourites[a.id] || 0;
    var fb = sectionFavourites[b.id] || 0;
    if (fa !== fb) return fb - fa;
    return a.name.localeCompare(b.name);
  });
  children.forEach(function(n) {
    result.push({ node: n, depth: depth });
  });
  return result;
}

function getSortedAssignees() {
  // Merge team members from sheet with any found in nodes
  var userSet = {};
  // From sheet (authoritative)
  teamMembers.forEach(function(m) {
    userSet[m.email.toLowerCase()] = { email: m.email, name: m.name || m.email.split('@')[0] };
  });
  // From nodes (fallback for legacy data)
  nodes.forEach(function(n) {
    if (n.owner && n.owner.trim()) { var k = n.owner.trim().toLowerCase(); if (!userSet[k]) userSet[k] = { email: n.owner.trim(), name: n.owner.trim().split('@')[0] }; }
    if (n.assignedTo && n.assignedTo.trim()) { var k = n.assignedTo.trim().toLowerCase(); if (!userSet[k]) userSet[k] = { email: n.assignedTo.trim(), name: n.assignedTo.trim().split('@')[0] }; }
  });
  var users = Object.values(userSet);
  users.sort(function(a, b) {
    var fa = assigneeFavourites[a.email.toLowerCase()] || 0;
    var fb = assigneeFavourites[b.email.toLowerCase()] || 0;
    if (fa !== fb) return fb - fa;
    return a.name.localeCompare(b.name);
  });
  return users;
}

function showCombinedPicker(sourceNode) {

  // State

  // Expand current branch

  while (p) {
    pickerExpanded[p] = true;
    var pn = nodes.find(function(n) { return n.id === p; });
    p = pn ? pn.parentId : null;
  }

  var selectedSection = lastPickedSection || sourceNode.parentId || null;
  var selectedAssignee = lastPickedAssignee || sourceNode.assignedTo || null;
  var focusCol = 'section'; // 'section' or 'assignee'
  var hiSection = selectedSection;
  var hiAssignee = selectedAssignee;

  var overlay = document.createElement('div');
  overlay.id = 'combinedPickerOverlay';

      '<div style="display:flex;border-bottom:0.5px solid var(--border);padding:8px 16px;font-size:11px;color:var(--text3);">↑↓ navigate &nbsp;·&nbsp; Tab switch column &nbsp;·&nbsp; Enter confirm section / done &nbsp;·&nbsp; Esc cancel</div>' +
      '<div style="display:flex;flex:1;min-height:0;">' +
        '<div style="flex:1;border-right:0.5px solid var(--border);display:flex;flex-direction:column;">' +
          '<div id="secColHeader" style="padding:8px 12px;font-size:11px;font-weight:600;color:var(--text2);">SECTION</div>' +
          '<div id="secList" style="overflow-y:auto;flex:1;padding-bottom:8px;"></div>' +
        '</div>' +
        '<div style="flex:1;display:flex;flex-direction:column;">' +
          '<div id="asgColHeader" style="padding:8px 12px;font-size:11px;font-weight:600;color:var(--text2);">ASSIGN TO</div>' +
          '<div id="asgList" style="overflow-y:auto;flex:1;padding-bottom:8px;"></div>' +
        '</div>' +
      '</div>' +
      '<div style="padding:8px 16px;border-top:0.5px solid var(--border);font-size:12px;color:var(--text2);display:flex;align-items:center;justify-content:space-between;">' +
        '<span id="pickerStatus" style="font-size:11px;"></span>' +
        '<button id="pickerDoneBtn" style="padding:6px 20px;font-size:12px;font-weight:500;border:none;border-radius:6px;background:var(--accent);color:var(--bg);cursor:pointer;">Done</button>' +
      '</div>' +
    '</div>';

  document.body.appendChild(overlay);

  function getVisibleSections() {
    var result = [];
    function walk(parentId, depth) {
      var ch = nodes.filter(function(n) {
        return n.parentId === (parentId || null) && n.isSection && n.name && n.name.trim();
      });
      ch.sort(function(a, b) {
        var fa = sectionFavourites[a.id] || 0, fb = sectionFavourites[b.id] || 0;
        if (fa !== fb) return fb - fa;
        return a.name.localeCompare(b.name);
      });
      ch.forEach(function(n) {
        result.push({ node: n, depth: depth });
        if (pickerExpanded[n.id]) walk(n.id, depth + 1);
      });
    }
    walk(null, 0);
    return result;
  }

  function renderSections() {
    var visible = getVisibleSections();
    var list = document.getElementById('secList');
    if (!list) return;
    var hdr = document.getElementById('secColHeader');
    if (hdr) hdr.style.background = focusCol === 'section' ? 'var(--accent)' : '';
    if (hdr) hdr.style.color = focusCol === 'section' ? 'var(--bg)' : 'var(--text2)';

    list.innerHTML = visible.map(function(item) {
      var n = item.node;
      var hasChildren = nodes.some(function(c) { return c.parentId === n.id && c.isSection; });
      var isExp = pickerExpanded[n.id];
      var isHi = n.id === hiSection && focusCol === 'section';
      var isSel = n.id === selectedSection;
      var arrow = hasChildren ? (isExp ? '▼ ' : '▶ ') : '· ';
      var fav = sectionFavourites[n.id] > 0 ? '★ ' : '';
      var bg = isHi ? 'var(--accent)' : isSel ? 'var(--bg3)' : '';
      var col = isHi ? 'var(--bg)' : '';
      return '<div class="spick" data-id="' + n.id + '" style="padding:5px 12px 5px ' + (8 + item.depth * 16) + 'px;cursor:pointer;font-size:12px;background:' + bg + ';color:' + col + ';">' +
        '<span style="font-size:8px;opacity:0.5;">' + arrow + '</span>' +

    var list = document.getElementById('asgList');
    if (!list) return;
    var hdr = document.getElementById('asgColHeader');
    if (hdr) hdr.style.background = focusCol === 'assignee' ? 'var(--accent)' : '';
    if (hdr) hdr.style.color = focusCol === 'assignee' ? 'var(--bg)' : 'var(--text2)';

    // Add "No assignee" option
    var noAssign = hiAssignee === null && focusCol === 'assignee';
    list.innerHTML = '<div class="apick" data-email="" style="padding:5px 12px;cursor:pointer;font-size:12px;background:' + (noAssign ? 'var(--accent)' : '') + ';color:' + (noAssign ? 'var(--bg)' : 'var(--text3)') + ';">· None</div>' +
      users.map(function(u) {
        var email = u.email || u;
        var name = u.name || (typeof u === 'string' ? u.split('@')[0] : email.split('@')[0]);
        var isHi = email.toLowerCase() === (hiAssignee || '').toLowerCase() && focusCol === 'assignee';
        var isSel = email.toLowerCase() === (selectedAssignee || '').toLowerCase();
        var isMe = email.toLowerCase() === (currentUser || '').toLowerCase();
        var fav = (assigneeFavourites[email.toLowerCase()] || 0) > 0 ? '★ ' : '';
        var bg = isHi ? 'var(--accent)' : isSel ? 'var(--bg3)' : '';
        var col = isHi ? 'var(--bg)' : '';
        return '<div class="apick" data-email="' + esc(email) + '" style="padding:5px 12px;cursor:pointer;font-size:12px;background:' + bg + ';color:' + col + ';">' +
          '<span style="font-size:9px;color:' + (isHi ? 'var(--bg)' : 'var(--accent)') + ';">' + fav + '</span>' +
          esc(name) + (isMe ? ' <span style="font-size:9px;opacity:0.6">(me)</span>' : '') +
          '<span style="font-size:9px;color:' + (isHi ? 'rgba(255,255,255,0.6)' : 'var(--text3)') + ';margin-left:4px;">' + esc(email) + '</span></div>';
      }).join('') +
      (function() {
        var isHiNew = hiAssignee === '__add_new__' && focusCol === 'assignee';
        return '<div class="apick-new" style="padding:5px 12px;cursor:pointer;font-size:12px;color:' + (isHiNew ? 'var(--bg)' : 'var(--accent)') + ';background:' + (isHiNew ? 'var(--accent)' : '') + ';border-top:0.5px solid var(--border);margin-top:4px;">+ Add new member</div>';
      })();

    var hiEl;
    if (hiAssignee === '__add_new__') {
      hiEl = list.querySelector('.apick-new');
    } else {
      hiEl = hiAssignee ? list.querySelector('[data-email="' + hiAssignee + '"]') : list.querySelector('[data-email=""]');
    }
    if (hiEl) hiEl.scrollIntoView({ block: 'nearest' });
  }

  function updateStatus() {
    var s = document.getElementById('pickerStatus');
    if (!s) return;
    var secName = selectedSection ? (nodes.find(function(n){return n.id===selectedSection;})||{}).name || '' : '(none)';
    var asgName = selectedAssignee ? selectedAssignee.split('@')[0] : '(none)';
    s.textContent = 'Section: ' + secName + '  ·  Assign: ' + asgName;
  }

  function render() { renderSections(); renderAssignees(); updateStatus(); }
  render();

  function cleanup() {
    overlay.remove();
    document.removeEventListener('keydown', escH);
  }

  function confirm() {
    cleanup();
    // Record favourites
    if (selectedSection) recordFavourite('section', selectedSection);
    if (selectedAssignee) recordFavourite('assignee', selectedAssignee.toLowerCase());
    lastPickedSection = selectedSection;
    lastPickedAssignee = selectedAssignee;
    // Apply to node
    applyPicker(sourceNode, selectedSection, selectedAssignee);
  }

  var escH = function(e) {
    var visibleSecs = getVisibleSections();
    var secIds = visibleSecs.map(function(x) { return x.node.id; });
    // Assignee list: array of email strings ('' = none)
    var asgEmailList = [''].concat(getSortedAssignees().map(function(u) { return u.email || u; }));

    var ADD_NEW_SENTINEL = '__add_new__';

    if (focusCol === 'section') {
      var idx = secIds.indexOf(hiSection);
      if (e.key === 'ArrowDown') {
        e.preventDefault();
        if (idx < secIds.length - 1) hiSection = secIds[idx + 1];
        render();
      }
      else if (e.key === 'ArrowUp') {
        e.preventDefault();
        if (idx > 0) hiSection = secIds[idx - 1];
        render();
      }
      else if (e.key === 'ArrowRight') {
        // Only expand/collapse tree — never jump to assignee column
        e.preventDefault();
        var hasChildren = nodes.some(function(c){ return c.parentId === hiSection && c.isSection; });
        if (hasChildren) { pickerExpanded[hiSection] = true; render(); }
      }
      else if (e.key === 'ArrowLeft') {
        e.preventDefault();
        if (pickerExpanded[hiSection]) { delete pickerExpanded[hiSection]; render(); }
        else { var cur = nodes.find(function(n){ return n.id === hiSection; }); if (cur && cur.parentId) hiSection = cur.parentId; render(); }
      }
      else if (e.key === 'Enter') {
        // Enter on section: lock in this section and confirm immediately (keep current assignee)
        e.preventDefault();
        selectedSection = hiSection;
        selectedAssignee = hiAssignee || null;
        confirm();
      }
      else if (e.key === 'Tab') {
        // Tab: move to assignee column
        e.preventDefault();
        selectedSection = hiSection;
        focusCol = 'assignee';
        render();
      }
      else if (e.key === 'Escape') { cleanup(); }
    } else {
      // Assignee column — list includes '' (none), emails, and ADD_NEW_SENTINEL at end
      var asgFullList = [''].concat(getSortedAssignees().map(function(u) { return u.email || u; })).concat([ADD_NEW_SENTINEL]);
      var aIdx = asgFullList.indexOf(hiAssignee || '');
      if (e.key === 'ArrowDown') {
        e.preventDefault();
        var next = aIdx + 1;
        if (next < asgFullList.length) hiAssignee = asgFullList[next];
        render();
      }
      else if (e.key === 'ArrowUp') {
        e.preventDefault();
        var prev = aIdx - 1;
        if (prev >= 0) hiAssignee = asgFullList[prev];
        render();
      }
      else if (e.key === 'Enter') {
        e.preventDefault();
        if (hiAssignee === ADD_NEW_SENTINEL) {
          // Open add member form
          showAddMemberForm(overlay, function(email, name) {
            teamMembers.push({ email: email, name: name });
            hiAssignee = email;
            selectedAssignee = email;
            render();
          });
        } else {
          // Enter on assignee: confirm both and close
          selectedAssignee = hiAssignee || null;
          confirm();
        }
      }
      else if (e.key === 'Tab') {
        // Tab: cycle back to section column
        e.preventDefault();
        if (hiAssignee !== ADD_NEW_SENTINEL) selectedAssignee = hiAssignee || null;
        focusCol = 'section';
        render();
      }
      else if (e.key === 'Escape') { cleanup(); }
    }
  };

  // Click handlers
  overlay.querySelector('#secList').addEventListener('click', function(e) {
    var item = e.target.closest('.spick');
    if (!item) return;
    var id = item.dataset.id;
    var hasChildren = nodes.some(function(c){ return c.parentId===id && c.isSection; });
    if (hasChildren) {

function applyPicker(node, sectionId, assigneeEmail) {
  pushUndo();
  if (sectionId) node.parentId = sectionId;
  node.assignedTo = assigneeEmail || null;
  node.assignedBy = assigneeEmail ? (currentUser || '') : null;
  node.date = node.date || localDateTime();
  // Reposition in tree
  var curIdx = nodes.findIndex(function(x) { return x.id === node.id; });
  nodes.splice(curIdx, 1);
  var parentIdx = nodes.findIndex(function(x) { return x.id === node.parentId; });
  var parentDesc = parentIdx >= 0 ? descendants(node.parentId) : [];
  var insertAfter = parentIdx;
  for (var di = parentIdx + 1; di < nodes.length; di++) {
    if (parentDesc.indexOf(nodes[di].id) > -1) insertAfter = di;
    else break;
  }
  node.order = orderBetween(insertAfter, insertAfter + 1);
  nodes.splice(insertAfter + 1, 0, node);
  if (sectionId) { collapsed[sectionId] = false; saveCollapsed(); }
  scheduleSave(node);
  focusId = node.id;
  render();
}

function moveTo(node, parentId) {
  applyPicker(node, parentId, node.assignedTo || null);
}

function assignTo(node, email) {
  pushUndo();
  node.assignedTo = email || null;
  node.assignedBy = email ? (currentUser || '') : null;
  scheduleSave(node);
  render();
}

function saveActiveInput() {
  // Save whatever the user is currently typing before any disruptive operation
  var inp = document.activeElement;
  if (inp && inp.classList.contains('node-input') && inp.value.trim()) {
    var n = nodes.find(function(x) { return x.id === inp.dataset.id; });
    if (n) {
      n.name = inp.value.trim();
      scheduleSave(n);
    }
  }
}

function startDrag(e, id) {
  e.preventDefault();
  var el = document.getElementById('treeEl');
  var dragId = id;
  var dragOverId = null;
  var dropMode = null;
  var isDragging = false;
  var dragGhost = null;
  var dragStartX = e.clientX;
  var dragStartY = e.clientY;
  var autoScrollRAF = null;
  var lastMv = null;
  var SCROLL_ZONE = 60; // px from edge to start scrolling
  var SCROLL_SPEED = 12; // px per frame

  if (!selectedIds.has(dragId)) {
    selectedIds.clear();
    selectedIds.add(dragId);
    updateSelectionStyles();
  }

  function autoScroll() {
    if (!isDragging || !lastMv || !el) { autoScrollRAF = null; return; }
    var rect = el.getBoundingClientRect();
    var y = lastMv.clientY;
    var scrolled = false;
    if (y > rect.bottom - SCROLL_ZONE) {
      // Near bottom — scroll down
      var intensity = Math.min(1, (y - (rect.bottom - SCROLL_ZONE)) / SCROLL_ZONE);
      el.scrollTop += Math.ceil(SCROLL_SPEED * intensity);
      scrolled = true;
    } else if (y < rect.top + SCROLL_ZONE) {
      // Near top — scroll up
      var intensity = Math.min(1, ((rect.top + SCROLL_ZONE) - y) / SCROLL_ZONE);
      el.scrollTop -= Math.ceil(SCROLL_SPEED * intensity);
      scrolled = true;
    }
    if (scrolled) {
      // Re-evaluate drop target after scroll
      updateDropTarget(lastMv);
    }
    autoScrollRAF = requestAnimationFrame(autoScroll);
  }

  function updateDropTarget(mv) {
    if (!dragGhost) return;
    dragGhost.style.display = 'none';
    var target = document.elementFromPoint(mv.clientX, mv.clientY);
    dragGhost.style.display = '';
    var targetRow = target ? target.closest('.node-row') : null;
    clearDropStyles();
    if (targetRow && !selectedIds.has(targetRow.dataset.id)) {
      dragOverId = targetRow.dataset.id;
      var rect = targetRow.getBoundingClientRect();
      var y = mv.clientY - rect.top;
      var h = rect.height;
      dropMode = y < h * 0.28 ? 'above' : y > h * 0.72 ? 'below' : 'child';
      targetRow.classList.add('drop-' + dropMode);
    } else {
      dragOverId = null; dropMode = null;
    }
  }

  function onMouseMove(mv) {
    var dx = mv.clientX - dragStartX;
    var dy = mv.clientY - dragStartY;
    if (!isDragging && (Math.abs(dx) > 4 || Math.abs(dy) > 4)) {
      isDragging = true;
      dragGhost = document.createElement('div');
      dragGhost.style.cssText = 'position:fixed;pointer-events:none;background:var(--bg);border:1px solid var(--accent);border-radius:4px;padding:4px 10px;font-size:12px;color:var(--text);opacity:0.9;z-index:9999;white-space:nowrap;box-shadow:0 2px 8px rgba(0,0,0,0.15);';
      var names = [...selectedIds].map(function(sid) {
        var n = nodes.find(function(x) { return x.id === sid; });
        return n ? n.name : sid;
      }).join(', ');
      dragGhost.textContent = (selectedIds.size > 1 ? selectedIds.size + ' items: ' : '') + names.slice(0, 40) + (names.length > 40 ? '…' : '');
      document.body.appendChild(dragGhost);
      selectedIds.forEach(function(sid) {
        var r = el ? el.querySelector('[data-id="' + sid + '"]') : null;
        if (r) r.classList.add('dragging');
      });
      // Start auto-scroll loop
      autoScrollRAF = requestAnimationFrame(autoScroll);
    }
    if (!isDragging) return;
    lastMv = mv;
    dragGhost.style.left = (mv.clientX + 12) + 'px';
    dragGhost.style.top = (mv.clientY - 10) + 'px';
    updateDropTarget(mv);
  }

  function onMouseUp() {
    document.removeEventListener('mousemove', onMouseMove);
    document.removeEventListener('mouseup', onMouseUp);
    if (autoScrollRAF) { cancelAnimationFrame(autoScrollRAF); autoScrollRAF = null; }
    if (dragGhost) { dragGhost.remove(); dragGhost = null; }
    if (el) el.querySelectorAll('.dragging').forEach(function(r) { r.classList.remove('dragging'); });
    clearDropStyles();
    if (isDragging && dragId && dragOverId) {
      performDrop([...selectedIds], dragOverId, dropMode);
    }
    isDragging = false;
  }

  document.addEventListener('mousemove', onMouseMove);
  document.addEventListener('mouseup', onMouseUp);
}

function performDrop(srcIds, tgtId, mode) {
  if (!Array.isArray(srcIds)) srcIds = [srcIds];
  pushUndo();

  var descOfSelected = new Set();
  srcIds.forEach(function(id) {
    descendants(id).forEach(function(d) {
      if (srcIds.indexOf(d) > -1) descOfSelected.add(d);
    });
  });

  srcIds = srcIds.filter(function(id) {
    if (id === tgtId) return false;
    if (descendants(id).indexOf(tgtId) > -1) return false;
    if (descOfSelected.has(id)) return false;
    return true;
  });
  if (!srcIds.length) return;

  var tgt = nodes.find(function(n) { return n.id === tgtId; });
  if (!tgt) return;

  var allMoveIds = new Set();
  srcIds.forEach(function(id) {
    allMoveIds.add(id);
    descendants(id).forEach(function(d) { allMoveIds.add(d); });
  });
  var moveNodes = nodes.filter(function(n) { return allMoveIds.has(n.id); });
  nodes = nodes.filter(function(n) { return !allMoveIds.has(n.id); });

  var tgtIdx = nodes.findIndex(function(n) { return n.id === tgtId; });
  var newParentId, insertAt;

  var isFlat = (activeTab === 'today' || activeTab === 'all' || activeTab === 'assigned');

  // In flat views, never allow nesting — treat child drop as below
  if (mode === 'child' && isFlat) mode = 'below';

  var newParentId, insertAt;

  if (mode === 'child') {
    newParentId = tgtId;
    insertAt = tgtIdx + descendants(tgtId).length + 1;
    collapsed[tgtId] = false;
    saveCollapsed();
  } else if (mode === 'above') {
    newParentId = tgt.parentId;
    insertAt = tgtIdx;
  } else { // below
    newParentId = tgt.parentId;
    insertAt = tgtIdx + descendants(tgtId).length + 1;
  }

  srcIds.forEach(function(id) {
    var n = moveNodes.find(function(x) { return x.id === id; });
    if (n) {
      // In flat views preserve each node's own parentId — only reorder, don't reparent
      if (!isFlat) n.parentId = newParentId;
    }
  });

  nodes.splice.apply(nodes, [insertAt, 0].concat(moveNodes));

  srcIds.forEach(function(id) {
    var n = nodes.find(function(x) { return x.id === id; });
    if (n) {
      var idx = nodes.findIndex(function(x) { return x.id === id; });
      n.order = orderBetween(idx - 1, idx + 1);
      scheduleSave(n);
    }
  });

  render();
  // Keep selection visible after move — user clears manually via × button
  updateSelectionStyles();
}

// ── Undo ──────────────────────────────────────────────────────────────────────
var undoStack = []; // each entry: {nodes: [...], collapsed: {...}}
var redoStack = [];
var MAX_UNDO = 30;

function pushUndo() {
  undoStack.push({
    nodes: JSON.parse(JSON.stringify(nodes)),
    collapsed: JSON.parse(JSON.stringify(collapsed)),
    tab: activeTab,
    zoomedId: zoomedId
  });
  if (undoStack.length > MAX_UNDO) undoStack.shift();
  redoStack = [];
}

function undo() {
  if (!undoStack.length) return;
  bumpGeneration();
  // Clear any pending saves/deletes — they reflected pre-undo state and are now invalid
  queueState.saves = {};
  queueState.deletes = {};
  persistQueue();
  if (flushTimer) { clearTimeout(flushTimer); flushTimer = null; }
  // Save current state to redo stack before restoring
  redoStack.push({
    nodes: JSON.parse(JSON.stringify(nodes)),
    collapsed: JSON.parse(JSON.stringify(collapsed))
  });
  if (redoStack.length > MAX_UNDO) redoStack.shift();
  var prev = undoStack.pop();

  // Find what changed: nodes that differ between current and previous state
  var prevMap = {};
  prev.nodes.forEach(function(n) { prevMap[n.id] = n; });
  var currMap = {};
  nodes.forEach(function(n) { currMap[n.id] = n; });

  // Nodes to save: in prev but not in current (restored deleted), or changed
  var toSave = prev.nodes.filter(function(n) {
    if (!n.name || !n.name.trim()) return false;
    var curr = currMap[n.id];
    if (!curr) return true; // was deleted, now restored
    // Check if anything meaningful changed
    return curr.name !== n.name || curr.parentId !== n.parentId ||
           curr.isSection !== n.isSection || curr.done !== n.done ||
           curr.date !== n.date || curr.order !== n.order;
  });

  // Nodes to delete: in current but not in prev (were just created)
  var toDelete = nodes.filter(function(n) { return !prevMap[n.id]; });

  nodes = prev.nodes;
  collapsed = prev.collapsed;
  if (prev.tab && prev.tab !== activeTab) {
    activeTab = prev.tab;
    document.querySelectorAll('.tab').forEach(function(t){ t.classList.toggle('active', t.dataset.tab === activeTab); });
    document.querySelectorAll('.mobile-nav-btn').forEach(function(t){ t.classList.toggle('active', t.dataset.tab === activeTab); });
  }
  if (prev.zoomedId !== undefined) { zoomedId = prev.zoomedId; updateZoomCrumb(); }
  saveCollapsed();

  // Queue the restored nodes for save (they are the truth now)
  toSave.forEach(function(n) {
    // Mark as touched so reconcile won't overwrite them before the batch goes out
    touchNode(n.id);
    queueState.saves[n.id] = Object.assign({}, n);
  });
  if (toDelete.length) {
    toDelete.forEach(function(n) {
      touchNode(n.id);
      queueState.deletes[n.id] = true;
      delete queueState.saves[n.id];
    });
  }
  persistQueue();
  if (toSave.length || toDelete.length) armFlush();

  render();
}

function redo() {
  if (!redoStack.length) return;
  bumpGeneration();
  queueState.saves = {};
  queueState.deletes = {};
  persistQueue();
  if (flushTimer) { clearTimeout(flushTimer); flushTimer = null; }
  undoStack.push({
    nodes: JSON.parse(JSON.stringify(nodes)),
    collapsed: JSON.parse(JSON.stringify(collapsed))
  });
  var next = redoStack.pop();

  var nextMap = {};
  next.nodes.forEach(function(n) { nextMap[n.id] = n; });
  var currMap = {};
  nodes.forEach(function(n) { currMap[n.id] = n; });

  var toSave = next.nodes.filter(function(n) {
    if (!n.name || !n.name.trim()) return false;
    var curr = currMap[n.id];
    if (!curr) return true;
    return curr.name !== n.name || curr.parentId !== n.parentId ||
           curr.isSection !== n.isSection || curr.done !== n.done ||
           curr.date !== n.date || curr.order !== n.order;
  });
  var toDelete = nodes.filter(function(n) { return !nextMap[n.id]; });

  nodes = next.nodes;
  collapsed = next.collapsed;
  saveCollapsed();

  toSave.forEach(function(n) {
    touchNode(n.id);
    queueState.saves[n.id] = Object.assign({}, n);
  });
  toDelete.forEach(function(n) {
    touchNode(n.id);
    queueState.deletes[n.id] = true;
    delete queueState.saves[n.id];
  });
  persistQueue();
  if (toSave.length || toDelete.length) armFlush();
  render();
}
