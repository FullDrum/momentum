<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #ffffff; --bg2: #f5f5f3; --bg3: #eeede9;
    --text: #1a1a1a; --text2: #666; --text3: #aaa;
    --border: rgba(0,0,0,0.1); --border2: rgba(0,0,0,0.18);
    --radius: 8px; --accent: #1a1a1a;
    --blue: #378ADD; --blue-bg: #E6F1FB; --blue-text: #185FA5;
    --green: #1D9E75; --green-bg: #E1F5EE; --green-text: #0F6E56;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1c1c1c; --bg2: #242424; --bg3: #2c2c2a;
      --text: #e8e8e6; --text2: #999; --text3: #555;
      --border: rgba(255,255,255,0.1); --border2: rgba(255,255,255,0.18);
      --accent: #e8e8e6;
    }
  }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg3); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 24px 16px; }
  .app { width: 100%; max-width: 860px; background: var(--bg); border-radius: 12px; border: 0.5px solid var(--border2); overflow: hidden; display: flex; flex-direction: column; height: 92vh; box-shadow: 0 2px 16px rgba(0,0,0,0.07); position: relative; }
  /* Google sign-in screen */
  .signin-screen { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 20px; padding: 48px 32px; }
  .signin-screen h1 { font-size: 28px; font-weight: 600; }
  .signin-screen p { font-size: 14px; color: var(--text2); text-align: center; max-width: 320px; line-height: 1.6; }
  .g-signin-btn { display: flex; align-items: center; gap: 12px; padding: 12px 24px; border: 1px solid var(--border2); border-radius: 8px; background: var(--bg); color: var(--text); font-size: 15px; font-weight: 500; cursor: pointer; }
  .g-signin-btn:hover { background: var(--bg2); }
  .g-signin-btn svg { width: 20px; height: 20px; flex-shrink: 0; }
  /* Setup */
  .setup { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 14px; padding: 48px 32px; }
  .setup h1 { font-size: 22px; font-weight: 500; }
  .setup p { font-size: 13px; color: var(--text2); text-align: center; max-width: 420px; line-height: 1.6; }
  .setup input { width: 100%; max-width: 460px; font-size: 13px; padding: 9px 13px; border: 0.5px solid var(--border2); border-radius: var(--radius); background: var(--bg); color: var(--text); outline: none; }
  .setup input:focus { border-color: var(--blue); }
  .setup button { font-size: 13px; padding: 9px 24px; border: none; border-radius: var(--radius); cursor: pointer; background: var(--accent); color: var(--bg); font-weight: 500; }
  .setup .err { font-size: 12px; color: #e24b4a; }
  code { font-family: monospace; font-size: 12px; background: var(--bg2); padding: 2px 5px; border-radius: 4px; }
  /* Toolbar */
  .toolbar { display: flex; align-items: center; gap: 8px; padding: 0 14px; border-bottom: 0.5px solid var(--border); background: var(--bg2); flex-wrap: nowrap; flex-shrink: 0; height: 38px; overflow: hidden; }
  .hint-bar { font-size: 11px; color: var(--text3); flex: 1; min-width: 100px; }
  .kbd { display: inline-block; font-family: monospace; font-size: 10px; background: var(--bg); border: 0.5px solid var(--border2); border-radius: 3px; padding: 0 3px; color: var(--text2); }
  .toolbar button { font-size: 11px; padding: 4px 10px; border: 0.5px solid var(--border2); border-radius: var(--radius); cursor: pointer; background: var(--bg); color: var(--text); white-space: nowrap; }
  .toolbar button:hover { background: var(--bg2); }
  .user-pill { font-size: 11px; color: var(--text2); background: var(--bg); border: 0.5px solid var(--border); border-radius: 10px; padding: 2px 9px; white-space: nowrap; max-width: 200px; overflow: hidden; text-overflow: ellipsis; }
  .desktop-only { display: inline-block; }
  .is-mobile .desktop-only { display: none !important; }
  .sync-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--text3); flex-shrink: 0; transition: background 0.3s; }
  .sync-dot.syncing { background: #f0a500; }
  .sync-dot.ok { background: #3aaa6e; }
  .sync-dot.err { background: #e24b4a; }
  /* Tabs */
  .tabs { display: flex; border-bottom: 0.5px solid var(--border); flex-shrink: 0; }
  .tab { flex: 1; padding: 9px; font-size: 12px; font-weight: 500; text-align: center; cursor: pointer; color: var(--text2); background: none; border: none; border-bottom: 2px solid transparent; }
  .tab.active { color: var(--text); border-bottom-color: var(--accent); }
  .tab:hover:not(.active) { background: var(--bg2); color: var(--text); }
  /* Tree */
  .tree { flex: 1; overflow-y: auto; padding: 4px 0 60px; }
  .tree.drag-selecting { user-select: none; }
  .node-row { display: flex; align-items: flex-start; border-radius: 4px; min-height: 28px; }
  .node-row .toggle, .node-row .drag-handle, .node-row .sel-btn, .node-row .node-check, .node-row .section-dot { flex-shrink: 0;  align-self: flex-start; margin-top: 6px; }
  .node-row:hover { background: var(--bg2); }
  .node-row.focused { background: var(--bg2); }
  .node-row.assigned-to-me { border-left: 2px solid var(--blue); }
  .node-row.assigned-by-me { border-left: 2px solid var(--green); }
  .toggle { width: 20px; height: 20px; display: flex; align-items: center; justify-content: center; font-size: 9px; color: var(--text3); flex-shrink: 0; cursor: pointer; user-select: none; align-self: flex-start; margin-top: 3px; position: relative; }
  .zoom-dot { font-size: 9px; color: var(--text3); position: absolute; left: -10px; top: 4px; cursor: zoom-in; opacity: 0; transition: opacity 0.15s, color 0.15s; }
  .node-row:hover .zoom-dot { opacity: 1; }
  .zoom-dot:hover { color: var(--accent); }
  .toggle:hover { color: var(--text); }
  .toggle.leaf { cursor: default; font-size: 9px; line-height: 1; width: 20px; }
  .node-check { width: 14px; height: 14px; cursor: pointer; accent-color: var(--accent); flex-shrink: 0; margin-right: 5px;  align-self: flex-start; margin-top: 5px; }
  .section-dot { width: 14px; height: 14px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-right: 5px; }
  .section-dot.zoomable { cursor: zoom-in; }

  .section-dot.zoomable:hover::before { background: var(--accent) !important; transform: scale(1.5); transition: all 0.15s; }
  .toggle.leaf.zoomable { cursor: zoom-in; transition: color 0.15s; }
  .toggle.leaf.zoomable:hover { color: var(--accent); transform: scale(1.4); }
  .section-dot::before { content:''; display:block; width:6px; height:6px; border-radius:50%; background: var(--border2); }
  /* Section icons */
  .section-icon { width: 16px; height: 16px; flex-shrink: 0; margin-right: 6px; cursor: pointer; user-select: none; align-self: flex-start; margin-top: 4px; opacity: 0.65; transition: opacity 0.15s, transform 0.15s; display: flex; align-items: center; }
  .section-icon:hover { opacity: 1; transform: scale(1.15); }
  .section-icon svg { width: 16px; height: 16px; stroke: currentColor; fill: none; stroke-width: 1.75; stroke-linecap: round; stroke-linejoin: round; }
  .icon-picker { position: fixed; z-index: 2000; background: var(--bg); border: 0.5px solid var(--border2); border-radius: 12px; box-shadow: 0 8px 32px rgba(0,0,0,0.18); padding: 12px; width: 320px; }
  .icon-picker-search { width: 100%; font-size: 12px; padding: 6px 10px; border: 0.5px solid var(--border2); border-radius: 7px; background: var(--bg2); color: var(--text); margin-bottom: 8px; outline: none; box-sizing: border-box; font-family: inherit; }
  .icon-picker-search:focus { border-color: var(--blue); background: var(--bg); }
  .icon-picker-cats { display: flex; gap: 4px; flex-wrap: wrap; margin-bottom: 8px; }
  .icon-picker-cat { font-size: 10px; padding: 2px 8px; border-radius: 10px; border: 0.5px solid var(--border2); cursor: pointer; color: var(--text2); background: var(--bg); white-space: nowrap; }
  .icon-picker-cat.active { background: var(--accent); color: var(--bg); border-color: var(--accent); }
  .icon-picker-grid { display: grid; grid-template-columns: repeat(10, 1fr); gap: 2px; max-height: 240px; overflow-y: auto; }
  .icon-picker-item { width: 28px; height: 28px; display: flex; align-items: center; justify-content: center; border-radius: 6px; cursor: pointer; opacity: 0.6; }
  .icon-picker-item:hover { background: var(--bg2); opacity: 1; }
  .icon-picker-item.active { background: var(--bg3); opacity: 1; outline: 1.5px solid var(--accent); outline-offset: -1px; }
  .icon-picker-item svg { width: 15px; height: 15px; stroke: currentColor; fill: none; stroke-width: 1.75; stroke-linecap: round; stroke-linejoin: round; }
  .icon-picker-none { padding: 24px; text-align: center; color: var(--text3); font-size: 12px; }
  /* Formatting display layer */
  .node-display { flex: 1; font-size: 13px; color: var(--text); padding: 3px 2px; line-height: 1.5; min-width: 0; word-break: break-word; white-space: pre-wrap; cursor: text; }
  .is-mobile .node-display:not(.is-section) { display: -webkit-box; -webkit-box-orient: vertical; -webkit-line-clamp: 3; overflow: hidden; white-space: normal; }
  .is-mobile .node-display.is-section { display: -webkit-box; -webkit-box-orient: vertical; -webkit-line-clamp: 1; overflow: hidden; white-space: normal; }
  .is-mobile .node-display.expanded { -webkit-line-clamp: unset; display: block; }
  .mobile-show-more { display: none; font-size: 20px; color: var(--text3); padding: 2px 8px; cursor: pointer; background: none; border: none; font-family: inherit; margin-top: 4px; }
  .is-mobile .mobile-show-more { display: none; }
  .is-mobile .mobile-show-more.needed { display: inline-block; }
  .node-display.done { text-decoration: line-through; color: var(--text3); }
  .node-display.is-section { font-weight: 600; }
  .node-display.readonly { color: var(--text2); cursor: default; }
  .node-display b { font-weight: 700; }
  .node-display i { font-style: italic; }
  .node-display u { text-decoration: underline; }
  .node-display s { text-decoration: line-through; opacity: 0.6; }
  .node-display.done b, .node-display.done i, .node-display.done u { text-decoration: line-through; }
  .node-input { display: none; flex: 1; white-space: pre-wrap; word-break: break-word; resize: none; overflow: hidden; font-size: 13px; color: var(--text); background: transparent; border: none; outline: none; font-family: inherit; padding: 3px 2px; line-height: 1.5; min-width: 0; }
  .node-input.editing { display: block; }
  .node-input.done { text-decoration: line-through; color: var(--text3); }
  .node-input.is-section { font-weight: 500; }
  .node-input[readonly] { color: var(--text2); cursor: default; }
  .breadcrumb { font-size: 10px; color: var(--text3); margin-right: 5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 200px; flex-shrink: 1; }
  .breadcrumb.project-link { cursor: pointer; }
  .breadcrumb.project-link:hover { color: var(--accent); text-decoration: underline; }
  .today-badge { font-size: 10px; padding: 1px 7px; border-radius: 8px; margin-right: 4px; white-space: nowrap; flex-shrink: 0; background: var(--bg2); color: var(--text2);  align-self: flex-start; margin-top: 4px; }
  .today-badge.is-today { background: var(--accent); color: var(--bg); }
  .assignee-badge { font-size: 10px; padding: 1px 7px; border-radius: 8px; margin-right: 4px; white-space: nowrap; flex-shrink: 0; background: var(--blue-bg); color: var(--blue-text);  align-self: flex-start; margin-top: 5px; }
  .zoom-btn { color: var(--text3); }
  .act-btn { background: none; border: none; cursor: pointer; font-size: 11px; color: var(--text3); padding: 2px 5px; border-radius: 3px; opacity: 0; flex-shrink: 0; white-space: nowrap;  align-self: flex-start; margin-top: 4px; }
  .mobile-menu-btn { display: none; font-size: 20px; color: var(--text3); padding: 6px 8px; cursor: pointer; align-self: center; flex-shrink: 0; background: none; border: none; font-family: inherit; }
  .is-mobile .mobile-menu-btn { display: flex; align-items: center; }
  .node-row:hover .act-btn, .node-row.focused .act-btn { opacity: 1; }
  .act-btn:hover { color: var(--text); background: var(--bg3); }
  .section-label { font-size: 10px; color: var(--text3); padding: 10px 14px 2px; text-transform: uppercase; letter-spacing: 0.06em; }
  .empty { padding: 32px 16px; text-align: center; color: var(--text3); font-size: 13px; line-height: 1.9; }
  .add-root-btn { font-size: 12px; padding: 7px 16px; border: 0.5px solid var(--border2); border-radius: var(--radius); cursor: pointer; background: var(--accent); color: var(--bg); margin-top: 4px; }
  /* Modal */
  .modal-bg { position: fixed; inset: 0; background: rgba(0,0,0,0.3); display: flex; align-items: center; justify-content: center; z-index: 100; }
  .modal { background: var(--bg); border-radius: 12px; border: 0.5px solid var(--border2); padding: 22px; width: 340px; box-shadow: 0 8px 32px rgba(0,0,0,0.15); }
  .modal h3 { font-size: 14px; font-weight: 500; margin-bottom: 12px; }
  .modal p { font-size: 12px; color: var(--text2); line-height: 1.5; margin-bottom: 8px; }
  .modal label { font-size: 11px; color: var(--text2); display: block; margin: 10px 0 4px; }
  .modal input, .modal textarea { width: 100%; font-size: 13px; padding: 7px 10px; border: 0.5px solid var(--border2); border-radius: var(--radius); background: var(--bg); color: var(--text); font-family: inherit; outline: none; }
  .modal input:focus, .modal textarea:focus { border-color: var(--blue); }
  .modal textarea { resize: vertical; min-height: 64px; }
  .modal-btns { display: flex; gap: 8px; justify-content: flex-end; margin-top: 16px; }
  .modal-btns button { padding: 7px 18px; font-size: 13px; border-radius: var(--radius); cursor: pointer; border: 0.5px solid var(--border2); background: var(--bg); color: var(--text); }
  .modal-btns button.primary { background: var(--accent); color: var(--bg); border-color: var(--accent); }

  .sel-btn { cursor: pointer; color: var(--text3); font-size: 12px; padding: 0 3px; flex-shrink: 0; opacity: 0; user-select: none; align-self: flex-start; margin-top: 3px; }
  .node-row:hover .sel-btn { opacity: 1; }
  .node-row.selected .sel-btn { opacity: 1; color: var(--accent); content: '●'; }
  .drag-handle { cursor: grab; color: var(--text3); font-size: 14px; padding: 0 4px 0 2px; flex-shrink: 0; opacity: 0; user-select: none; align-self: flex-start; margin-top: 2px; }
  .node-row:hover .drag-handle { opacity: 1; }
  .drag-handle:active { cursor: grabbing; }
  .node-row.dragging { opacity: 0.3; background: var(--bg2); }
  .node-row.drop-above { border-top: 2px solid var(--accent); }
  .node-row.drop-below { border-bottom: 2px solid var(--accent); }
  .node-row.drop-child { outline: 1.5px dashed var(--accent); outline-offset: -2px; border-radius: 4px; }
  .node-row.selected { background: color-mix(in srgb, var(--accent) 8%, transparent); }
  .node-row.context-only { opacity: 0.45; }
  /* Indent guide lines */
  .indent-guide { position: absolute; top: 0; bottom: 0; width: 1px; background: var(--border); pointer-events: none; }
  /* Mobile right-side toggle */
  .mobile-toggle { display: none; flex-shrink: 0; align-self: center; font-size: 24px; color: var(--text3); padding: 8px 12px; cursor: pointer; user-select: none; }
  .is-mobile .toggle { display: none; }
  .is-mobile .mobile-toggle { display: flex; align-items: center; }
  .is-mobile .zoom-dot { display: none; }
  .mobile-zoom-btn { display: none; font-size: 18px; color: var(--text3); padding: 4px 8px; cursor: pointer; user-select: none; flex-shrink: 0; align-self: center; }
  .is-mobile .mobile-zoom-btn { display: flex; align-items: center; }
  .node-row { position: relative; }
  .node-row.context-only .drag-handle,
  .node-row.context-only .sel-btn,
  .node-row.context-only .act-btn { display: none !important; }
  .context-label { font-size: 10px; color: var(--text3); padding: 2px 8px; font-style: italic; }
  .node-row.selected .drag-handle { opacity: 1; }

  /* Search bar */
  .search-bar { display: flex; align-items: center; gap: 8px; padding: 6px 14px; border-bottom: 0.5px solid var(--border); background: var(--bg); flex-shrink: 0; transition: all 0.15s; }
  .search-bar.hidden { display: none; }
  .search-icon { font-size: 13px; color: var(--text3); flex-shrink: 0; }
  .search-input { flex: 1; font-size: 13px; color: var(--text); background: transparent; border: none; outline: none; font-family: inherit; padding: 2px 0; }
  .search-input::placeholder { color: var(--text3); }
  .search-count { font-size: 11px; color: var(--text3); white-space: nowrap; flex-shrink: 0; }
  .search-clear { font-size: 13px; color: var(--text3); cursor: pointer; flex-shrink: 0; padding: 2px 4px; border-radius: 4px; line-height: 1; border: none; background: none; }
  .search-clear:hover { color: var(--text); background: var(--bg2); }
  .node-row.search-highlight { background: color-mix(in srgb, var(--accent) 5%, transparent); }
  mark { background: color-mix(in srgb, #f0a500 35%, transparent); color: inherit; border-radius: 2px; padding: 0 1px; }
  .search-nav-btn { font-size: 11px; color: var(--text3); cursor: pointer; padding: 2px 5px; border-radius: 4px; border: none; background: none; }
  .search-nav-btn:hover { color: var(--text); background: var(--bg2); }
  .search-active-row { background: color-mix(in srgb, var(--accent) 12%, transparent) !important; outline: 1px solid color-mix(in srgb, var(--accent) 30%, transparent); outline-offset: -1px; border-radius: 4px; }

  /* ── Mobile ─────────────────────────────────────────────────────────────── */
  /* Mobile styles — applied via JS .is-mobile class on <html> */
  .is-mobile body { padding: 0; background: var(--bg); margin: 0; width: 100%; height: 100%; overflow: hidden; }
  .is-mobile .app { height: 100dvh; min-height: 100vh; max-width: 100%; border-radius: 0; border: none; box-shadow: none; width: 100%; }
  .is-mobile .toolbar { padding: 0 10px; height: 44px; }
  .is-mobile #hintBar { display: none !important; }
  .is-mobile #collapseBtn { display: none; }
  .is-mobile .user-pill { max-width: 110px; font-size: 10px; }
  .is-mobile .tabs { display: none; }
  .is-mobile .mobile-nav { display: flex !important; height: 100px; }
  .is-mobile .mobile-fab { display: flex !important; bottom: 116px; width: 80px; height: 80px; font-size: 40px; }
  .is-mobile .tree { padding-bottom: 16px; }
  .is-mobile .node-row { min-height: 62px; }
  .is-mobile .node-check { width: 26px; height: 26px; margin-top: 17px; margin-right: 10px; }
  .is-mobile .section-icon { margin-top: 11px; }
  .is-mobile .toggle { width: 38px; height: 38px; margin-top: 11px; font-size: 15px; }
  .is-mobile .drag-handle { display: none !important; }
  .is-mobile .sel-btn { display: none !important; }
  .is-mobile .node-display { font-size: 22px; padding: 15px 4px 15px 2px; line-height: 1.55; }
  .is-mobile .node-input { font-size: 22px; padding: 15px 4px 15px 2px; line-height: 1.55; }
  .is-mobile .node-display.is-section { font-size: 24px; font-weight: 700; }
  .is-mobile .act-btn { display: none !important; }
  .is-mobile .today-badge { font-size: 14px; padding: 5px 11px; margin-top: 16px; }
  .is-mobile .assignee-badge { font-size: 14px; padding: 5px 11px; margin-top: 16px; }
  .is-mobile .breadcrumb { max-width: 140px; font-size: 11px; }
  .is-mobile .search-bar { padding: 8px 12px; }
  .is-mobile .search-input { font-size: 22px; }
  .is-mobile #zoomCrumb { font-size: 12px; padding: 8px 12px; }
  .is-mobile .modal-bg { align-items: flex-end; }
  .is-mobile .modal { width: 100%; border-radius: 16px 16px 0 0; padding: 20px 20px 32px; }
  .is-mobile .icon-picker { width: calc(100vw - 24px); left: 12px !important; }
  .is-mobile .icon-picker-grid { grid-template-columns: repeat(8, 1fr); max-height: 180px; }
  .is-mobile .node-row { position: relative; overflow: hidden; }

  /* Same rules via media query as backup (Chrome emulation, slow JS) */
  @media (max-width: 768px) {
    body { padding: 0; background: var(--bg); margin: 0; width: 100%; height: 100%; overflow: hidden; }
    .app { height: 100dvh; min-height: 100vh; max-width: 100%; border-radius: 0; border: none; box-shadow: none; width: 100%; }
    .toolbar { padding: 0 10px; height: 44px; }
    #hintBar { display: none !important; }
    #collapseBtn { display: none; }
    .tabs { display: none; }
    .mobile-nav { display: block !important; height: 100px; }
    .mobile-fab { display: flex !important; }
    .tree { padding-bottom: 16px; }
    .node-row { min-height: 44px; }
    .drag-handle { display: none !important; }
    .sel-btn { display: none !important; }
    .act-btn { display: none !important; }
    .node-display { font-size: 22px; padding: 15px 4px 15px 2px; line-height: 1.55; }
    .node-input { font-size: 22px; padding: 15px 4px 15px 2px; line-height: 1.55; }
    .node-display.is-section { font-size: 24px; font-weight: 700; }
    .today-badge { font-size: 14px; padding: 5px 11px; margin-top: 16px; }
    .assignee-badge { font-size: 14px; padding: 5px 11px; margin-top: 16px; }
    .search-input { font-size: 22px; }
    .modal-bg { align-items: flex-end; }
    .modal { width: 100%; border-radius: 16px 16px 0 0; padding: 20px 20px 32px; }
  }

  /* Bottom nav — hidden by default, shown on mobile */
  .mobile-nav {
    display: none;
    flex-shrink: 0;
    height: 100px;
    background: var(--bg);
    border-top: 1px solid var(--border2);
    padding-bottom: env(safe-area-inset-bottom, 0);
    width: 100%;
  }
  .mobile-nav-inner { display: flex; height: 100px; width: 100%; }
  .mobile-nav-btn {
    flex: 1 1 0; min-width: 0; display: flex; flex-direction: column; align-items: center;
    justify-content: center; gap: 6px; border: none; background: none;
    cursor: pointer; color: var(--text3); font-size: 15px; font-family: inherit;

<script>
// ── Config ───────────────────────────────────────────────────────────────────
var COLLAPSED_KEY = 'momentum_collapsed';
var TODAY = (() => { var d = new Date(); return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0'); })();
var TODAYLABEL = new Date().toLocaleDateString(undefined, { weekday:'long', day:'numeric', month:'long' });

var currentUser = '';
var nodes = [];
var collapsed = JSON.parse(localStorage.getItem(COLLAPSED_KEY) || '{}');
var activeTab = 'today';
var focusId = null;

// ── Utilities ────────────────────────────────────────────────────────────────
function newId() { return '_' + Math.random().toString(36).substr(2, 7); }
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function localDateTime() {
  var d = new Date();
  return d.getFullYear() + '-' +
    String(d.getMonth()+1).padStart(2,'0') + '-' +
    String(d.getDate()).padStart(2,'0') + ' ' +
    String(d.getHours()).padStart(2,'0') + ':' +
    String(d.getMinutes()).padStart(2,'0') + ':' +
    String(d.getSeconds()).padStart(2,'0');
}
function saveCollapsed() { localStorage.setItem(COLLAPSED_KEY, JSON.stringify(collapsed)); }

// ═════════════════════════════════════════════════════════════════════════════
// LOCAL-FIRST SYNC ENGINE
// ═════════════════════════════════════════════════════════════════════════════
// Design:
//   - Local state (nodes[]) is the source of truth.
//   - All mutations go into queueState (saves Map + deletes Set), persisted to
//     localStorage on every change. Survives reloads, crashes, re-logins.
//   - Background flush sends one batched HTTP request every ~1500ms.
//   - Only one batch in flight at a time (single-flight). Subsequent mutations
//     queue up and ship in the next batch.
//   - On batch failure: per-item failures are re-queued. Whole-request failures
//     trigger exponential backoff (1.5s → 3s → 6s → 12s, capped at 30s).
//   - nodeTouched[id] = timestamp of last user mutation. Reconcile uses this
//     to refuse server overwrites of recently-edited nodes (5s window).
//   - opGeneration cancels in-flight batches whose results would clobber the
//     state after an undo.
// ═════════════════════════════════════════════════════════════════════════════

var QUEUE_KEY = 'momentum_pending_queue';
var TOUCHED_WINDOW_MS = 5000;       // reconciliation window — local edits younger than this beat server
var FLUSH_DEBOUNCE_MS = 1500;       // wait this long after a mutation before flushing
var BACKOFF_BASE_MS = 1500;         // initial backoff after a failed batch
var BACKOFF_MAX_MS = 30000;         // cap

// State
var queueState = { saves: {}, deletes: {} };  // saves: id → snapshot, deletes: id → true
var nodeTouched = {};                          // id → timestamp ms
var flushTimer = null;
var batchInFlight = false;
var batchBackoffMs = BACKOFF_BASE_MS;
var batchGeneration = 0;                       // bumped on undo/redo to invalidate in-flight batches
var suppressBlur = false;                      // legacy: blocks blur saves during render rebuilds
var recentlySaved = new Set();                 // legacy: kept for code that references it; harmless

// Legacy aliases — many call sites still use these names. They now point at the
// new system so old code keeps working without churn.
var pendingSave = {
  add: function(id) { var n = nodes.find(function(x){return x.id===id;}); if (n) queueSave(n); },
  has: function(id) { return !!queueState.saves[id]; },
  delete: function(id) { delete queueState.saves[id]; persistQueue(); },
  clear: function() { queueState.saves = {}; persistQueue(); },
  forEach: function(cb) { Object.keys(queueState.saves).forEach(cb); },
  get size() { return Object.keys(queueState.saves).length; }
};
var opGeneration = 0;                          // legacy alias kept in sync with batchGeneration
var opQueueDepth = 0;                          // legacy: 0 when no batch in flight, 1 when in flight
var syncTimer = null;                          // legacy: kept null; flushTimer replaces it

function loadQueue() {
  try {
    var raw = localStorage.getItem(QUEUE_KEY);
    if (raw) {
      var parsed = JSON.parse(raw);
      if (parsed && typeof parsed === 'object') {
        queueState.saves = parsed.saves || {};
        queueState.deletes = parsed.deletes || {};
      }
    }
  } catch(e) { console.warn('Could not load queue from localStorage:', e); }
}
function persistQueue() {
  try { localStorage.setItem(QUEUE_KEY, JSON.stringify(queueState)); }
  catch(e) { console.warn('Could not persist queue:', e); }
}
function queueIsEmpty() {
  return Object.keys(queueState.saves).length === 0 &&
         Object.keys(queueState.deletes).length === 0;
}
function queueSize() {
  return Object.keys(queueState.saves).length + Object.keys(queueState.deletes).length;
}

// Update touched timestamp for a node — call this from any keystroke or mutation.
function touchNode(id) { nodeTouched[id] = Date.now(); }

// Schedule a save: store snapshot in queue, mark touched, arm the flush timer.
// Replaces any earlier pending save for the same id (last-write-wins locally).
function queueSave(node) {
  if (!node || !node.id) return;
  if (!node.name || !node.name.trim()) return;     // never save nameless nodes
  // If this id is queued for delete, the delete wins — saves on a deleted id
  // would resurrect it. Skip the save.
  if (queueState.deletes[node.id]) return;
  queueState.saves[node.id] = Object.assign({}, node);
  touchNode(node.id);
  persistQueue();
  armFlush();
}

function queueDelete(id) {
  if (!id) return;
  // Cancel any pending save for this id
  delete queueState.saves[id];
  queueState.deletes[id] = true;
  touchNode(id);
  persistQueue();
  armFlush();
}

function armFlush() {
  if (flushTimer) clearTimeout(flushTimer);
  flushTimer = setTimeout(flushBatch, FLUSH_DEBOUNCE_MS);
}

// Public alias matching the old API. Many call sites do scheduleSave(n).
function scheduleSave(node) { queueSave(node); }

// Public alias for deletes. Matches old deleteRemote(id, snapIds) signature.
function deleteRemote(id, snapIds) {
  var ids = snapIds || (id ? [id] : []);
  ids.forEach(function(d) { queueDelete(d); });
}

function setSyncDot(state) {
  var avatar = document.getElementById('userAvatar');
  if (!avatar) return;
  var colors = { syncing: '#f0a500', ok: '#3aaa6e', err: '#e24b4a' };
  avatar.style.background = colors[state] || 'var(--accent)';
  if (state === 'ok') {
    setTimeout(function() {
      var a = document.getElementById('userAvatar');
      if (a) a.style.background = 'var(--accent)';
    }, 2000);
  }
}

// Update the unsaved-changes banner. Shown when queue is non-empty for >5s.
var queueBannerTimer = null;
function updateQueueBanner() {
  // Built lazily on first non-empty queue
  var b = document.getElementById('queueBanner');
  var size = queueSize();
  if (size === 0) {
    if (b) b.style.display = 'none';
    if (queueBannerTimer) { clearTimeout(queueBannerTimer); queueBannerTimer = null; }
    return;
  }
  // Don't flash for normal short flushes — only show after a delay
  if (!queueBannerTimer) {
    queueBannerTimer = setTimeout(function() {
      queueBannerTimer = null;
      var sz = queueSize();
      if (sz === 0) return;
      var el = document.getElementById('queueBanner');
      if (!el) {
        el = document.createElement('div');
        el.id = 'queueBanner';
        el.style.cssText = 'position:fixed;bottom:12px;left:50%;transform:translateX(-50%);background:#f0a500;color:#000;padding:6px 14px;border-radius:8px;font-size:12px;z-index:5000;box-shadow:0 2px 8px rgba(0,0,0,0.2);cursor:pointer;';
        el.title = 'Click to retry now';
        el.onclick = function() { flushBatch(true); };
        document.body.appendChild(el);
      }
      el.textContent = sz + ' unsaved change' + (sz === 1 ? '' : 's') + ' — syncing…';
      el.style.display = 'block';
    }, 5000);
  }
}

// Flush the current queue as one batched request.
// force: if true, bypass the in-flight guard (used by the banner click).
function flushBatch(force) {
  if (flushTimer) { clearTimeout(flushTimer); flushTimer = null; }
  if (queueIsEmpty()) { updateQueueBanner(); return Promise.resolve(); }
  if (batchInFlight && !force) return Promise.resolve();   // single-flight; another batch is running

  // Snapshot the queue and clear it. If the batch fails per-item, those items
  // are re-added; if the whole batch fails, ALL items are re-added.
  var snapSaves = Object.values(queueState.saves).map(function(n){ return Object.assign({}, n); });
  var snapDeletes = Object.keys(queueState.deletes);
  queueState.saves = {};
  queueState.deletes = {};
  persistQueue();

  batchInFlight = true;
  opQueueDepth = 1; // legacy compat
  var thisGen = batchGeneration;
  setSyncDot('syncing');

  return gsr('batchOps', { saves: snapSaves, deletes: snapDeletes })
    .then(function(resp) {
      batchInFlight = false;
      opQueueDepth = 0;
      // If undo happened while we were in flight, ignore this result and ship
      // a fresh batch built from the post-undo state.
      if (thisGen !== batchGeneration) {
        if (!queueIsEmpty()) armFlush();
        return;
      }
      if (resp && resp.results) {
        // Re-queue any per-item failures
        (resp.results.saves || []).forEach(function(r) {
          if (r && r.error) {
            console.warn('Save error for', r.id, ':', r.error);
            // Permission errors (someone else owns it) shouldn't loop forever.
            // Drop and surface to console; the user can refresh to see truth.
            if (r.error === 'Permission denied') return;
            // Re-queue with the latest snapshot from local nodes (in case the
            // user touched it again while the batch was in flight)
            var n = nodes.find(function(x){ return x.id === r.id; });
            if (n) queueState.saves[r.id] = Object.assign({}, n);
          }
        });
        (resp.results.deletes || []).forEach(function(r) {
          if (r && r.error) {
            console.warn('Delete error for', r.id, ':', r.error);
            queueState.deletes[r.id] = true;
          }
        });
        persistQueue();
      }
      // Reset backoff on success
      batchBackoffMs = BACKOFF_BASE_MS;
      setSyncDot('ok');
      // Anything queued during the flight? Schedule another batch.
      if (!queueIsEmpty()) armFlush();
      else updateQueueBanner();
    })
    .catch(function(e) {
      batchInFlight = false;
      opQueueDepth = 0;
      console.error('Batch failed:', e && e.message);
      setSyncDot('err');
      // Re-queue everything we just tried
      snapSaves.forEach(function(n) {
        // Prefer the latest local copy (user may have typed more) over our snapshot
        var live = nodes.find(function(x){ return x.id === n.id; });
        queueState.saves[n.id] = live ? Object.assign({}, live) : n;
      });
      snapDeletes.forEach(function(id) { queueState.deletes[id] = true; });
      persistQueue();
      updateQueueBanner();
      // Exponential backoff
      var delay = batchBackoffMs;
      batchBackoffMs = Math.min(batchBackoffMs * 2, BACKOFF_MAX_MS);
      flushTimer = setTimeout(flushBatch, delay);
    });
}

// Public: flush everything synchronously (well, as fast as possible) — used
// before showing login screen so unsaved work makes it to the server.
// Returns a promise that resolves when queue is empty or after timeoutMs.
function flushNow(timeoutMs) {
  timeoutMs = timeoutMs || 3000;
  return new Promise(function(resolve) {
    var deadline = Date.now() + timeoutMs;
    function tick() {
      if (queueIsEmpty()) { resolve(true); return; }
      if (Date.now() >= deadline) { resolve(false); return; }
      if (!batchInFlight) flushBatch();
      setTimeout(tick, 200);
    }
    tick();
  });
}

// Bump generation: cancel any in-flight batch's effect on the queue.
// Call from undo/redo before mutating state.
function bumpGeneration() {
  batchGeneration++;
  opGeneration = batchGeneration; // legacy alias
}

// ═════════════════════════════════════════════════════════════════════════════
// END SYNC ENGINE
// ═════════════════════════════════════════════════════════════════════════════

// Fetch server state and reconcile with local. Does NOT clobber:
//   - Nodes with pending saves or deletes in the queue
//   - Nodes touched (by user input) within the last TOUCHED_WINDOW_MS
//   - The node currently being edited in an active textarea
// initial: true on app boot (we have no local state to protect, so full replace)
async function fetchAll(initial) {
  var clientEmail = localStorage.getItem('momentum_user_email') || currentUser || '';
  var data = await gsr('getInitialData', clientEmail || null);
  if (!data) return;
  if (data.user) {
    currentUser = data.user;
    localStorage.setItem('momentum_user_email', data.user);
  }
  var pill = document.getElementById('userPill');
  if (pill) pill.textContent = currentUser || 'unknown';
  var avatar = document.getElementById('userAvatar');
  if (avatar && currentUser) {

function renderMarkdown(text) {
  if (!text) return '';
  // Escape HTML first, then apply formatting markers
  var s = text
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  // Bold: **text**
  s = s.replace(/\*\*(.+?)\*\*/g, '<b>$1</b>');
  // Italic: _text_ (single underscore)
  s = s.replace(/(?<![_\w])_([^_]+)_(?![_\w])/g, '<i>$1</i>');
  // Underline: __text__ (double underscore) - must come after italic
  s = s.replace(/__(.+?)__/g, '<u>$1</u>');
  // Strikethrough: ~~text~~
  s = s.replace(/~~(.+?)~~/g, '<s>$1</s>');
  return s;
}

function applyFormat(inp, marker) {

  var alreadyWrapped = val.slice(start - mlen, start) === marker && val.slice(end, end + mlen) === marker;
  var selWrapped = sel.startsWith(marker) && sel.endsWith(marker) && sel.length > marker.length * 2;

  if (alreadyWrapped) {
    // Remove markers outside selection
    inp.value = val.slice(0, start - mlen) + sel + val.slice(end + mlen);
    inp.setSelectionRange(start - mlen, end - mlen);
  } else if (selWrapped) {
    // Remove markers inside selection
    var inner = sel.slice(mlen, sel.length - mlen);
    inp.value = val.slice(0, start) + inner + val.slice(end);
    inp.setSelectionRange(start, start + inner.length);
  } else {
    // Wrap selection (or insert empty markers at cursor)
    var replacement = marker + sel + marker;
    inp.value = val.slice(0, start) + replacement + val.slice(end);
    if (sel.length === 0) {

    if (n.assignedTo) meta += `<span class="assignee-badge">${n.assignedTo === currentUser ? 'mine' : esc(getMemberName(n.assignedTo))}</span>`;
    meta = '<span class="today-badge' + (isToday2 ? ' is-today' : '') + '" data-settoday="' + n.id + '" title="' + (isToday2 ? 'Remove from today' : 'Set to today') + '">' + (isToday2 ? 'today' : nd2 ? nd2.slice(8) + '/' + nd2.slice(5,7) : '—') + '</span>' + meta;
  }

  var acts = '';
  if (canEdit(n)) {
    acts += `<button class="act-btn" data-toggletype="${n.id}">${n.isSection ? '→ task' : '→ section'}</button>`;
    if (!n.isSection) acts += `<button class="act-btn" data-promote="${n.id}">↑ today</button>`;
    if (isOwner(n)) {
      acts += `<button class="act-btn" data-share="${n.id}">share</button>`;
      if (!n.isSection) acts += `<button class="act-btn" data-assign="${n.id}">assign</button>`;
      acts += `<button class="act-btn" data-del="${n.id}">✕</button>`;
    }
  }

  var rowClass = ['node-row',
    n.readOnlyContext ? 'context-only' : '',
    n.assignedTo === currentUser && n.assignedBy ? 'assigned-to-me' : '',
    n.assignedBy === currentUser && n.assignedTo !== currentUser ? 'assigned-by-me' : ''
  ].filter(Boolean).join(' ');
  var selState = selectedIds.has(n.id) ? '●' : '○';
  var dragHandle = '<span class="drag-handle" data-drag="' + n.id + '" title="Drag">⠿</span><span class="sel-btn" data-sel="' + n.id + '" title="Select">' + selState + '</span>';
  var mobileToggle = (!flat && ch.length) ? '<span class="mobile-toggle" data-toggle="' + n.id + '">' + (collapsed[n.id] ? '▶' : '▼') + '</span>' : '';
  var mobileZoom = !flat ? '<span class="mobile-zoom-btn" data-zoom="' + n.id + '" title="Zoom in">⊙</span>' : '';
  var mobileMenu = canEdit(n) ? '<button class="mobile-menu-btn" data-mobilemenu="' + n.id + '">⋯</button>' : '';
  return `<div class="${rowClass}" data-id="${n.id}" data-depth="${depth}" style="padding-left:${indentPx}px;">${guides}${dragHandle}${toggleEl}${markerEl}${inputEl}${meta}${acts}${mobileMenu}${mobileZoom}${mobileToggle}</div>`;
}

function attachEvents() {
  var el = document.getElementById('treeEl');
  el.querySelectorAll('[data-toggle]').forEach(b => b.onclick = e => {
    e.stopPropagation();
    pushUndo();
    collapsed[b.dataset.toggle] = !collapsed[b.dataset.toggle];
    saveCollapsed();
    render(true);
  });
  el.querySelectorAll('.mobile-toggle').forEach(function(b) {
    b.onclick = function(e) {
      e.stopPropagation();
      pushUndo();
      collapsed[b.dataset.toggle] = !collapsed[b.dataset.toggle];
      saveCollapsed();
      render(true);
    };
  });
  el.querySelectorAll('[data-showmore]').forEach(function(btn) {
    btn.onclick = function(e) {
      e.stopPropagation();
      var disp = document.getElementById('disp_' + btn.dataset.showmore);
      if (disp) {
        if (disp.classList.contains('expanded')) {
          disp.classList.remove('expanded');
          btn.textContent = '···';
        } else {
          disp.classList.add('expanded');
          btn.textContent = 'less';
        }
      }
    };
  });
  el.querySelectorAll('[data-check]').forEach(cb => {
    cb.onmousedown = function(e) {
      // Save current focused input before checkbox steals focus
      var active = document.activeElement;
      if (active && active.classList.contains('node-input')) {
        var n = nodes.find(x => x.id === active.dataset.id);
        if (n && active.value.trim()) {
          n.name = active.value.trim();
          scheduleSave(n);
        }
      }
    };
    cb.onchange = () => {
      var n = nodes.find(x => x.id === cb.dataset.check);
      if (n) {
        pushUndo();
        // Apply done state to this node and all its descendants
        var affectedIds = [n.id].concat(descendants(n.id));
        affectedIds.forEach(function(aid) {
          var an = nodes.find(function(x) { return x.id === aid; });
          if (!an || an.isSection) return;
          an.done = cb.checked;
          an.completedDate = an.done ? TODAY : null;
          scheduleSave(an);
          // Update DOM in-place for each affected row
          var affRow = document.querySelector('.node-row[data-id="' + aid + '"]');
          if (affRow) {
            var affInp = affRow.querySelector('.node-input');
            if (affInp) affInp.classList.toggle('done', an.done);
            var affDisp = affRow.querySelector('.node-display');
            if (affDisp) {
              affDisp.classList.toggle('done', an.done);
              affDisp.innerHTML = renderMarkdown(an.name) || '';
            }
            var affCb = affRow.querySelector('.node-check');
            if (affCb) affCb.checked = an.done;
          }
        });
      }
    };
  });
  el.querySelectorAll('[data-toggletype]').forEach(b => b.onclick = e => {
    e.stopPropagation();
    var n = nodes.find(x => x.id === b.dataset.toggletype);
    if (n) {
      pushUndo();
      var inp = document.getElementById('inp_' + n.id);
      if (inp) n.name = inp.value;
      n.isSection = !n.isSection;
      if (!n.isSection && !n.date) n.date = localDateTime();
      focusId = n.id;
      scheduleSave(n);
      render();
    }
  });
  el.querySelectorAll('[data-zoom]').forEach(b => b.onclick = e => {
    e.stopPropagation(); zoomInto(b.dataset.zoom);
  });
  el.querySelectorAll('[data-mobilemenu]').forEach(function(btn) {
    btn.onclick = function(e) {
      e.stopPropagation();
      showMobileActionSheet(btn.dataset.mobilemenu);
    };
  });
  el.querySelectorAll('[data-goto]').forEach(b => b.onclick = e => {
    e.stopPropagation();
    var nodeId = b.dataset.goto;
    // Switch to Projects tab, zoom to node's parent section
    pushNav();
    activeTab = 'tree';
    document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
    var treeTab = document.querySelector('.tab[data-tab="tree"]');
    if (treeTab) treeTab.classList.add('active');
    // Find the top-level ancestor to zoom into
    var n = nodes.find(x => x.id === nodeId);
    // Zoom to the node's parent so it's visible in context
    zoomedId = null;
    // Make sure the node is visible (uncollapse ancestors)
    var cur = n;
    while (cur && cur.parentId) {
      collapsed[cur.parentId] = false;
      cur = nodes.find(x => x.id === cur.parentId);
    }
    saveCollapsed();
    focusId = nodeId;
    render();
    // Scroll to the node
    setTimeout(function() {
      var row = document.querySelector('[data-id="' + nodeId + '"]');
      if (row) row.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }, 100);
  });
  el.querySelectorAll('[data-promote]').forEach(b => b.onclick = e => {
    e.stopPropagation(); var n = nodes.find(x => x.id === b.dataset.promote);
    if (n) { pushUndo(); n.date = localDateTime(); scheduleSave(n); render(); }
  });
  el.querySelectorAll('[data-settoday]').forEach(function(badge) {
    badge.onclick = function(e) {
      e.stopPropagation();
      var n = nodes.find(function(x){ return x.id === badge.dataset.settoday; });
      if (!n || n.isSection) return;
      pushUndo();
      if (n.date && n.date.slice(0,10) === TODAY) {
        // Demote: set to yesterday so it leaves the Today tab but keeps a date
        var yest = new Date();
        yest.setDate(yest.getDate() - 1);
        n.date = yest.getFullYear() + '-' +
          String(yest.getMonth()+1).padStart(2,'0') + '-' +
          String(yest.getDate()).padStart(2,'0') + ' 00:00:00';
      } else {
        n.date = localDateTime();
      }
      scheduleSave(n);
      render();
    };
    badge.style.cursor = 'pointer';
  });
  el.querySelectorAll('[data-del]').forEach(b => b.onclick = e => {
    e.stopPropagation();
    var id = b.dataset.del;
    var n = nodes.find(x => x.id === id);
    if (!n) return;
    var childCount = descendants(id).length;
    var msg = childCount > 0
      ? 'Delete "' + (n.name || 'this item') + '" and its ' + childCount + ' child' + (childCount === 1 ? '' : 'ren') + '?'
      : 'Delete "' + (n.name || 'this item') + '"?';
    showDeleteConfirm(msg, function() {
      saveActiveInput();
      pushUndo();
      var snapIds = [id, ...descendants(id)]; // snapshot before modifying
      nodes = nodes.filter(x => snapIds.indexOf(x.id) === -1);
      deleteRemote(null, snapIds);
      render();
    });
  });
  el.querySelectorAll('[data-pickicon]').forEach(function(el2) {
    el2.onclick = function(e) {
      e.stopPropagation();
      showIconPicker(el2.dataset.pickicon, el2);
    };
  });
  el.querySelectorAll('[data-share]').forEach(b => b.onclick = e => { e.stopPropagation(); showShare(b.dataset.share); });
  el.querySelectorAll('[data-assign]').forEach(b => b.onclick = e => { e.stopPropagation(); showAssign(b.dataset.assign); });
  // Wire display divs — click to enter edit mode
  el.querySelectorAll('[data-disp]').forEach(function(disp) {
    var id = disp.dataset.disp;
    disp.onclick = function(e) {
      // In mobile selection mode, taps select nodes not edit them
      if (isMobile && selectionMode) { e.stopPropagation(); return; }
      if (!canEdit(nodes.find(function(x){return x.id===id;})||{})) return;
      var inp = document.getElementById('inp_' + id);
      switchToEdit(inp, disp);
      var len = inp.value.length;
      try { inp.setSelectionRange(len, len); } catch(ex) {}
    };
  });

  el.querySelectorAll('.node-input').forEach(inp => {
    // Auto-resize textarea height to fit content
    inp.style.height = 'auto';
    inp.style.height = inp.scrollHeight + 'px';
    inp.addEventListener('input', function() {
      inp.style.height = 'auto';
      inp.style.height = inp.scrollHeight + 'px';
      var n = nodes.find(function(x){ return x.id === inp.dataset.id; });
      if (n) {
        n.name = inp.value; // keep in-memory name always current
        touchNode(n.id);    // protect from reconcile clobber
      }
      // Smart undo: push undo checkpoint at word boundaries
      var val = inp.value;
      var lastChar = val[val.length - 1];
      if (lastChar === ' ' || lastChar === '.' || lastChar === ',' || lastChar === '!' || lastChar === '?') {
        if (n && val.trim()) pushUndo();
      }
    });
  });
  el.querySelectorAll('.node-input:not([readonly])').forEach(inp => {
    inp.onblur = () => {
      hideKbBar();
      if (suppressBlur) { return; }
      var n = nodes.find(x => x.id === inp.dataset.id);
      if (!n) return;
      // Always capture the live input value into the node
      var live = inp.value;
      if (live.trim()) n.name = live;
      // Switch back to display mode
      var disp = document.getElementById('disp_' + inp.dataset.id);
      switchToDisplay(inp, disp);
      if (!n.name || !n.name.trim()) {
        if (!n.order) {
          nodes = nodes.filter(x => x.id !== n.id);
          render();
        }
        return;
      }
      // Use scheduleSave so it goes through the queue and doesn't race with flushSave
      scheduleSave(n);
    };
    inp.onfocus = () => {
      focusId = inp.dataset.id;
      inp.closest('.node-row').classList.add('focused');
      // Show textarea, hide display div
      var disp = document.getElementById('disp_' + inp.dataset.id);
      if (disp) disp.style.display = 'none';
      inp.classList.add('editing');
      inp.style.height = 'auto';
      inp.style.height = inp.scrollHeight + 'px';
      showKbBar(inp);
      initKbBar();
    };
    inp.onkeydown = e => {
      // ── Formatting shortcuts ────────────────────────────────
      if ((e.ctrlKey || e.metaKey) && !e.shiftKey && !e.altKey) {
        if (e.key === 'b' || e.key === 'B') { e.preventDefault(); applyFormat(inp, '**'); return; }
        if (e.key === 'i' || e.key === 'I') { e.preventDefault(); applyFormat(inp, '_'); return; }
        if (e.key === 'u' || e.key === 'U') { e.preventDefault(); applyFormat(inp, '__'); return; }
      }
      if ((e.ctrlKey || e.metaKey) && e.shiftKey) {
        if (e.key === 'x' || e.key === 'X') {
          // Ctrl+Shift+X is "promote to today", not strikethrough — skip formatting
        } else if (e.key === '5') { e.preventDefault(); applyFormat(inp, '~~'); return; }
      }
      handleKey(e, inp);
    };
  });
}



function handleKey(e, inp) {
  var id = inp.dataset.id;
  var cur = nodes.find(x => x.id === id);
  if (!cur) return;

  var list = visibleList();
  var vi = list.findIndex(x => x.node.id === id);

  // ── Escape ──────────────────────────────────────────────────
  if (e.key === 'Escape') { inp.blur(); return; }

  // ── Enter ────────────────────────────────────────────────────
  // Expanded node with children → new first child (directly below)
  // Collapsed node or leaf → new sibling (after the block)
  // Ctrl+Enter (any view): open section/assignee picker for current node
  if (e.key === 'Enter' && !e.shiftKey && !e.repeat && (e.ctrlKey || e.metaKey) && !e.altKey) {
    e.preventDefault();
    cur.name = inp.value;
    if (cur.name.trim()) {
      scheduleSave(cur);
    }
    showCombinedPicker(cur);
    return;
  }

  // Alt+Enter: move current node to General section
  if (e.key === 'Enter' && !e.shiftKey && e.altKey) {
    e.preventDefault();
    cur.name = inp.value;
    if (cur.name.trim()) scheduleSave(cur);
    // Find or use first section named "General" (case-insensitive)
    var generalSection = nodes.find(function(n) {
      return n.isSection && n.name && n.name.toLowerCase().trim() === 'general';
    });
    if (generalSection) {
      moveTo(cur, generalSection.id);
    } else {
      alert('No section named "General" found. Please create one in Projects first.');
    }
    return;
  }

  // Flat view Enter:
  //   depth 0 (root task) → new flat task with today's date (current behaviour)
  //   depth > 0 (child)   → new tree sibling after descendants, same parentId, inherits date
  if (e.key === 'Enter' && !e.shiftKey && !(e.ctrlKey || e.metaKey) && !e.altKey && (inp.dataset.flat === 'true' || inp.dataset.flat === true)) {
    e.preventDefault();
    pushUndo();
    cur.name = inp.value;
    if (cur.name.trim()) {
      scheduleSave(cur);
    }
    var si = nodes.findIndex(x => x.id === id);
    var ownDesc = descendants(id);
    var insertAt = si + 1;
    for (var di = si + 1; di < nodes.length; di++) {
      if (ownDesc.indexOf(nodes[di].id) > -1) insertAt = di + 1;
      else break;
    }
    var currentDepth = vi > -1 ? (list[vi].depth || 0) : 0;
    var nn;
    if (currentDepth === 0) {
      // Root flat node — new task with today's date under the picked section
      nn = {
        id: newId(), name: '',
        parentId: lastPickedSection || cur.parentId || null,
        isSection: false, done: false,
        date: localDateTime(),
        owner: currentUser,
        assignedTo: lastPickedAssignee || null,
        assignedBy: lastPickedAssignee ? (currentUser || '') : null,
        order: orderBetween(insertAt - 1, insertAt)
      };
    } else {
      // Child node — tree sibling, same parentId, inherit date so it stays visible
      nn = {
        id: newId(), name: '',
        parentId: cur.parentId || null,
        isSection: false, done: false,
        date: cur.date || null,
        owner: currentUser,
        order: orderBetween(insertAt - 1, insertAt)
      };
    }
    nodes.splice(insertAt, 0, nn);
    focusId = nn.id;
    render();
    return;
  }

  // ── Shift+Enter: new tree sibling below current node (all views) ─────────
  // Inserts after the current node and all its descendants, preserving parentId.
  if (e.key === 'Enter' && e.shiftKey && !(e.ctrlKey || e.metaKey) && !e.altKey) {
    e.preventDefault();
    pushUndo();
    cur.name = inp.value;
    if (cur.name.trim()) {
      scheduleSave(cur);
    }
    var si = nodes.findIndex(x => x.id === id);
    var ownDesc = descendants(id);
    var insertAt = si + 1;
    for (var di = si + 1; di < nodes.length; di++) {
      if (ownDesc.indexOf(nodes[di].id) > -1) insertAt = di + 1;
      else break;
    }
    var nn = {
      id: newId(), name: '',
      parentId: cur.parentId || null,
      isSection: false, done: false,
      date: cur.date || null,
      owner: currentUser,
      order: orderBetween(insertAt - 1, insertAt)
    };
    nodes.splice(insertAt, 0, nn);
    focusId = nn.id;
    render();
    return;
  }

  // ── Tree-mode Enter: new child (if expanded) or sibling (if collapsed/leaf) ─
  if (e.key === 'Enter' && !e.shiftKey && !(e.ctrlKey || e.metaKey) && !e.altKey) {
    e.preventDefault();
    pushUndo();
    cur.name = inp.value;
    if (cur.name.trim()) {
      scheduleSave(cur);
    }
    var hasChildren = nodes.some(x => x.parentId === cur.id);
    var isExpanded = hasChildren && !collapsed[cur.id];
    var si = nodes.findIndex(x => x.id === id);
    var insertAt;
    if (isExpanded) {
      // First child: find first existing child in nodes array and insert before it
      var firstChildIdx = -1;
      for (var di = 0; di < nodes.length; di++) {
        if (nodes[di].parentId === cur.id) { firstChildIdx = di; break; }
      }
      insertAt = firstChildIdx > -1 ? firstChildIdx : si + 1;
    } else {
      // Sibling - after all descendants
      var ownDesc = descendants(id);
      insertAt = si + 1;
      for (var di = si + 1; di < nodes.length; di++) {
        if (ownDesc.indexOf(nodes[di].id) > -1) insertAt = di + 1;
        else break;
      }
    }
    var nn = {
      id: newId(), name: '',
      parentId: isExpanded ? cur.id : (cur.parentId || null),
      isSection: false, done: false,
      date: localDateTime(), owner: currentUser,
      order: orderBetween(insertAt - 1, insertAt)
    };
    nodes.splice(insertAt, 0, nn);
    focusId = nn.id;
    render();
    return;
  }

  // ── Backspace on empty: delete node ─────────────────────────
  if (e.key === 'Backspace' && inp.value === '') {
    e.preventDefault();
    pushUndo();
    var prevNode = vi > 0 ? list[vi - 1].node : null;
    var snapIds = [id, ...descendants(id)];
    nodes = nodes.filter(x => snapIds.indexOf(x.id) === -1);
    deleteRemote(null, snapIds);
    if (prevNode) focusId = prevNode.id;
    render();
    return;
  }

  // ── Arrow keys: navigate ─────────────────────────────────────
  if (e.key === 'ArrowUp') {
    e.preventDefault();
    cur.name = inp.value;
    if (cur.name.trim()) scheduleSave(cur);
    if (vi > 0) { focusId = list[vi - 1].node.id; render(); }
    return;
  }
  if (e.key === 'ArrowDown') {
    e.preventDefault();
    cur.name = inp.value;
    if (cur.name.trim()) scheduleSave(cur);
    if (vi < list.length - 1) { focusId = list[vi + 1].node.id; render(); }
    return;
  }

  // ── Tab: indent (make child of node above at same level) ─────
  // Disabled in flat views (Today / All Tasks / Assigned) — tree only
  if (e.key === 'Tab' && !e.shiftKey) {
    if (inp.dataset.flat === 'true') return; // let browser handle Tab in flat views
    e.preventDefault();
    pushUndo();
    cur.name = inp.value;
    // Find previous node in visible list at same depth
    var curDepth = vi >= 0 ? list[vi].depth : 0;
    var target = null;
    for (var i = vi - 1; i >= 0; i--) {
      if (list[i].depth === curDepth) { target = list[i].node; break; }
      if (list[i].depth < curDepth) break;
    }
    if (!target) return;
    cur.parentId = target.id;
    collapsed[target.id] = false; saveCollapsed();
    // Move node after ALL of target's descendants (true last child position)
    var curIdx = nodes.findIndex(x => x.id === id);
    nodes.splice(curIdx, 1);
    var targetIdx = nodes.findIndex(x => x.id === target.id);
    var targetDesc = descendants(target.id); // all descendant IDs of target
    var insertAfter = targetIdx;
    // Scan ALL remaining nodes to find the last descendant (don't stop early)
    for (var di = targetIdx + 1; di < nodes.length; di++) {
      if (targetDesc.indexOf(nodes[di].id) > -1) insertAfter = di;
    }
    nodes.splice(insertAfter + 1, 0, cur);
    var newIdx = nodes.findIndex(x => x.id === id);
    cur.order = orderBetween(newIdx - 1, newIdx + 1);
    focusId = id; scheduleSave(cur); render();
    return;
  }

  // ── Shift+Tab: outdent ───────────────────────────────────────
  if (e.key === 'Tab' && e.shiftKey) {
    if (inp.dataset.flat === 'true') return;
    e.preventDefault();
    pushUndo();
    cur.name = inp.value;
    if (!cur.parentId) return;
    var parent = nodes.find(x => x.id === cur.parentId);
    if (!parent) return;
    cur.parentId = parent.parentId || null;
    // Move node after parent's last descendant in array
    var curIdx = nodes.findIndex(x => x.id === id);
    nodes.splice(curIdx, 1);
    var parentIdx = nodes.findIndex(x => x.id === parent.id);
    var parentDesc = descendants(parent.id);
    var insertAfter = parentIdx;
    for (var di = parentIdx + 1; di < nodes.length; di++) {
      if (parentDesc.indexOf(nodes[di].id) > -1) insertAfter = di;
      else break;
    }
    nodes.splice(insertAfter + 1, 0, cur);
    var newIdx2 = nodes.findIndex(x => x.id === id);
    cur.order = orderBetween(newIdx2 - 1, newIdx2 + 1);
    focusId = id; scheduleSave(cur); render();
    return;
  }

  // ── Ctrl+Shift+X: toggle today ───────────────────────────────
  if ((e.ctrlKey || e.metaKey) && e.shiftKey && (e.key === 'X' || e.key === 'x')) {
    e.preventDefault();
    if (!cur.isSection) {
      pushUndo();
      cur.name = inp.value.trim() || cur.name;
      if (cur.date && cur.date.slice(0, 10) === TODAY) {
        // Already today — demote to yesterday
        var yest = new Date();
        yest.setDate(yest.getDate() - 1);
        cur.date = yest.getFullYear() + '-' +
          String(yest.getMonth()+1).padStart(2,'0') + '-' +
          String(yest.getDate()).padStart(2,'0') + ' 00:00:00';
      } else {
        cur.date = localDateTime();
      }
      scheduleSave(cur);
      render();
    }
    return;
  }

  // ── Ctrl+Shift+S: toggle section ────────────────────────────
  if ((e.metaKey || e.ctrlKey) && e.shiftKey && e.key === 'S') {
    e.preventDefault();
    pushUndo();
    cur.name = inp.value;
    cur.isSection = !cur.isSection;
    if (!cur.isSection && !cur.date) cur.date = localDateTime();
    focusId = id;
    scheduleSave(cur);
    render();
    return;
  }
}


function addRoot() {
  var n = { id: newId(), name: '', parentId: null, isSection: true, done: false, owner: currentUser };
  nodes.push(n); focusId = n.id; scheduleSave(n); render();
}

function mobileAddItem() {
  // Add a new task at the top of today view
  pushUndo();
  var nn = {
    id: newId(), name: '', parentId: null,
    isSection: false, done: false,
    date: localDateTime(), owner: currentUser,
    order: Date.now()
  };
  nodes.unshift(nn);
  // Switch to today tab
  activeTab = 'today';
  document.querySelectorAll('.mobile-nav-btn').forEach(function(x) { x.classList.remove('active'); });
  var todayBtn = document.getElementById('mnav-today');
  if (todayBtn) todayBtn.classList.add('active');
  focusId = nn.id;
  render();
}

function modal(html, onOk) {
  var bg = document.createElement('div'); bg.className = 'modal-bg';
  bg.innerHTML = `<div class="modal">${html}<div class="modal-btns"><button class="cancel-btn">Cancel</button><button class="ok-btn primary">Save</button></div></div>`;
  document.body.appendChild(bg);
  bg.querySelector('.cancel-btn').onclick = () => bg.remove();
  bg.querySelector('.ok-btn').onclick = () => { onOk(bg); bg.remove(); };
  bg.querySelector('input, textarea')?.focus();
}

function showAssign(id) {

function collapseAll() {

}

// ── Bulk actions (multi-select) ───────────────────────────────────────────────
function bulkAssign() {
  if (!selectedIds.size) return;
  var ids = [...selectedIds];

  // Build a mini assignee picker overlay
  var overlay = document.createElement('div');
  overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.3);display:flex;align-items:center;justify-content:center;z-index:1000;';

  var users = getSortedAssignees();
  var ADD_NEW_SENTINEL = '__add_new__';
  var emailList = [''].concat(users.map(function(u) { return u.email || u; })).concat([ADD_NEW_SENTINEL]);
  var hiEmail = null;

  function rowHtml(email, name, isHi, isCurrent) {
    var bg = isHi ? 'background:var(--accent);color:var(--bg);' : '';
    var dim = isHi ? 'color:rgba(255,255,255,0.6);' : 'color:var(--text3);';
    return '<div class="basg-row" data-email="' + esc(email) + '" style="padding:6px 16px;cursor:pointer;font-size:13px;' + bg + '">' +
      esc(name) + (isCurrent ? ' <span style="font-size:10px;opacity:0.5">(me)</span>' : '') +
      ' <span style="font-size:10px;' + dim + '">' + esc(email) + '</span></div>';
  }

  function buildList() {
    var html = '<div class="basg-row" data-email="" style="padding:6px 16px;cursor:pointer;font-size:13px;color:var(--text3);' +
      (hiEmail === null ? 'background:var(--accent);color:var(--bg);' : '') + '">· No assignee</div>';
    users.forEach(function(u) {
      var email = u.email || u;
      var name = u.name || email.split('@')[0];
      html += rowHtml(email, name, hiEmail === email, email.toLowerCase() === (currentUser||'').toLowerCase());
    });
    html += '<div class="basg-new" style="padding:6px 16px;cursor:pointer;font-size:13px;color:var(--accent);' +
      (hiEmail === ADD_NEW_SENTINEL ? 'background:var(--accent);color:var(--bg);' : '') +
      'border-top:0.5px solid var(--border);margin-top:4px;">+ Add new member</div>';
    return html;
  }

  overlay.innerHTML =
    '<div style="background:var(--bg);border-radius:12px;border:0.5px solid var(--border2);width:340px;max-height:60vh;display:flex;flex-direction:column;box-shadow:0 4px 24px rgba(0,0,0,0.15);">' +
      '<div style="padding:14px 16px 10px;font-size:13px;font-weight:500;border-bottom:0.5px solid var(--border);">Assign ' + ids.length + ' item' + (ids.length > 1 ? 's' : '') + ' to…</div>' +
      '<div id="basgList" style="overflow-y:auto;flex:1;padding:4px 0;"></div>' +
      '<div style="padding:10px 16px;border-top:0.5px solid var(--border);display:flex;justify-content:flex-end;gap:8px;">' +
        '<button id="basgCancel" style="padding:6px 14px;font-size:12px;border:0.5px solid var(--border2);border-radius:6px;background:var(--bg);color:var(--text);cursor:pointer;">Cancel</button>' +
        '<button id="basgOk" style="padding:6px 14px;font-size:12px;border:none;border-radius:6px;background:var(--accent);color:var(--bg);cursor:pointer;font-weight:500;">Assign</button>' +
      '</div>' +
    '</div>';
  document.body.appendChild(overlay);

  function renderList() {
    var list = document.getElementById('basgList');
    if (list) list.innerHTML = buildList();
    // wire clicks
    overlay.querySelectorAll('.basg-row').forEach(function(row) {
      row.onclick = function() {
        hiEmail = row.dataset.email || null;
        renderList();
      };
    });
    var newBtn = overlay.querySelector('.basg-new');
    if (newBtn) newBtn.onclick = function() {
      showAddMemberForm(overlay, function(email, name) {
        teamMembers.push({ email: email, name: name });
        users = getSortedAssignees();
        emailList = [''].concat(users.map(function(u){ return u.email||u; })).concat([ADD_NEW_SENTINEL]);
        renderList();
      });
    };
    var hiEl = hiEmail === ADD_NEW_SENTINEL ? overlay.querySelector('.basg-new') :
      (hiEmail ? overlay.querySelector('[data-email="'+hiEmail+'"]') : overlay.querySelector('[data-email=""]'));
    if (hiEl) hiEl.scrollIntoView({ block: 'nearest' });
  }
  renderList();

  function applyBulkAssign(email) {
    pushUndo();
    ids.forEach(function(id) {
      var n = nodes.find(function(x){ return x.id === id; });
      if (!n || !canEdit(n)) return;
      n.assignedTo = email || null;
      n.assignedBy = email ? (currentUser || '') : null;
      if (email) n.sharedWith = [...new Set((n.sharedWith||'').split(',').map(function(s){return s.trim();}).filter(Boolean).concat(email))].join(',');
      scheduleSave(n);
    });
    overlay.remove();
    document.removeEventListener('keydown', kh);
    clearSelection();
    render();
  }

  overlay.querySelector('#basgCancel').onclick = function() { overlay.remove(); document.removeEventListener('keydown', kh); };
  overlay.querySelector('#basgOk').onclick = function() { applyBulkAssign(hiEmail || null); };
  overlay.addEventListener('click', function(e) { if (e.target === overlay) { overlay.remove(); document.removeEventListener('keydown', kh); } });

  var kh = function(e) {
    var idx = emailList.indexOf(hiEmail || '');
    if (e.key === 'ArrowDown') { e.preventDefault(); var n2 = idx+1; if(n2<emailList.length) hiEmail=emailList[n2]||null; renderList(); }
    else if (e.key === 'ArrowUp') { e.preventDefault(); var p2=idx-1; if(p2>=0) hiEmail=emailList[p2]||null; renderList(); }
    else if (e.key === 'Enter') { e.preventDefault();
      if (hiEmail === ADD_NEW_SENTINEL) { overlay.querySelector('.basg-new') && overlay.querySelector('.basg-new').click(); }
      else applyBulkAssign(hiEmail || null);
    }
    else if (e.key === 'Escape') { overlay.remove(); document.removeEventListener('keydown', kh); }
  };
  setTimeout(function(){ document.addEventListener('keydown', kh); }, 100);
}

function bulkShare() {
  if (!selectedIds.size) return;
  var ids = [...selectedIds];
  // Collect existing sharedWith union
  var existing = new Set();
  ids.forEach(function(id) {
    var n = nodes.find(function(x){ return x.id===id; });
    if (n && n.sharedWith) n.sharedWith.split(',').forEach(function(e){ if(e.trim()) existing.add(e.trim()); });
  });

  modal('<h3>Share ' + ids.length + ' item' + (ids.length>1?'s':'') + '</h3>' +
    '<p>Comma-separated emails. These will be added to each selected item.</p>' +
    '<label>Share with</label>' +
    '<textarea id="mEmails">' + esc([...existing].join(', ')) + '</textarea>', function(bg) {
    var emails = bg.querySelector('#mEmails').value.trim();
    pushUndo();
    ids.forEach(function(id) {
      var n = nodes.find(function(x){ return x.id===id; });
      if (!n || !isOwner(n)) return;
      var merged = [...new Set((n.sharedWith||'').split(',').concat(emails.split(',')).map(function(s){return s.trim();}).filter(Boolean))].join(',');
      n.sharedWith = merged;
      scheduleSave(n);
    });
    clearSelection();
    render();
  });
}

function bulkMove() {
  if (!selectedIds.size) return;
  var ids = [...selectedIds];

  // Minimal section-only picker
  var overlay = document.createElement('div');
  overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.3);display:flex;align-items:center;justify-content:center;z-index:1000;';

  var pickerExpanded = {};
  var hiSection = null;

  function getVisibleSecs() {
    var result = [];
    function walk(parentId, depth) {
      var ch = nodes.filter(function(n){ return n.parentId===(parentId||null) && n.isSection && n.name && n.name.trim(); });
      ch.sort(function(a,b){ return a.name.localeCompare(b.name); });
      ch.forEach(function(n){
        result.push({ node:n, depth:depth });
        if (pickerExpanded[n.id]) walk(n.id, depth+1);
      });
    }
    walk(null, 0);
    return result;
  }

  function buildSecList() {
    var visible = getVisibleSecs();
    if (!visible.length) return '<div style="padding:16px;font-size:12px;color:var(--text3);">No sections found.</div>';
    return visible.map(function(item) {
      var n = item.node;
      var hasChildren = nodes.some(function(c){ return c.parentId===n.id && c.isSection; });
      var isHi = n.id === hiSection;
      var arrow = hasChildren ? (pickerExpanded[n.id] ? '▼ ' : '▶ ') : '· ';
      return '<div class="bsec-row" data-id="' + n.id + '" style="padding:6px 12px 6px ' + (8+item.depth*16) + 'px;cursor:pointer;font-size:13px;' +
        (isHi ? 'background:var(--accent);color:var(--bg);' : '') + '">' +
        '<span style="font-size:9px;opacity:0.5;">' + arrow + '</span>' + esc(n.name) + '</div>';
    }).join('');
  }

  overlay.innerHTML =
    '<div style="background:var(--bg);border-radius:12px;border:0.5px solid var(--border2);width:320px;max-height:60vh;display:flex;flex-direction:column;box-shadow:0 4px 24px rgba(0,0,0,0.15);">' +
      '<div style="padding:14px 16px 10px;font-size:13px;font-weight:500;border-bottom:0.5px solid var(--border);">Move ' + ids.length + ' item' + (ids.length>1?'s':'') + ' to section…</div>' +
      '<div id="bsecList" style="overflow-y:auto;flex:1;padding:4px 0;"></div>' +
      '<div style="padding:10px 16px;border-top:0.5px solid var(--border);display:flex;justify-content:flex-end;gap:8px;">' +
        '<button id="bsecCancel" style="padding:6px 14px;font-size:12px;border:0.5px solid var(--border2);border-radius:6px;background:var(--bg);color:var(--text);cursor:pointer;">Cancel</button>' +
        '<button id="bsecOk" style="padding:6px 14px;font-size:12px;border:none;border-radius:6px;background:var(--accent);color:var(--bg);cursor:pointer;font-weight:500;">Move here</button>' +
      '</div>' +
    '</div>';
  document.body.appendChild(overlay);

  function renderSecList() {
    var list = document.getElementById('bsecList');
    if (list) list.innerHTML = buildSecList();
    overlay.querySelectorAll('.bsec-row').forEach(function(row) {
      row.onclick = function() {
        var id = row.dataset.id;
        var hasChildren = nodes.some(function(c){ return c.parentId===id && c.isSection; });
        if (hasChildren) { pickerExpanded[id] = !pickerExpanded[id]; }
        hiSection = id;
        renderSecList();
      };
    });
    var hiEl = hiSection ? overlay.querySelector('[data-id="'+hiSection+'"]') : null;
    if (hiEl) hiEl.scrollIntoView({ block: 'nearest' });
  }
  renderSecList();

  function applyBulkMove(sectionId) {
    pushUndo();
    ids.forEach(function(id) {
      var n = nodes.find(function(x){ return x.id===id; });
      if (!n || !canEdit(n)) return;
      n.parentId = sectionId;
      if (!n.date) n.date = localDateTime();
      collapsed[sectionId] = false;
      scheduleSave(n);
    });
    saveCollapsed();
    overlay.remove();
    document.removeEventListener('keydown', kh);
    clearSelection();
    render();
  }

  overlay.querySelector('#bsecCancel').onclick = function() { overlay.remove(); document.removeEventListener('keydown', kh); };
  overlay.querySelector('#bsecOk').onclick = function() { if (hiSection) applyBulkMove(hiSection); };
  overlay.addEventListener('click', function(e) { if (e.target===overlay) { overlay.remove(); document.removeEventListener('keydown', kh); } });

  var kh = function(e) {
    var visible = getVisibleSecs();
    var secIds = visible.map(function(x){ return x.node.id; });
    var idx = secIds.indexOf(hiSection);
    if (e.key === 'ArrowDown') { e.preventDefault(); if(idx<secIds.length-1) hiSection=secIds[idx+1]; renderSecList(); }
    else if (e.key === 'ArrowUp') { e.preventDefault(); if(idx>0) hiSection=secIds[idx-1]; renderSecList(); }
    else if (e.key === 'ArrowRight') { e.preventDefault(); if(hiSection && nodes.some(function(c){return c.parentId===hiSection&&c.isSection;})) { pickerExpanded[hiSection]=true; renderSecList(); } }
    else if (e.key === 'ArrowLeft') { e.preventDefault(); if(hiSection && pickerExpanded[hiSection]) { delete pickerExpanded[hiSection]; renderSecList(); } }
    else if (e.key === 'Enter') { e.preventDefault(); if(hiSection) applyBulkMove(hiSection); }
    else if (e.key === 'Escape') { overlay.remove(); document.removeEventListener('keydown', kh); }
  };
  setTimeout(function(){ document.addEventListener('keydown', kh); }, 100);
}
