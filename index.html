// Mobile detection and layout — applied directly via inline styles to bypass iframe CSS issues
var isMobile = false;

function applyMobileStyles() {
  // Apply is-mobile class for CSS rules
  [document.documentElement, document.body].forEach(function(el) {
    if (el) el.classList.toggle('is-mobile', isMobile);
  });

  var app = document.getElementById('app');
  var nav = document.getElementById('mobileNav');
  var fab = document.getElementById('mobileFab');
  var treeEl = document.getElementById('treeEl');
  var toolbar = document.querySelector('.toolbar');
  var tabs = document.querySelector('.tabs');
  var hintBar = document.getElementById('hintBar');
  var collapseBtn = document.getElementById('collapseBtn');
  var body = document.body;

  if (isMobile) {
    // Body and app — full screen, no padding/card
    if (body) { body.style.padding = '0'; body.style.background = 'var(--bg)'; body.style.alignItems = 'stretch'; }
    if (app) { app.style.maxWidth = '100%'; app.style.height = '100dvh'; app.style.borderRadius = '0'; app.style.border = 'none'; app.style.boxShadow = 'none'; app.style.margin = '0'; }
    // Toolbar
    if (toolbar) { toolbar.style.height = '48px'; toolbar.style.padding = '0 10px'; toolbar.style.fontSize = '14px'; }
    if (hintBar) hintBar.style.display = 'none';
    if (collapseBtn) collapseBtn.style.display = 'none';
    // Make toolbar buttons and pills bigger on mobile
    document.querySelectorAll('.toolbar button').forEach(function(b) {
      b.style.fontSize = '14px'; b.style.padding = '5px 12px';
    });
    var searchBtn = document.getElementById('searchBtn');
    if (searchBtn) searchBtn.style.display = 'none';
    // Make undo/redo prominent in mobile toolbar
    var undoBtn = document.getElementById('undoBtn');
    var redoBtn = document.getElementById('redoBtn');
    if (undoBtn) { undoBtn.style.fontSize = '18px'; undoBtn.style.padding = '5px 10px'; }
    if (redoBtn) { redoBtn.style.fontSize = '18px'; redoBtn.style.padding = '5px 10px'; }
    // Avatar is already set — just resize for mobile
    var avatar = document.getElementById('userAvatar');
    if (avatar) { avatar.style.width = '34px'; avatar.style.height = '34px'; avatar.style.fontSize = '15px'; }
    var syncDot = document.getElementById('syncDot');
    if (syncDot) { syncDot.style.width = '14px'; syncDot.style.height = '14px'; }
    // Hide top tabs, show bottom nav
    if (tabs) tabs.style.display = 'none';
    if (nav) { nav.style.display = 'block'; nav.style.height = '60px'; nav.style.flexShrink = '0'; nav.style.width = '100%'; nav.style.borderTop = '1px solid var(--border2)'; nav.style.background = 'var(--bg)'; }
    // Nav inner
    var navInner = nav ? nav.querySelector('.mobile-nav-inner') : null;
    if (navInner) { navInner.style.display = 'flex'; navInner.style.height = '60px'; navInner.style.width = '100%'; }
    // Nav buttons
    if (nav) nav.querySelectorAll('.mobile-nav-btn').forEach(function(btn) {
      btn.style.flex = '1'; btn.style.display = 'flex'; btn.style.flexDirection = 'column';
      btn.style.alignItems = 'center'; btn.style.justifyContent = 'center';
      btn.style.gap = '4px'; btn.style.fontSize = '11px'; btn.style.fontWeight = '500';
      btn.style.border = 'none'; btn.style.background = 'none'; btn.style.padding = '8px 4px';
    });
    // Nav SVGs
    if (nav) nav.querySelectorAll('.mobile-nav-btn svg').forEach(function(svg) {
      svg.style.width = '24px'; svg.style.height = '24px';
    });
    // FAB
    if (fab) { fab.style.display = 'flex'; fab.style.position = 'absolute'; fab.style.bottom = '120px'; fab.style.right = '16px'; fab.style.width = '52px'; fab.style.height = '52px'; fab.style.fontSize = '26px'; fab.style.borderRadius = '50%'; fab.style.background = 'var(--accent)'; fab.style.color = 'var(--bg)'; fab.style.border = 'none'; fab.style.alignItems = 'center'; fab.style.justifyContent = 'center'; fab.style.zIndex = '51'; fab.style.boxShadow = '0 4px 20px rgba(0,0,0,0.3)'; fab.style.cursor = 'pointer'; }
    // Tree
    if (treeEl) treeEl.style.paddingBottom = '16px';
    // Activate mobile stylesheet
    var mst = document.getElementById('mobileStyleTag');
    if (mst) mst.removeAttribute('media');
    // Apply font sizes directly to all node text elements
    // (CSS class may lose specificity battle inside Apps Script iframe)
    if (treeEl) {
      treeEl.querySelectorAll('.node-display').forEach(function(el) {
        el.style.fontSize = el.classList.contains('is-section') ? '40px' : '36px';
        el.style.padding = '18px 4px 18px 2px';
        el.style.lineHeight = '1.5';
      });
      treeEl.querySelectorAll('.node-input').forEach(function(el) {
        el.style.fontSize = el.classList.contains('is-section') ? '40px' : '36px';
        el.style.padding = '18px 4px 18px 2px';
        el.style.lineHeight = '1.5';
      });
      treeEl.querySelectorAll('.node-row').forEach(function(el) {
        el.style.minHeight = '80px';
      });
      treeEl.querySelectorAll('.node-row').forEach(function(el) {
        el.style.alignItems = 'center'; el.style.minHeight = '44px';
      });
      treeEl.querySelectorAll('.node-display').forEach(function(el) {
        el.style.fontSize = el.classList.contains('is-section') ? '18px' : '17px';
        el.style.padding = '9px 4px'; el.style.lineHeight = '1.6'; el.style.alignSelf = 'center';
        // Show/hide the expand button based on whether text is clamped
        var id = el.dataset.disp;
        var btn = id ? treeEl.querySelector('[data-showmore="' + id + '"]') : null;
        if (btn) {
          // Check if text is actually truncated (scrollHeight > clientHeight)
          var isExpanded = el.classList.contains('expanded');
          if (!isExpanded && el.scrollHeight > el.clientHeight + 2) {
            btn.classList.add('needed');
          } else if (!isExpanded) {
            btn.classList.remove('needed');
          }
        }
      });
      treeEl.querySelectorAll('.node-input').forEach(function(el) {
        el.style.fontSize = el.classList.contains('is-section') ? '18px' : '17px';
        el.style.padding = '9px 4px'; el.style.lineHeight = '1.6';
      });
      treeEl.querySelectorAll('.node-check').forEach(function(el) {
        el.style.width = '22px'; el.style.height = '22px';
        el.style.marginTop = '0'; el.style.marginRight = '10px';
        el.style.flexShrink = '0'; el.style.alignSelf = 'center';
      });
      treeEl.querySelectorAll('.mobile-toggle').forEach(function(el) {
        el.style.display = 'flex'; el.style.alignItems = 'center';
        el.style.fontSize = '16px'; el.style.padding = '6px 10px';
        el.style.alignSelf = 'center';
      });
      treeEl.querySelectorAll('.mobile-zoom-btn').forEach(function(el) {
        el.style.display = 'flex'; el.style.alignItems = 'center';
        el.style.fontSize = '16px'; el.style.padding = '6px 8px';
        el.style.alignSelf = 'center';
      });
      treeEl.querySelectorAll('.section-icon').forEach(function(el) {
        el.style.marginTop = '0'; el.style.width = '26px'; el.style.height = '26px';
        el.style.marginRight = '8px'; el.style.alignSelf = 'center';
        var svg = el.querySelector('svg'); if (svg) { svg.style.width = '26px'; svg.style.height = '26px'; }
      });
      treeEl.querySelectorAll('.today-badge, .assignee-badge').forEach(function(el) {
        el.style.fontSize = '13px'; el.style.padding = '3px 8px';
        el.style.marginTop = '0'; el.style.alignSelf = 'center';
      });
    }
  } else {
    // Reset to desktop
    if (body) { body.style.padding = ''; body.style.background = ''; body.style.alignItems = ''; }
    if (app) { app.style.maxWidth = ''; app.style.height = ''; app.style.borderRadius = ''; app.style.border = ''; app.style.boxShadow = ''; app.style.margin = ''; }
    if (toolbar) { toolbar.style.height = ''; toolbar.style.padding = ''; toolbar.style.fontSize = ''; }
    if (hintBar) hintBar.style.display = '';
    if (collapseBtn) collapseBtn.style.display = '';
    if (tabs) tabs.style.display = '';
    if (nav) nav.style.display = '';
    if (fab) fab.style.display = '';
    if (treeEl) treeEl.style.paddingBottom = '';
    // Deactivate mobile style tag
    var mst = document.getElementById('mobileStyleTag');
    if (mst) mst.setAttribute('media', 'not all');
    // Reset toolbar buttons
    document.querySelectorAll('.toolbar button').forEach(function(b) {
      b.style.fontSize = ''; b.style.padding = '';
    });
    var avatar = document.getElementById('userAvatar');
    if (avatar) { avatar.style.width = '28px'; avatar.style.height = '28px'; avatar.style.fontSize = '13px'; }
  }
}

function checkMobile() {
  var ua = navigator.userAgent || navigator.vendor || window.opera || '';
  var uaMobile = /android|webos|iphone|ipad|ipod|blackberry|iemobile|opera mini|mobile/i.test(ua);
  var hasTouch = ('ontouchstart' in window) || (navigator.maxTouchPoints > 0);
  var narrowWindow = window.innerWidth > 0 && window.innerWidth <= 900;
  // Mobile = phone UA, OR (touch device AND narrow screen)
  // Do NOT use hasTouch alone — touch-screen laptops/PCs would trigger mobile mode
  isMobile = uaMobile || (hasTouch && narrowWindow) || (narrowWindow && !hasTouch && window.innerWidth <= 640);
  applyMobileStyles();
}

// Run after DOM is ready
function attachMobileSwipe() {
  if (!isMobile) return;
  var treeEl = document.getElementById('treeEl');
  if (!treeEl || treeEl._swipeInited) return;
  treeEl._swipeInited = true;

  // ── Constants ──────────────────────────────────────────────────────────────
  var LONG_PRESS_MS  = 650;   // hold duration to trigger select or drag (longer than browser's ~500ms native menu)
  var MOVE_CANCEL_PX = 20;    // movement that cancels a long press
  var TAP_MAX_PX = 35;         // max movement to still count as a tap
  var SWIPE_MIN_PX   = 60;    // horizontal swipe threshold for action sheet

  // ── State ──────────────────────────────────────────────────────────────────
  // Gesture phases:
  //   'idle'           — no touch active
  //   'pressing'       — finger down, waiting (long press not yet fired)
  //   'range-select'   — long press fired in select mode, finger dragging to range-select
  //   'drag'           — long press fired in selection mode (2nd press), dragging items
  //   'swipe'          — horizontal left swipe for action sheet
  var phase = 'idle';
  var startX = 0, startY = 0;
  var activeRow = null;
  var longTimer = null;
  var dragGhostEl = null;
  var dropRow = null, dropMode = null;
  var dragIds = []; // snapshot of selected IDs at drag start

  function vibrate() { try { navigator.vibrate && navigator.vibrate(45); } catch(e){} }


  function cancelTimer() {
    if (longTimer) { clearTimeout(longTimer); longTimer = null; }
  }

  // ── Ghost for drag ─────────────────────────────────────────────────────────
  function createGhost(x, y) {
    dragGhostEl = document.createElement('div');
    var ids = dragIds.length ? dragIds : [...selectedIds];
    var names = ids.map(function(sid) {
      var n = nodes.find(function(x){ return x.id === sid; });
      return n ? (n.name || '…') : sid;
    }).join(', ');
    dragGhostEl.textContent = (ids.length > 1 ? ids.length + ' items' : names.slice(0, 50));
    dragGhostEl.style.cssText = 'position:fixed;pointer-events:none;background:var(--bg);border:2.5px solid var(--accent);border-radius:10px;padding:10px 18px;font-size:22px;color:var(--text);opacity:0.93;z-index:9999;white-space:nowrap;box-shadow:0 6px 24px rgba(0,0,0,0.25);max-width:75vw;overflow:hidden;text-overflow:ellipsis;';
    dragGhostEl.style.left = (x + 20) + 'px';
    dragGhostEl.style.top  = (y - 30) + 'px';
    document.body.appendChild(dragGhostEl);
    var idsToMark = dragIds.length ? dragIds : [...selectedIds];
    idsToMark.forEach(function(sid) {
      var r = treeEl.querySelector('[data-id="' + sid + '"]');
      if (r) r.classList.add('dragging');
    });
  }

  function destroyGhost() {
    if (dragGhostEl) { dragGhostEl.remove(); dragGhostEl = null; }
    treeEl.querySelectorAll('.dragging').forEach(function(r) { r.classList.remove('dragging'); });
    clearDropStyles();
    dragIds = [];
  }

  function updateDrop(cx, cy) {
    if (dragGhostEl) {
      dragGhostEl.style.left = (cx + 20) + 'px';
      dragGhostEl.style.top  = (cy - 30) + 'px';
    }
    // Auto-scroll
    var tr = treeEl.getBoundingClientRect();
    var ZONE = 90;
    if (cy > tr.bottom - ZONE) treeEl.scrollTop += Math.ceil(14 * Math.min(1, (cy - (tr.bottom - ZONE)) / ZONE));
    else if (cy < tr.top + ZONE) treeEl.scrollTop -= Math.ceil(14 * Math.min(1, ((tr.top + ZONE) - cy) / ZONE));
    // Drop target
    if (dragGhostEl) dragGhostEl.style.display = 'none';
    var el = document.elementFromPoint(cx, cy);
    if (dragGhostEl) dragGhostEl.style.display = '';
    var tRow = el ? el.closest('.node-row') : null;
    clearDropStyles();
    if (tRow && !selectedIds.has(tRow.dataset.id)) {
      dropRow = tRow;
      var rect = tRow.getBoundingClientRect();
      var relY = cy - rect.top;
      dropMode = relY < rect.height * 0.28 ? 'above' : relY > rect.height * 0.72 ? 'below' : 'child';
      tRow.classList.add('drop-' + dropMode);
    } else {
      dropRow = null; dropMode = null;
    }
  }

  // ── TOUCHSTART ─────────────────────────────────────────────────────────────
  treeEl.addEventListener('touchstart', function(e) {
    // Safety: if a ghost is stuck on screen, clean it up first
    if (dragGhostEl) { cleanupDrag(); phase = 'idle'; }
    if (e.touches.length !== 1) { cancelTimer(); phase = 'idle'; return; }
    var t = e.touches[0];
    startX = t.clientX; startY = t.clientY;
    // Don't intercept actual buttons and controls
    if (e.target.closest('button,.toggle,.mobile-toggle,[data-showmore],.kb-bar,input[type=checkbox]')) return;
    activeRow = e.target.closest('.node-row');
    if (!activeRow) return;

    phase = 'pressing';

    longTimer = setTimeout(function() {
      longTimer = null;
      vibrate();
      var nodeId = activeRow ? activeRow.dataset.id : null;
      if (!nodeId) return;
      // If a textarea is open, close it first (discard focus, keep content)
      if (document.activeElement && document.activeElement.tagName === 'TEXTAREA') {
        suppressBlur = true;
        document.activeElement.blur();
        setTimeout(function() { suppressBlur = false; }, 100);
      }
      if (selectionMode) {
        // ── Second long press while in selection mode → START DRAG ──────────
        // Ensure the pressed item is included in the drag
        if (!selectedIds.has(nodeId)) {
          selectedIds.add(nodeId);
        }
        // Snapshot all selected IDs so taps during drag don't change the set
        dragIds = [...selectedIds];
        phase = 'drag';
        createGhost(startX, startY);
      } else {
        // ── First long press → enter selection mode ─────────────────────────
        selectedIds.clear();
        selectedIds.add(nodeId);
        updateSelectionStyles();
        selectionMode = true;
        phase = 'range-select';
      }
    }, LONG_PRESS_MS);

  }, { passive: true });

  // ── TOUCHMOVE ──────────────────────────────────────────────────────────────
  treeEl.addEventListener('touchmove', function(e) {
    if (e.touches.length !== 1) return;
    var t = e.touches[0];
    var dx = t.clientX - startX;
    var dy = t.clientY - startY;
    var dist = Math.sqrt(dx*dx + dy*dy);

    if (phase === 'drag') {
      e.preventDefault();
      updateDrop(t.clientX, t.clientY);
      return;
    }

    if (phase === 'range-select') {
      e.preventDefault();
      // Extend selection to all rows between anchor and current finger
      var el = document.elementFromPoint(t.clientX, t.clientY);
      var tRow = el ? el.closest('.node-row') : null;
      if (tRow && activeRow) {
        var rows = [...treeEl.querySelectorAll('.node-row')];
        var si = rows.indexOf(activeRow), ei = rows.indexOf(tRow);
        if (si >= 0 && ei >= 0) {
          var lo = Math.min(si, ei), hi = Math.max(si, ei);
          selectedIds.clear();
          for (var i = lo; i <= hi; i++) {
            if (rows[i].dataset.id) selectedIds.add(rows[i].dataset.id);
          }
          updateSelectionStyles();
        }
      }
      return;
    }

    if (phase === 'pressing') {
      // Only cancel long press on horizontal movement (swipe gesture)
      // Vertical movement = user might be scrolling, still allow long press to fire
      var isHorizontalSwipe = Math.abs(dx) > MOVE_CANCEL_PX && Math.abs(dx) > Math.abs(dy) * 1.5;
      var isLargeMove = dist > 40; // very large movement = definitely not a hold
      if (isHorizontalSwipe || isLargeMove) {
        cancelTimer();
        if (!selectionMode && isHorizontalSwipe && dx < 0) {
          phase = 'swipe';
        } else {
          phase = 'idle';
        }
      }
    }

    if (phase === 'swipe' && activeRow) {
      if (dx < 0 && dx > -150) {
        activeRow.style.transform = 'translateX(' + dx + 'px)';
      }
    }

  }, { passive: false });

  // ── TOUCHEND ───────────────────────────────────────────────────────────────
  function cleanupDrag() {
    destroyGhost();
    dragIds = [];
    dropRow = null; dropMode = null;
  }

  treeEl.addEventListener('touchend', function(e) {
    cancelTimer();
    var t = e.changedTouches[0];
    var dx = t ? t.clientX - startX : 0;
    var dy = t ? t.clientY - startY : 0;
    var dist = Math.sqrt(dx*dx + dy*dy);
    var endPhase = phase;
    phase = 'idle';
    // Prevent click from firing after selection tap
    if (selectionMode && endPhase === 'pressing' && dist < TAP_MAX_PX) {
      e.preventDefault();
    }

    if (endPhase === 'drag') {
      var idsToMove = dragIds.length ? dragIds : [...selectedIds];
      var dropTarget = dropRow, dropModeSnap = dropMode;
      cleanupDrag();
      if (dropTarget && dropModeSnap) {
        performDrop(idsToMove, dropTarget.dataset.id, dropModeSnap);
      }
      return;
    }

    if (endPhase === 'swipe' && activeRow) {
      activeRow.style.transform = '';
      activeRow.style.transition = 'transform 0.22s';
      setTimeout(function() { if (activeRow) activeRow.style.transition = ''; }, 250);
      if (dx < -SWIPE_MIN_PX) showMobileActionSheet(activeRow.dataset.id);
      activeRow = null;
      return;
    }

    if (endPhase === 'range-select') {
      // Long press just fired and finger lifted — stay in selection mode
      activeRow = null;
      return;
    }

    if ((endPhase === 'pressing') && dist < TAP_MAX_PX && activeRow) {
      if (selectionMode) {
        // In selection mode: tap toggles this node in/out of selection
        var nodeId = activeRow.dataset.id;
        if (selectedIds.has(nodeId)) selectedIds.delete(nodeId);
        else selectedIds.add(nodeId);
        updateSelectionStyles();
        if (selectedIds.size === 0) selectionMode = false;
        // Prevent the tap from also triggering click/focus on the row
        e.preventDefault && e.preventDefault();
      }
      // If not in selection mode, normal tap — let click bubble
    }

    activeRow = null;
  }, { passive: false });

  // touchcancel — system interrupted (notification, call, etc) — always clean up
  treeEl.addEventListener('touchcancel', function() {
    cancelTimer();
    cleanupDrag();
    if (activeRow) { activeRow.style.transform = ''; }
    phase = 'idle';
    activeRow = null;
  });

  // Also clean up if multiple touches start
  document.addEventListener('touchstart', function(e) {
    if (e.touches.length > 1 && phase === 'drag') {
      cancelTimer();
      cleanupDrag();
      phase = 'idle';
      activeRow = null;
    }
  }, { passive: true });

  // Tap outside tree clears selection
  document.addEventListener('touchstart', function(e) {
    if (!selectionMode) return;
    if (!e.target.closest('#treeEl, #selectBar, .mobile-nav, #kbBar')) {
      clearSelection();
      selectionMode = false;
    }
  }, { passive: true });
}

// Re-attach swipe after each render
var _origAttachEvents = attachEvents;
attachEvents = function() {
  _origAttachEvents();
  attachMobileSwipe();
};


document.addEventListener('keydown', function(e) {
  var inInput = document.activeElement && (document.activeElement.tagName === 'INPUT' || document.activeElement.tagName === 'TEXTAREA');
  // Ctrl+Shift+F or / (not in input): open search
  if ((e.ctrlKey || e.metaKey) && e.shiftKey && (e.key === 'f' || e.key === 'F')) {
    e.preventDefault();
    openSearch();
    return;
  }
  if (e.key === '/' && !inInput) {
    e.preventDefault();
    openSearch();
    return;
  }
  if ((e.ctrlKey || e.metaKey) && e.key === 'z') {
    e.preventDefault();
    undo();
    return;
  }
  if ((e.ctrlKey || e.metaKey) && (e.key === 'y' || e.key === 'Y')) {
    e.preventDefault();
    redo();
    return;
  }
  // Alt+Left: back navigation
  if (e.altKey && e.key === 'ArrowLeft') {
    e.preventDefault();
    navBack();
    return;
  }

  // Ctrl+Shift+X: toggle today on focused node
  if ((e.ctrlKey || e.metaKey) && e.shiftKey && (e.key === 'X' || e.key === 'x')) {
    e.preventDefault();
    var focusedNode = nodes.find(function(n) { return n.id === focusId; });
    if (focusedNode && !focusedNode.isSection) {
      pushUndo();
      var inp2 = focusId ? document.getElementById('inp_' + focusId) : null;
      if (inp2 && inp2.value.trim()) focusedNode.name = inp2.value.trim();
      if (focusedNode.date && focusedNode.date.slice(0, 10) === TODAY) {
        var yest2 = new Date();
        yest2.setDate(yest2.getDate() - 1);
        focusedNode.date = yest2.getFullYear() + '-' +
          String(yest2.getMonth()+1).padStart(2,'0') + '-' +
          String(yest2.getDate()).padStart(2,'0') + ' 00:00:00';
      } else {
        focusedNode.date = localDateTime();
      }
      scheduleSave(focusedNode);
      render();
    }
    return;
  }

  // Ctrl+Shift+C: collapse/expand focused node or all
  if ((e.ctrlKey || e.metaKey) && e.shiftKey && (e.key === 'C' || e.key === 'c')) {
    e.preventDefault();
    if (focusId) {
      // Toggle collapse of focused node
      if (children(focusId).length > 0) {
        collapsed[focusId] = !collapsed[focusId];
        saveCollapsed();
        render();
      }
    } else {
      collapseAll();
    }
    return;
  }

  // Ctrl+Shift+S: toggle section/task for all selected nodes (works even in textarea)
  if ((e.ctrlKey || e.metaKey) && e.shiftKey && (e.key === 'S' || e.key === 's') && selectedIds.size > 0) {
    e.preventDefault();
    pushUndo();
    selectedIds.forEach(function(id) {
      var n = nodes.find(function(x) { return x.id === id; });
      if (!n) return;
      n.isSection = !n.isSection;
      if (!n.isSection && !n.date) n.date = localDateTime();
      scheduleSave(n);
    });
    render();
    return;
  }
  // Delete/Backspace with selected nodes (not in input)
  if ((e.key === 'Delete' || e.key === 'Backspace') && !inInput && selectedIds.size > 0) {
    e.preventDefault();
    var names = [...selectedIds].map(function(id) {
      var n = nodes.find(x => x.id === id);
      return n ? '"' + (n.name || 'unnamed') + '"' : id;
    }).join(', ');
    var totalChildren = [...selectedIds].reduce(function(acc, id) {
      return acc + descendants(id).length;
    }, 0);
    var msg = 'Delete ' + selectedIds.size + ' item' + (selectedIds.size > 1 ? 's' : '') +
      (totalChildren > 0 ? ' and ' + totalChildren + ' child item' + (totalChildren === 1 ? '' : 's') : '') + '?';
    showDeleteConfirm(msg, function() {
      saveActiveInput();
      pushUndo();
      var toDelete = new Set();
      selectedIds.forEach(function(id) {
        toDelete.add(id);
        descendants(id).forEach(function(d) { toDelete.add(d); });
      });
      var snapToDelete = [...toDelete]; // capture before modifying nodes
      nodes = nodes.filter(function(n) { return !toDelete.has(n.id); });
      deleteRemote(null, snapToDelete);
      selectedIds.clear();
      updateSelectionStyles();
      render();
    });
  }
});

function showMobileActionSheet(nodeId) {
  var n = nodes.find(function(x) { return x.id === nodeId; });
  if (!n) return;
  var existing = document.getElementById('mobileSheet');
  if (existing) existing.remove();
  // Snapshot selected IDs at open time — they may get cleared before action fires
  var snapshotIds = (selectionMode && selectedIds.size > 0) ? [...selectedIds] : [nodeId];
  // Make sure the tapped node is included
  if (snapshotIds.indexOf(nodeId) === -1) snapshotIds.push(nodeId);

  var sheet = document.createElement('div');
  sheet.id = 'mobileSheet';
  sheet.style.cssText = 'position:fixed;inset:0;z-index:200;display:flex;flex-direction:column;justify-content:flex-end;';
  sheet.innerHTML =
    '<div style="flex:1;background:rgba(0,0,0,0.3);" id="sheetBackdrop"></div>' +
    '<div style="background:var(--bg);border-radius:16px 16px 0 0;padding:8px 0 32px;max-height:60vh;overflow-y:auto;">' +
      '<div style="width:36px;height:4px;background:var(--border2);border-radius:2px;margin:8px auto 16px;"></div>' +
      '<div style="padding:0 8px;font-size:12px;color:var(--text3);margin-bottom:4px;padding-left:20px;">' + esc(n.name||'').slice(0,40) + '</div>' +
      (canEdit(n) ? [
        !n.done ? '<button class="msa-btn" data-action="done">✓ Mark done</button>' : '<button class="msa-btn" data-action="undone">↩ Mark not done</button>',
        !n.isSection ? '<button class="msa-btn" data-action="today">📅 Schedule today</button>' : '',
        '<button class="msa-btn" data-action="section">' + (n.isSection ? '→ Convert to task' : '→ Convert to section') + '</button>',
        '<button class="msa-btn" data-action="move">↗ Move to section</button>',
        !n.isSection ? '<button class="msa-btn" data-action="assign">👤 Assign</button>' : '',
        isOwner(n) ? '<button class="msa-btn" data-action="share">🔗 Share</button>' : '',
        isOwner(n) ? '<button class="msa-btn" style="color:#e24b4a;" data-action="delete">✕ Delete</button>' : ''
      ].join('') : '<div style="padding:16px 20px;color:var(--text3);font-size:13px;">Read-only</div>') +
    '</div>';

  sheet.style.cssText += '';
  document.body.appendChild(sheet);

  // Add action button styles
  sheet.querySelectorAll('.msa-btn').forEach(function(btn) {
    btn.style.cssText = 'display:block;width:100%;padding:14px 20px;border:none;background:none;text-align:left;font-size:15px;font-family:inherit;color:var(--text);cursor:pointer;border-bottom:0.5px solid var(--border);';
    btn.onmousedown = function() { btn.style.background = 'var(--bg2)'; };
    btn.onmouseup = btn.onmouseleave = function() { btn.style.background = ''; };
  });

  sheet.querySelector('#sheetBackdrop').onclick = function() { sheet.remove(); };

  sheet.querySelectorAll('[data-action]').forEach(function(btn) {
    btn.onclick = function() {
      sheet.remove();
      var action = btn.dataset.action;
      if (action === 'section') {
        pushUndo();
        n.isSection = !n.isSection;
        if (!n.isSection && !n.date) n.date = localDateTime();
        scheduleSave(n);
        render();
      } else if (action === 'share') {
        showShare(nodeId);
      } else if (action === 'done' || action === 'undone') {
        pushUndo();
        var isDone = (action === 'done');
        // Apply to all selected nodes if in selection mode, otherwise just this node
        var targetIds = snapshotIds.length > 1 ? snapshotIds : [n.id];
        targetIds.forEach(function(tid) {
          var tn = nodes.find(function(x){ return x.id === tid; });
          if (!tn || tn.isSection) return;
          tn.done = isDone;
          tn.completedDate = isDone ? TODAY : null;
          scheduleSave(tn);
          // Also mark descendants
          descendants(tid).forEach(function(did) {
            var dn = nodes.find(function(x){ return x.id === did; });
            if (dn && !dn.isSection) { dn.done = isDone; dn.completedDate = tn.completedDate; scheduleSave(dn); }
          });
        });
        selectionMode = false;
        selectedIds.clear();
        render();
      } else if (action === 'today') {
        pushUndo();
        snapshotIds.forEach(function(tid) {
          var tn = nodes.find(function(x){ return x.id === tid; });
          if (tn && !tn.isSection) { tn.date = localDateTime(); scheduleSave(tn); }
        });
        render();
      } else if (action === 'move') {
        selectedIds.clear(); selectedIds.add(n.id); bulkMove();
      } else if (action === 'assign') {
        selectedIds.clear(); selectedIds.add(n.id); bulkAssign();
      } else if (action === 'delete') {
        var childCount = descendants(n.id).length;
        var msg = childCount ? 'Delete "' + (n.name||'item') + '" and ' + childCount + ' children?' : 'Delete "' + (n.name||'item') + '"?';
        showDeleteConfirm(msg, function() {
          var snapIds = [n.id].concat(descendants(n.id));
          nodes = nodes.filter(function(x){ return snapIds.indexOf(x.id) === -1; });
          deleteRemote(null, snapIds);
          render();
        });
      }
    };
  });
}

function switchUser() {
  var done = function() {
    localStorage.removeItem('momentum_user_email');
    localStorage.removeItem('momentum_access_token');
    localStorage.removeItem('momentum_token_expiry');
    // Also clear the persistent queue — this user's queue should not carry over
    // to a different user account
    localStorage.removeItem(QUEUE_KEY);
    queueState.saves = {};
    queueState.deletes = {};
    nodeTouched = {};
    currentUser = '';
    nodes = [];
    if (typeof google !== 'undefined' && google.accounts && _googleAccessToken) {
      google.accounts.oauth2.revoke(_googleAccessToken, function() {});
    }
    _googleAccessToken = null;
    showSignIn();
  };
  // Flush before switching so the current user's work makes it to the sheet
  if (queueIsEmpty()) { done(); }
  else { flushNow(3000).then(done); }
}

// Boot sequence:
//   1. Restore the persistent save queue (unsaved work from previous session / crash)
//   2. Verify auth via whoAmI
//   3. Fetch initial data (full replace if queue is empty; merge otherwise)
//   4. Flush the restored queue (runs in background, doesn't block app)
// No polling interval — we rely on visibilitychange for passive refresh.
function bootApp() {
  loadQueue(); // restore any unsaved work from last session
  gsr('whoAmI').then(function(r) {
    if (r && r.email) {
      currentUser = r.email;
      localStorage.setItem('momentum_user_email', r.email);
      var pill = document.getElementById('userPill');
      if (pill) pill.textContent = currentUser;
      // Step 3: fetch data. Use merge mode if we have pending saves so they survive.
      fetchAll(queueIsEmpty()).then(function() {
        // Step 4: kick off queue flush in background (if any). Doesn't block UI.
        if (!queueIsEmpty()) armFlush();
      }).catch(function(e) {
        console.error('fetchAll error:', e && e.message);
      });
    }
  }).catch(function(e) {
    console.error('Boot error:', e && e.message);
    var msg = (e && e.message) || 'Unknown error';
    if (msg === 'Not authenticated' || msg === 'Unauthorized') {
      // Silent refresh with retry — phase 3 auth resilience.
      silentRefreshWithRetry(3).then(function() {
        bootApp();
      }).catch(function() {
        // Genuine auth failure. Don't wipe the queue — it stays in localStorage
        // and will flush after next login. Just show the sign-in screen.
        localStorage.removeItem('momentum_access_token');
        localStorage.removeItem('momentum_token_expiry');
        _googleAccessToken = null;
        showSignIn();
      });
    } else {
      // Network / server error. Show retry button.
      var tree = document.getElementById('treeEl');
      if (tree) {
        tree.innerHTML =
          '<div class="empty" style="padding:32px;">Connection error: ' + esc(msg) +
          '<br><br><button onclick="bootApp()" style="padding:8px 20px;border:none;border-radius:8px;background:var(--accent);color:var(--bg);cursor:pointer;font-size:14px;">Retry</button></div>';
      }
      showApp();
    }
  });
}

// Register service worker for PWA
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js').catch(function(e) {
    console.log('SW registration failed:', e);
  });
}

document.addEventListener('DOMContentLoaded', function() {
  checkMobile();
  setTimeout(checkMobile, 300);
  setTimeout(checkMobile, 1000);
  document.querySelectorAll('.tab').forEach(function(t) {
    t.onclick = function() {
      pushUndo();
      activeTab = t.dataset.tab;
      if (activeTab !== 'tree') zoomedId = null;
      document.querySelectorAll('.tab').forEach(function(x) { x.classList.remove('active'); });
      t.classList.add('active');
      updateZoomCrumb();
      render();
    };
  });

  // Wire mobile nav buttons
  document.querySelectorAll('.mobile-nav-btn[data-tab]').forEach(function(btn) {
    btn.onclick = function() {
      pushUndo();
      activeTab = btn.dataset.tab;
      if (activeTab !== 'tree') zoomedId = null;
      document.querySelectorAll('.mobile-nav-btn').forEach(function(x) { x.classList.remove('active'); });
      btn.classList.add('active');
      updateZoomCrumb();
      render();
    };
  });
  document.getElementById('collapseBtn').onclick = collapseAll;

  // Wire search bar
  var searchInp = document.getElementById('searchInput');
  if (searchInp) {
    searchInp.addEventListener('input', function() { runSearch(searchInp.value); });
    searchInp.addEventListener('keydown', function(e) {
      if (e.key === 'Escape') { clearSearch(); searchInp.blur(); }
      if (e.key === 'Enter') { e.shiftKey ? searchPrev() : searchNext(); }
      if (e.key === 'ArrowDown') { e.preventDefault(); searchNext(); }
      if (e.key === 'ArrowUp') { e.preventDefault(); searchPrev(); }
    });
  }
  var btnNext = document.getElementById('searchNext');
  if (btnNext) btnNext.onclick = function() { searchNext(); };
  var btnPrev = document.getElementById('searchPrev');
  if (btnPrev) btnPrev.onclick = function() { searchPrev(); };
  var btnClear = document.getElementById('searchClear');
  if (btnClear) btnClear.onclick = function() { clearSearch(); if (searchInp) searchInp.focus(); };
  var lastVisibleFetch = 0;
  document.addEventListener('visibilitychange', function() {
    if (document.hidden) {
      // Tab losing focus — flush queue synchronously if there's work to do.
      // The fetch may not complete but it fires the request, and if it fails
      // the queue is persisted and retries on next boot.
      if (!queueIsEmpty() && !batchInFlight) flushBatch();
      return;
    }
    // If we have queued work, flush it rather than fetching
    if (!queueIsEmpty()) {
      flushBatch();
      return;
    }
    // Cooldown — don't re-fetch within 60s of the last fetch
    if (Date.now() - lastVisibleFetch < 60000) return;
    lastVisibleFetch = Date.now();
    fetchAll(false); // reconcile mode — protects in-progress edits
  });
  // Best-effort flush on page close. Queue is persisted to localStorage so
  // worst case we retry on next boot — this just speeds things up.
  window.addEventListener('beforeunload', function() {
    if (!queueIsEmpty() && !batchInFlight) flushBatch();
  });
  window.addEventListener('pagehide', function() {
    if (!queueIsEmpty() && !batchInFlight) flushBatch();
  });
  // Boot: check for valid token, or try silent refresh
  if (isTokenValid()) {
    scheduleTokenRefresh();
    showApp();
    bootApp();
  } else {
    // Token missing or expired — try to silently get a fresh one before
    // forcing the user to click Sign In again
    silentRefreshToken().then(function() {
      showApp();
      bootApp();
    }).catch(function() {
      showSignIn();
      localStorage.removeItem('momentum_access_token');
      localStorage.removeItem('momentum_token_expiry');
    });
  }
});


</script>
